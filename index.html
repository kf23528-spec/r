<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D FPS Prototype 4v4</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f14;
      overscroll-behavior: none;
      touch-action: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
      line-height: 1.5;
    }

    #scoreBoard {
      font-size: 18px;
      margin-bottom: 4px;
    }

    #roundState {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    #ammo {
      display: block;
      font-size: 14px;
      opacity: 0.9;
      margin-top: 4px;
    }

    #hpBlock {
      margin-top: 8px;
      width: 170px;
      max-width: 45vw;
    }

    #hpLabel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 4px;
      opacity: 0.95;
    }

    #hpBarOuter {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.35);
    }

    #hpBarInner {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #3cff7d, #29d65e);
      border-radius: 999px;
      transition: width 0.08s linear;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: #35ff7d;
      box-shadow: 0 0 8px rgba(53,255,125,0.55);
      transform: translate(-50%, -50%);
      border-radius: 2px;
    }

    #crosshair::before {
      width: 20px;
      height: 2px;
    }

    #crosshair::after {
      width: 2px;
      height: 20px;
    }

    #announce {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      color: #ffffff;
      font-size: clamp(30px, 7vw, 70px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 0 14px rgba(255,255,255,0.55), 0 3px 14px rgba(0,0,0,0.8);
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
    }

    #announce.show {
      animation: pop 0.55s ease-out forwards;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.45); }
      18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
      58%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    }

    #rotateOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: rgba(4, 8, 14, 0.95);
      color: #ffffff;
      z-index: 100;
      pointer-events: all;
      padding: 24px;
      box-sizing: border-box;
      font-size: clamp(18px, 4.5vw, 30px);
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1.6;
    }

    #joystick {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: min(34vw, 170px);
      height: min(34vw, 170px);
      max-width: 170px;
      max-height: 170px;
      min-width: 120px;
      min-height: 120px;
      pointer-events: none;
      z-index: 30;
    }

    #joystick .base {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(2px);
      box-shadow: inset 0 0 24px rgba(255,255,255,0.04);
    }

    #joystick .knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      height: 34%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(255,255,255,0.26);
      border: 2px solid rgba(255,255,255,0.24);
      box-shadow: 0 0 18px rgba(255,255,255,0.15);
    }

    #shootBtn {
      position: absolute;
      right: 14px;
      bottom: 120px;
      width: min(16vw, 96px);
      height: min(16vw, 96px);
      max-width: 96px;
      max-height: 96px;
      min-width: 80px;
      min-height: 80px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(180deg, #ff6a6a, #d90c0c);
      color: white;
      font-size: clamp(13px, 2.6vw, 18px);
      font-weight: 900;
      letter-spacing: 0.08em;
      box-shadow: 0 10px 30px rgba(255, 42, 42, 0.35), inset 0 0 18px rgba(255,255,255,0.15);
      pointer-events: auto;
      z-index: 40;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #shootBtn:active {
      transform: scale(0.96);
      filter: brightness(1.08);
    }

    #debugLog {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-family: monospace;
      z-index: 50;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
    }

    @media (orientation: portrait) {
      #rotateOverlay {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="c"></canvas>

    <div id="hud">
      <div id="status">
        <div id="scoreBoard">BLUE <span id="blueScore">0</span> / RED <span id="redScore">0</span></div>
        <div id="roundState">ROUND: <span id="roundText">1</span> | 先に5点で勝利</div>
        <span id="ammo">AMMO: <span id="ammoCount">15</span> / 15</span>

        <div id="hpBlock">
          <div id="hpLabel">
            <span>HP</span>
            <span id="hpText">100 / 100</span>
          </div>
          <div id="hpBarOuter">
            <div id="hpBarInner"></div>
          </div>
        </div>
      </div>

      <div id="crosshair"></div>
      <div id="announce"></div>

      <div id="joystick">
        <div class="base"></div>
        <div class="knob" id="knob"></div>
      </div>

      <button id="shootBtn">SHOOT</button>
      <div id="debugLog">move: (0.00, 0.00) yaw: 0.00</div>

      <div id="rotateOverlay">画面を横向きにしてください</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script>
    (() => {
      const canvas = document.getElementById('c');
      const shootBtn = document.getElementById('shootBtn');
      const announce = document.getElementById('announce');
      const blueScoreEl = document.getElementById('blueScore');
      const redScoreEl = document.getElementById('redScore');
      const roundTextEl = document.getElementById('roundText');
      const ammoCountEl = document.getElementById('ammoCount');
      const hpTextEl = document.getElementById('hpText');
      const hpBarInner = document.getElementById('hpBarInner');
      const joystickEl = document.getElementById('joystick');
      const knobEl = document.getElementById('knob');
      const rotateOverlay = document.getElementById('rotateOverlay');
      const debugLog = document.getElementById('debugLog');

      // ─── Audio ───────────────────────────────────────────────────────────────
      let audioCtx = null;
      let gunBuffer = null;

      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          fetch('ju.mp3')
            .then(r => r.arrayBuffer())
            .then(buf => audioCtx.decodeAudioData(buf))
            .then(decoded => {
              gunBuffer = decoded;
              console.log('[Audio] ju.mp3 loaded OK');
            })
            .catch(err => console.warn('[Audio] ju.mp3 load failed:', err));
        } catch (e) {
          console.warn('[Audio] AudioContext init failed:', e);
        }
      }

      function playGunSound() {
        if (!audioCtx || !gunBuffer) return;
        try {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          const src = audioCtx.createBufferSource();
          src.buffer = gunBuffer;
          const gain = audioCtx.createGain();
          gain.gain.value = 0.72;
          src.connect(gain);
          gain.connect(audioCtx.destination);
          src.start(0);
        } catch (e) {
          console.warn('[Audio] playGunSound error:', e);
        }
      }

      // ─── GLTFLoader (inline minimal) ─────────────────────────────────────────
      // Three.js r160 compatible GLTFLoader via CDN
      let GLTFLoader = null;
      const glbScript = document.createElement('script');
      glbScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/examples/js/loaders/GLTFLoader.min.js';
      glbScript.onload = () => {
        if (window.THREE && window.THREE.GLTFLoader) {
          GLTFLoader = window.THREE.GLTFLoader;
          console.log('[GLTFLoader] loaded from THREE.GLTFLoader');
        }
        tryLoadGLBGun();
      };
      glbScript.onerror = () => {
        // fallback: load from jsm CDN
        console.warn('[GLTFLoader] CDN miss, using fallback built-in loader');
        tryLoadGLBGun();
      };
      document.head.appendChild(glbScript);

      // ─── Renderer / Scene ────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: false,
        powerPreference: 'high-performance'
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setClearColor(0x0b0f14, 1);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xc7e2ff);
      scene.fog = new THREE.Fog(0xc7e2ff, 34, 110);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.rotation.order = 'YXZ';
      camera.position.set(-16, 1.6, 0);

      scene.add(new THREE.HemisphereLight(0xeef8ff, 0xaabed3, 2.0));
      const dir = new THREE.DirectionalLight(0xffffff, 2.35);
      dir.position.set(10, 18, 8);
      scene.add(dir);
      scene.add(new THREE.AmbientLight(0xe2effa, 0.96));

      const mazeLights = [
        [-20, -18], [-12, -4], [-4, 12], [6, -10], [14, 6], [22, -16],
        [0, 0], [-8, 20], [18, 18], [-18, 18]
      ];
      for (const [x, z] of mazeLights) {
        const lamp = new THREE.PointLight(0xffffff, 0.55, 18, 2.0);
        lamp.position.set(x, 4.2, z);
        scene.add(lamp);
      }

      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(104, 104),
        new THREE.MeshStandardMaterial({ color: 0x5f6d78, roughness: 0.98, metalness: 0.0 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      const grid = new THREE.GridHelper(104, 52, 0xb8c6d4, 0x8793a0);
      grid.position.y = 0.01;
      scene.add(grid);

      const border = 34;

      const spawnPoints = {
        blue: [
          { x: -26, z: -20 },
          { x: -26, z: -6 },
          { x: -26, z: 6 },
          { x: -26, z: 20 }
        ],
        red: [
          { x: 26, z: -20 },
          { x: 26, z: -6 },
          { x: 26, z: 6 },
          { x: 26, z: 20 }
        ]
      };
      const spawnSafeRadius = 5.0;

      const obstacleData = [];
      const obstacleGroup = new THREE.Group();
      scene.add(obstacleGroup);

      const obstacleMaterials = {
        wall: new THREE.MeshStandardMaterial({ color: 0xa7b2bf, roughness: 0.92, metalness: 0.03 }),
        crate: new THREE.MeshStandardMaterial({ color: 0xb07a45, roughness: 0.96, metalness: 0.0 }),
        metal: new THREE.MeshStandardMaterial({ color: 0x7a8795, roughness: 0.62, metalness: 0.18 }),
        dark: new THREE.MeshStandardMaterial({ color: 0x4e5964, roughness: 0.88, metalness: 0.04 })
      };

      function rectIntersectsCircle(minX, maxX, minZ, maxZ, cx, cz, radius) {
        const nx = THREE.MathUtils.clamp(cx, minX, maxX);
        const nz = THREE.MathUtils.clamp(cz, minZ, maxZ);
        const dx = cx - nx;
        const dz = cz - nz;
        return (dx * dx + dz * dz) <= radius * radius;
      }

      function addObstacle(x, z, sx, sy, sz, matKey = 'wall', yOffset = 0) {
        const minX = x - sx / 2;
        const maxX = x + sx / 2;
        const minZ = z - sz / 2;
        const maxZ = z + sz / 2;

        const spawnZones = [...spawnPoints.blue, ...spawnPoints.red];
        for (const p of spawnZones) {
          if (rectIntersectsCircle(minX, maxX, minZ, maxZ, p.x, p.z, spawnSafeRadius)) {
            return null;
          }
        }

        const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), obstacleMaterials[matKey]);
        mesh.position.set(x, sy / 2 + yOffset, z);
        obstacleGroup.add(mesh);

        obstacleData.push({ minX, maxX, minZ, maxZ });
        return mesh;
      }

      function createMapStructures() {
        addObstacle(-30, 0, 1.2, 4.0, 58, 'wall');
        addObstacle(30, 0, 1.2, 4.0, 58, 'wall');
        addObstacle(0, -30, 58, 4.0, 1.2, 'wall');
        addObstacle(0, 30, 58, 4.0, 1.2, 'wall');

        addObstacle(0, 0, 9.2, 2.6, 9.2, 'metal');
        addObstacle(-2.8, 0, 2.0, 4.8, 2.0, 'crate');
        addObstacle(2.8, 0, 2.0, 4.8, 2.0, 'crate');

        addObstacle(-20, -18, 6.5, 2.2, 1.4, 'dark');
        addObstacle(-20, -10, 1.4, 2.8, 7.5, 'wall');
        addObstacle(-24, -2, 7.5, 1.8, 1.4, 'crate');
        addObstacle(-18, 6, 1.4, 3.2, 7.4, 'metal');
        addObstacle(-24, 14, 7.5, 2.2, 1.4, 'dark');
        addObstacle(-17, 18, 1.4, 2.6, 6.0, 'crate');

        addObstacle(20, 18, 6.5, 2.2, 1.4, 'dark');
        addObstacle(20, 10, 1.4, 2.8, 7.5, 'wall');
        addObstacle(24, 2, 7.5, 1.8, 1.4, 'crate');
        addObstacle(18, -6, 1.4, 3.2, 7.4, 'metal');
        addObstacle(24, -14, 7.5, 2.2, 1.4, 'dark');
        addObstacle(17, -18, 1.4, 2.6, 6.0, 'crate');

        addObstacle(-8, -22, 1.4, 3.0, 9.0, 'crate');
        addObstacle(8, -22, 1.4, 3.0, 9.0, 'crate');
        addObstacle(-8, 22, 1.4, 3.0, 9.0, 'crate');
        addObstacle(8, 22, 1.4, 3.0, 9.0, 'crate');

        addObstacle(-12, -6, 8.0, 2.2, 1.4, 'wall');
        addObstacle(-12, 6, 1.4, 2.2, 8.0, 'wall');
        addObstacle(12, 6, 8.0, 2.2, 1.4, 'wall');
        addObstacle(12, -6, 1.4, 2.2, 8.0, 'wall');

        addObstacle(-6, -14, 1.4, 2.0, 6.8, 'metal');
        addObstacle(6, 14, 1.4, 2.0, 6.8, 'metal');

        addObstacle(-26, -4, 4.0, 2.6, 1.2, 'crate');
        addObstacle(-26, 4, 4.0, 2.6, 1.2, 'crate');
        addObstacle(26, -4, 4.0, 2.6, 1.2, 'crate');
        addObstacle(26, 4, 4.0, 2.6, 1.2, 'crate');

        addObstacle(-4, -26, 1.2, 2.6, 4.0, 'metal');
        addObstacle(4, -26, 1.2, 2.6, 4.0, 'metal');
        addObstacle(-4, 26, 1.2, 2.6, 4.0, 'metal');
        addObstacle(4, 26, 1.2, 2.6, 4.0, 'metal');

        const pillars = [
          [-22, -22], [-14, -22], [-6, -22], [6, -22], [14, -22], [22, -22],
          [-22, 22], [-14, 22], [-6, 22], [6, 22], [14, 22], [22, 22],
          [-22, -14], [-22, -6], [-22, 6], [-22, 14],
          [22, -14], [22, -6], [22, 6], [22, 14],
          [-10, -10], [10, 10], [-10, 10], [10, -10],
          [0, -18], [0, 18], [-18, 0], [18, 0]
        ];
        for (const [x, z] of pillars) {
          addObstacle(x, z, 1.1, 3.4, 1.1, (Math.abs(x) + Math.abs(z)) % 2 === 0 ? 'crate' : 'metal');
        }

        addObstacle(-15, 0, 4.0, 1.0, 1.2, 'dark');
        addObstacle(15, 0, 4.0, 1.0, 1.2, 'dark');
        addObstacle(0, -15, 1.2, 1.0, 4.0, 'dark');
        addObstacle(0, 15, 1.2, 1.0, 4.0, 'dark');
      }

      createMapStructures();

      function isBlocked(x, z, radius = 0.48) {
        for (const o of obstacleData) {
          const cx = THREE.MathUtils.clamp(x, o.minX, o.maxX);
          const cz = THREE.MathUtils.clamp(z, o.minZ, o.maxZ);
          const dx = x - cx;
          const dz = z - cz;
          if ((dx * dx + dz * dz) < radius * radius) return true;
        }
        return false;
      }

      function moveEntityXZ(entity, dx, dz, radius = 0.48) {
        const pos = entity.position;
        const nextX = pos.x + dx;
        const nextZ = pos.z + dz;

        const withinBounds = Math.abs(nextX) <= border && Math.abs(nextZ) <= border;
        if (withinBounds && !isBlocked(nextX, nextZ, radius)) {
          pos.x = nextX;
          pos.z = nextZ;
          return true;
        }

        let moved = false;
        const xOnly = pos.x + dx;
        if (Math.abs(xOnly) <= border && !isBlocked(xOnly, pos.z, radius)) {
          pos.x = xOnly;
          moved = true;
        }

        const zOnly = pos.z + dz;
        if (Math.abs(zOnly) <= border && !isBlocked(pos.x, zOnly, radius)) {
          pos.z = zOnly;
          moved = true;
        }

        return moved;
      }

      function segmentIntersectsRect2D(x1, z1, x2, z2, minX, maxX, minZ, maxZ, radius = 0.05) {
        const left = minX - radius;
        const right = maxX + radius;
        const top = minZ - radius;
        const bottom = maxZ + radius;

        let t0 = 0;
        let t1 = 1;
        const dx = x2 - x1;
        const dz = z2 - z1;

        const checks = [
          [-dx, x1 - left],
          [ dx, right - x1],
          [-dz, z1 - top],
          [ dz, bottom - z1]
        ];

        for (const [p, q] of checks) {
          if (Math.abs(p) < 1e-8) {
            if (q < 0) return false;
          } else {
            const r = q / p;
            if (p < 0) {
              if (r > t1) return false;
              if (r > t0) t0 = r;
            } else {
              if (r < t0) return false;
              if (r < t1) t1 = r;
            }
          }
        }

        return true;
      }

      function bulletHitsAnyObstacle(prev, next) {
        for (const o of obstacleData) {
          if (segmentIntersectsRect2D(prev.x, prev.z, next.x, next.z, o.minX, o.maxX, o.minZ, o.maxZ, 0.06)) {
            return true;
          }
        }
        return false;
      }

      const TEAM = { BLUE: 'blue', RED: 'red' };
      const TEAM_SIZE = 4;
      const WIN_SCORE = 5;

      const units = [];
      const bullets = [];

      const group = new THREE.Group();
      scene.add(group);

      const unitMaterials = {
        blueBody: new THREE.MeshStandardMaterial({ color: 0x2f7dff, roughness: 0.65, metalness: 0.05 }),
        blueHead: new THREE.MeshStandardMaterial({ color: 0x64a4ff, roughness: 0.45, metalness: 0.05 }),
        redBody: new THREE.MeshStandardMaterial({ color: 0xd72626, roughness: 0.65, metalness: 0.05 }),
        redHead: new THREE.MeshStandardMaterial({ color: 0xff4a4a, roughness: 0.45, metalness: 0.05 })
      };

      const bulletMaterial = new THREE.MeshStandardMaterial({
        color: 0xf2f2f2,
        roughness: 0.35,
        metalness: 0.15
      });

      const enemyBulletMaterial = new THREE.MeshStandardMaterial({
        color: 0xff2f2f,
        roughness: 0.3,
        metalness: 0.1
      });

      const player = {
        hp: 100,
        maxHp: 100,
        hurtFlash: 0,
        alive: true
      };

      let yaw = 0;
      let pitch = 0;
      let roundIndex = 1;
      let blueScore = 0;
      let redScore = 0;
      let portraitMode = window.innerHeight > window.innerWidth;
      let joystickTouchId = null;
      let aimTouchId = null;
      let roundEnding = false;
      let matchOver = false;
      let roundResetTimer = 0;
      let firingHeld = false;
      let fireLoopTimer = null;
      let reloading = false;
      let reloadTimer = 0;

      const joy = { x: 0, y: 0 };
      const aim = { lastX: 0, lastY: 0 };

      const clock = new THREE.Clock();

      const MAG_SIZE = 15;
      const FIRE_INTERVAL = 0.11;
      const RELOAD_TIME = 1.15;
      const DAMAGE_PER_BULLET = 25;
      const PLAYER_MOVE_SPEED = 5.5;

      let ammo = MAG_SIZE;

      function updateOrientationUI() {
        portraitMode = window.innerHeight > window.innerWidth;
        rotateOverlay.style.display = portraitMode ? 'flex' : 'none';
      }

      function updateAmmoUI() {
        ammoCountEl.textContent = String(ammo);
      }

      function updatePlayerHPUI() {
        const pct = Math.max(0, player.hp) / player.maxHp;
        hpBarInner.style.width = `${pct * 100}%`;
        hpTextEl.textContent = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        if (pct > 0.6) {
          hpBarInner.style.background = 'linear-gradient(90deg, #3cff7d, #29d65e)';
        } else if (pct > 0.3) {
          hpBarInner.style.background = 'linear-gradient(90deg, #ffd84d, #ffb51e)';
        } else {
          hpBarInner.style.background = 'linear-gradient(90deg, #ff6a6a, #d90c0c)';
        }
      }

      function updateScoreUI() {
        blueScoreEl.textContent = String(blueScore);
        redScoreEl.textContent = String(redScore);
        roundTextEl.textContent = String(roundIndex);
      }

      function showAnnouncement(text) {
        announce.textContent = text;
        announce.classList.remove('show');
        void announce.offsetWidth;
        announce.classList.add('show');
        clearTimeout(showAnnouncement._t);
        showAnnouncement._t = setTimeout(() => announce.classList.remove('show'), 540);
      }

      function clampCamera() {
        camera.position.x = THREE.MathUtils.clamp(camera.position.x, -border, border);
        camera.position.z = THREE.MathUtils.clamp(camera.position.z, -border, border);
        camera.position.y = 1.6;
      }

      function getSpawnPoint(team, index = 0) {
        const list = team === TEAM.BLUE ? spawnPoints.blue : spawnPoints.red;
        return list[index % list.length];
      }

      function createUnit(team, isPlayer = false) {
        const unit = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.32, 0.88, 6, 12),
          team === TEAM.BLUE ? unitMaterials.blueBody : unitMaterials.redBody
        );
        body.position.y = 1.05;
        unit.add(body);

        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 14, 10),
          team === TEAM.BLUE ? unitMaterials.blueHead : unitMaterials.redHead
        );
        head.position.y = 1.72;
        unit.add(head);

        unit.userData = {
          team,
          isPlayer,
          alive: true,
          level: 1,
          hp: 100,
          maxHp: 100,
          radius: 1.0,
          moveSpeed: 1.0,
          bulletDamage: 8,
          bulletSpeed: 16,
          fireMin: 0.35,
          fireMax: 1.2,
          fireCooldown: THREE.MathUtils.randFloat(0.35, 1.2),
          wanderDir: new THREE.Vector2(THREE.MathUtils.randFloat(-1, 1), THREE.MathUtils.randFloat(-1, 1)).normalize(),
          wanderTimer: THREE.MathUtils.randFloat(0.8, 2.5)
        };

        if (isPlayer) {
          unit.visible = false;
        }

        scene.add(unit);
        units.push(unit);
        return unit;
      }

      function applyGrowthStats(unit, refillHp = true) {
        const level = Math.max(1, unit.userData.level || 1);
        unit.userData.maxHp = Math.round(100 + (level - 1) * 20);
        if (refillHp) {
          unit.userData.hp = unit.userData.maxHp;
        } else {
          unit.userData.hp = Math.min(unit.userData.hp, unit.userData.maxHp);
        }
        unit.userData.radius = 1.0 + (level - 1) * 0.02;
        unit.userData.moveSpeed = 1.0 + (level - 1) * 0.06;
        unit.userData.bulletDamage = 8 + (level - 1) * 1.4;
        unit.userData.bulletSpeed = 16 + (level - 1) * 0.35;
        unit.userData.fireMin = Math.max(0.18, 0.35 - (level - 1) * 0.02);
        unit.userData.fireMax = Math.max(0.55, 1.2 - (level - 1) * 0.05);
      }

      function growTeam(team, amount = 1) {
        for (const unit of units) {
          if (!unit.userData.alive || unit.userData.team !== team) continue;
          unit.userData.level = Math.min((unit.userData.level || 1) + amount, 20);
          applyGrowthStats(unit, false);
          unit.scale.setScalar(1 + (unit.userData.level - 1) * 0.02);
        }
      }

      function respawnRound() {
        if (matchOver) return;

        roundEnding = false;
        roundResetTimer = 0;

        const blueUnits = [playerUnit, ...blueBots];
        const redUnits = [...redBots];

        blueUnits.forEach((u, i) => {
          const p = getSpawnPoint(TEAM.BLUE, i);
          u.position.set(p.x, 0, p.z);
        });
        redUnits.forEach((u, i) => {
          const p = getSpawnPoint(TEAM.RED, i);
          u.position.set(p.x, 0, p.z);
        });

        camera.position.set(getSpawnPoint(TEAM.BLUE, 0).x, 1.6, getSpawnPoint(TEAM.BLUE, 0).z);
        yaw = 0;
        pitch = 0;

        for (const u of units) {
          u.userData.level = Math.min((u.userData.level || 1) + 1, 12);
        }

        applyGrowthStats(playerUnit);

        player.hp = playerUnit.userData.maxHp;
        player.alive = true;
        updatePlayerHPUI();

        playerUnit.visible = false;
        for (const u of blueBots) {
          u.visible = true;
          u.userData.alive = true;
          applyGrowthStats(u);
        }
        for (const u of redBots) {
          u.visible = true;
          u.userData.alive = true;
          applyGrowthStats(u);
        }

        clearBullets();
        ammo = MAG_SIZE;
        reloading = false;
        reloadTimer = 0;
        firingHeld = false;
        updateAmmoUI();
        updateOrientationUI();
      }

      function clearBullets() {
        for (const b of bullets) {
          group.remove(b);
          if (b.geometry) b.geometry.dispose();
        }
        bullets.length = 0;
      }

      function startReload() {
        if (reloading || roundEnding || matchOver || !player.alive) return;
        reloading = true;
        firingHeld = false;
        if (fireLoopTimer !== null) {
          clearInterval(fireLoopTimer);
          fireLoopTimer = null;
        }
        reloadTimer = RELOAD_TIME;
      }

      function finishReload() {
        ammo = MAG_SIZE;
        reloading = false;
        updateAmmoUI();
      }

      function distancePointToSegment(point, a, b) {
        const ab = new THREE.Vector3().subVectors(b, a);
        const ap = new THREE.Vector3().subVectors(point, a);
        const abLenSq = ab.lengthSq();
        if (abLenSq < 1e-8) return point.distanceTo(a);
        const t = THREE.MathUtils.clamp(ap.dot(ab) / abLenSq, 0, 1);
        const closest = a.clone().add(ab.multiplyScalar(t));
        return point.distanceTo(closest);
      }

      function createBullet(position, direction, team, speed, life, damage) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 10, 10),
          team === TEAM.BLUE ? bulletMaterial : enemyBulletMaterial
        );
        mesh.position.copy(position);
        mesh.userData = {
          dir: direction.clone().normalize(),
          prev: position.clone(),
          speed,
          life,
          damage,
          team
        };
        group.add(mesh);
        bullets.push(mesh);
      }

      function getAliveUnitsByTeam(team) {
        return units.filter(u => u.userData.team === team && u.userData.alive);
      }

      function getNearestEnemy(unit) {
        const enemies = units.filter(u => u.userData.alive && u.userData.team !== unit.userData.team);
        let best = null;
        let bestDist = Infinity;
        for (const enemy of enemies) {
          const d = unit.position.distanceTo(enemy.position);
          if (d < bestDist) {
            bestDist = d;
            best = enemy;
          }
        }
        return best;
      }

      function endRound(winnerTeam) {
        if (roundEnding || matchOver) return;
        roundEnding = true;

        if (winnerTeam === TEAM.BLUE) blueScore++;
        else redScore++;

        updateScoreUI();
        showAnnouncement(`${winnerTeam === TEAM.BLUE ? 'BLUE' : 'RED'} +1`);

        clearBullets();
        reloading = false;
        firingHeld = false;
        if (fireLoopTimer !== null) {
          clearInterval(fireLoopTimer);
          fireLoopTimer = null;
        }

        if (blueScore >= WIN_SCORE || redScore >= WIN_SCORE) {
          matchOver = true;
          roundResetTimer = 0;
          setTimeout(() => {
            showAnnouncement(`${blueScore >= WIN_SCORE ? 'BLUE WIN' : 'RED WIN'}`);
          }, 40);
          return;
        }

        roundResetTimer = 1.5;
      }

      function checkRoundEnd() {
        if (roundEnding || matchOver) return;
        const blueAlive = getAliveUnitsByTeam(TEAM.BLUE).length;
        const redAlive = getAliveUnitsByTeam(TEAM.RED).length;
        if (blueAlive === 0 && redAlive > 0) endRound(TEAM.RED);
        else if (redAlive === 0 && blueAlive > 0) endRound(TEAM.BLUE);
        else if (redAlive === 0 && blueAlive === 0) endRound(Math.random() < 0.5 ? TEAM.BLUE : TEAM.RED);
      }

      function shootPlayer() {
        if (portraitMode || roundEnding || matchOver || reloading || !player.alive) return;
        if (ammo <= 0) {
          startReload();
          return;
        }

        ammo--;
        updateAmmoUI();
        playGunSound();

        const dirVec = new THREE.Vector3();
        camera.getWorldDirection(dirVec);
        const spawnPos = camera.position.clone().add(dirVec.clone().multiplyScalar(0.92));
        createBullet(spawnPos, dirVec, TEAM.BLUE, 34, 1.7, DAMAGE_PER_BULLET);

        // Recoil on built-in gun
        gun.userData.recoil = 1.0;

        if (ammo <= 0) startReload();
      }

      function setFiringHeld(state) {
        if (state) initAudio();
        firingHeld = state;
        if (state && !reloading && !roundEnding && !matchOver && player.alive && fireLoopTimer === null) {
          shootPlayer();
          fireLoopTimer = setInterval(() => {
            if (!firingHeld || reloading || roundEnding || matchOver || !player.alive) {
              clearInterval(fireLoopTimer);
              fireLoopTimer = null;
              return;
            }
            shootPlayer();
          }, FIRE_INTERVAL * 1000);
        } else if (!state && fireLoopTimer !== null) {
          clearInterval(fireLoopTimer);
          fireLoopTimer = null;
        }
      }

      function setJoystickFromTouch(touch) {
        const rect = joystickEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        let dx = touch.clientX - cx;
        let dy = touch.clientY - cy;
        const len = Math.hypot(dx, dy);
        const max = rect.width * 0.30;

        if (len > max) {
          dx = dx / len * max;
          dy = dy / len * max;
        }

        joy.x = dx / max;
        joy.y = dy / max;
        knobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }

      function resetJoystickVisual() {
        joy.x = 0;
        joy.y = 0;
        knobEl.style.transform = 'translate(-50%, -50%)';
      }

      // ─── 【移動ロジック完全修正版】─────────────────────────────────────────
      // ラーメン屋ゲームと完全に同じ: カメラの向き(yaw)を基準としたローカル移動
      // camera.rotation.order = 'YXZ' のとき:
      //   カメラ正面方向（前） = (-sin(yaw), 0, -cos(yaw))
      //   カメラ右方向         = ( cos(yaw), 0, -sin(yaw))
      // joy.y < 0 → スティック上 → 前進 → forwardInput = -joy.y > 0
      // joy.x > 0 → スティック右 → 右移動 → strafeInput = joy.x > 0
      function movePlayer(dt) {
        if (!player.alive) return;

        const mag = Math.hypot(joy.x, joy.y);
        if (mag < 0.03) return;

        // ジョイスティック入力 (スティック上=前進, 右=右移動)
        const strafeInput  =  joy.x;   // 右が正
        const forwardInput = -joy.y;   // 上が正（前進）

        // yaw(カメラのY軸回転)から前進・右方向ベクトルを計算
        // Three.js YXZ order で rotation.y = yaw の場合:
        //   前方向: -sin(yaw), 0, -cos(yaw)
        //   右方向:  cos(yaw), 0, -sin(yaw)
        const fwdX = -Math.sin(yaw);
        const fwdZ = -Math.cos(yaw);
        const rgtX =  Math.cos(yaw);
        const rgtZ = -Math.sin(yaw);

        const speed = PLAYER_MOVE_SPEED * Math.min(mag, 1.0);

        const moveX = (fwdX * forwardInput + rgtX * strafeInput) * speed * dt;
        const moveZ = (fwdZ * forwardInput + rgtZ * strafeInput) * speed * dt;

        moveEntityXZ(camera, moveX, moveZ, 0.45);
        clampCamera();

        // デバッグログ
        debugLog.textContent =
          `joy(${joy.x.toFixed(2)},${joy.y.toFixed(2)}) ` +
          `fwd(${fwdX.toFixed(2)},${fwdZ.toFixed(2)}) ` +
          `move(${moveX.toFixed(3)},${moveZ.toFixed(3)}) ` +
          `yaw:${(yaw * 180 / Math.PI).toFixed(1)}°`;
      }

      function updatePlayerUnit() {
        playerUnit.position.copy(camera.position);
        playerUnit.visible = false;
      }

      function updatePlayerDeathState() {
        player.alive = player.hp > 0;
        if (!player.alive) {
          firingHeld = false;
          if (fireLoopTimer !== null) {
            clearInterval(fireLoopTimer);
            fireLoopTimer = null;
          }
        }
      }

      // ─── Built-in Gun (fallback / always visible) ────────────────────────────
      const gun = new THREE.Group();
      gun.position.set(1.58, -0.40, -0.98);
      gun.rotation.set(-0.14, -0.18, 0.10);
      gun.scale.setScalar(1.18);
      gun.userData.recoil = 0;
      camera.add(gun);

      const gunMatDark = new THREE.MeshStandardMaterial({ color: 0x20252b, roughness: 0.68, metalness: 0.18 });
      const gunMatLight = new THREE.MeshStandardMaterial({ color: 0x3d4650, roughness: 0.5, metalness: 0.24 });
      const gunMatAccent = new THREE.MeshStandardMaterial({ color: 0x6f7a86, roughness: 0.36, metalness: 0.36 });

      const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.20, 0.30), gunMatDark);
      gunBody.position.set(0, 0.03, 0);
      gun.add(gunBody);

      const gunTop = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.12, 0.16), gunMatLight);
      gunTop.position.set(0.16, 0.15, -0.03);
      gun.add(gunTop);

      const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.08, 0.08), gunMatAccent);
      barrel.position.set(0.48, 0.09, -0.03);
      gun.add(barrel);

      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.34, 0.14), gunMatDark);
      grip.position.set(-0.08, -0.20, 0.02);
      grip.rotation.z = 0.28;
      gun.add(grip);

      const mag = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.28, 0.13), gunMatLight);
      mag.position.set(0.03, -0.21, 0.05);
      mag.rotation.z = -0.12;
      gun.add(mag);

      const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.055, 0.12, 10), gunMatAccent);
      muzzle.rotation.z = Math.PI / 2;
      muzzle.position.set(0.67, 0.09, -0.03);
      gun.add(muzzle);

      const sight = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.06, 0.09), gunMatLight);
      sight.position.set(0.02, 0.22, -0.01);
      gun.add(sight);

      const handguard = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.11, 0.10), gunMatDark);
      handguard.position.set(0.28, 0.03, 0.05);
      gun.add(handguard);

      const stock = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.14, 0.14), gunMatLight);
      stock.position.set(-0.30, 0.06, 0.02);
      stock.rotation.z = -0.12;
      gun.add(stock);

      // ─── GLB Gun loader ──────────────────────────────────────────────────────
      // ju.glb を右下（カメラに追従）に配置する
      // ロードに失敗したらビルトインgunがそのまま表示される
      let glbGun = null;

      function tryLoadGLBGun() {
        // three.js r160のGLTFLoaderはTHREE名前空間にないため、
        // addons CDNを試みる
        const loaderUrl = 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // Dynamic import (ESModule)
        import(/* @vite-ignore */ loaderUrl)
          .then(mod => {
            const Loader = mod.GLTFLoader;
            const loader = new Loader();
            loader.load(
              'ju.glb',
              (gltf) => {
                glbGun = gltf.scene;

                // カメラ右下に配置 (ビルトインgunと同じポジション)
                glbGun.position.set(0.22, -0.30, -0.55);
                glbGun.rotation.set(0.04, -Math.PI + 0.15, 0.05);
                glbGun.scale.setScalar(0.18);

                camera.add(glbGun);

                // ビルトインを非表示にしてGLBを優先
                gun.visible = false;

                console.log('[GLB] ju.glb loaded OK');
              },
              (prog) => {
                console.log('[GLB] progress', prog.loaded, '/', prog.total);
              },
              (err) => {
                console.warn('[GLB] ju.glb load error (built-in gun will be used):', err);
              }
            );
          })
          .catch(err => {
            console.warn('[GLB] GLTFLoader ESM import failed, trying fallback XMLHttpRequest method:', err);
            tryLoadGLBXHR();
          });
      }

      // XHR経由フォールバック (CDN ESMが使えない環境用)
      function tryLoadGLBXHR() {
        // Already tried with script tag, skip if no GLTFLoader available
        if (typeof THREE.GLTFLoader === 'undefined') {
          console.warn('[GLB] No GLTFLoader available. Using built-in polygon gun.');
          return;
        }
        const loader = new THREE.GLTFLoader();
        loader.load('ju.glb',
          (gltf) => {
            glbGun = gltf.scene;
            glbGun.position.set(0.22, -0.30, -0.55);
            glbGun.rotation.set(0.04, -Math.PI + 0.15, 0.05);
            glbGun.scale.setScalar(0.18);
            camera.add(glbGun);
            gun.visible = false;
            console.log('[GLB-XHR] ju.glb loaded OK');
          },
          undefined,
          (err) => {
            console.warn('[GLB-XHR] ju.glb failed:', err);
          }
        );
      }

      function updateGun() {
        const recoil = gun.userData.recoil || 0;
        gun.userData.recoil = THREE.MathUtils.lerp(recoil, 0, 0.16);
        const r = gun.userData.recoil;

        const targetPos = new THREE.Vector3(1.58, -0.40 + r * 0.12, -0.98 + r * 0.18);
        gun.position.lerp(targetPos, 0.26);

        gun.rotation.x = THREE.MathUtils.lerp(gun.rotation.x, -0.14 - r * 0.18, 0.22);
        gun.rotation.y = THREE.MathUtils.lerp(gun.rotation.y, -0.18, 0.22);
        gun.rotation.z = THREE.MathUtils.lerp(gun.rotation.z, 0.10 + r * 0.03, 0.22);

        // GLBがあればそちらにもrecoilを反映
        if (glbGun) {
          glbGun.position.z = THREE.MathUtils.lerp(glbGun.position.z, -0.55 + r * 0.08, 0.26);
          glbGun.rotation.x = THREE.MathUtils.lerp(glbGun.rotation.x, 0.04 + r * 0.15, 0.22);
        }
      }

      // ─── AI ──────────────────────────────────────────────────────────────────
      function aiUpdate(unit, time, dt) {
        if (!unit.userData.alive || unit.userData.isPlayer) return;

        unit.userData.wanderTimer -= dt;
        if (unit.userData.wanderTimer <= 0) {
          unit.userData.wanderTimer = THREE.MathUtils.randFloat(0.8, 2.5);
          unit.userData.wanderDir.set(THREE.MathUtils.randFloat(-1, 1), THREE.MathUtils.randFloat(-1, 1)).normalize();
        }

        const target = getNearestEnemy(unit);
        if (!target) return;

        const dx = target.position.x - unit.position.x;
        const dz = target.position.z - unit.position.z;
        const dist = Math.hypot(dx, dz);

        let vx = unit.userData.wanderDir.x * 0.7;
        let vz = unit.userData.wanderDir.y * 0.7;

        if (dist < 28) {
          const chaseX = dx / Math.max(dist, 0.001);
          const chaseZ = dz / Math.max(dist, 0.001);
          vx = vx * 0.35 + chaseX * 1.1;
          vz = vz * 0.35 + chaseZ * 1.1;
        }

        const unitSpeed = 2.15 * (unit.userData.moveSpeed || 1);
        const moved = moveEntityXZ(unit, vx * dt * unitSpeed, vz * dt * unitSpeed, 0.52);
        unit.position.y = Math.sin(time * 2 + unit.id) * 0.05;

        if (!moved || unit.position.x < -border + 1 || unit.position.x > border - 1) {
          unit.userData.wanderDir.x *= -1;
          unit.position.x = THREE.MathUtils.clamp(unit.position.x, -border + 1, border - 1);
        }
        if (!moved || unit.position.z < -border + 1 || unit.position.z > border - 1) {
          unit.userData.wanderDir.y *= -1;
          unit.position.z = THREE.MathUtils.clamp(unit.position.z, -border + 1, border - 1);
        }

        unit.lookAt(target.position.x, target.position.y + 1.0, target.position.z);

        unit.userData.fireCooldown -= dt;
        const shootRange = 42;
        if (unit.userData.fireCooldown <= 0 && dist < shootRange && !roundEnding && !matchOver) {
          const muzzlePos = new THREE.Vector3(unit.position.x, unit.position.y + 1.55, unit.position.z);
          const aimPos = target.position.clone();
          aimPos.y += 0.05;
          const dir = aimPos.sub(muzzlePos).normalize();
          createBullet(
            muzzlePos.clone().add(dir.clone().multiplyScalar(0.25)),
            dir,
            unit.userData.team,
            unit.userData.bulletSpeed || 16,
            4.0,
            unit.userData.bulletDamage || 8
          );
          unit.userData.fireCooldown = THREE.MathUtils.randFloat(unit.userData.fireMin || 0.9, unit.userData.fireMax || 1.75);
        }
      }

      function updateBullets(dt) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          const data = bullet.userData;

          data.prev.copy(bullet.position);
          bullet.position.addScaledVector(data.dir, data.speed * dt);
          data.life -= dt;

          if (data.life <= 0) {
            group.remove(bullet);
            bullet.geometry.dispose();
            bullets.splice(i, 1);
            continue;
          }

          if (bulletHitsAnyObstacle(data.prev, bullet.position)) {
            group.remove(bullet);
            bullet.geometry.dispose();
            bullets.splice(i, 1);
            continue;
          }

          const hitTeam = data.team === TEAM.BLUE ? TEAM.RED : TEAM.BLUE;
          const targetUnits = units.filter(u => u.userData.alive && u.userData.team === hitTeam);

          for (const unit of targetUnits) {
            const center = new THREE.Vector3(unit.position.x, unit.position.y + 1.05, unit.position.z);
            if (distancePointToSegment(center, data.prev, bullet.position) < unit.userData.radius) {
              unit.userData.hp -= data.damage;

              group.remove(bullet);
              bullet.geometry.dispose();
              bullets.splice(i, 1);

              if (unit.userData.isPlayer) {
                player.hp = Math.max(0, unit.userData.hp);
                player.maxHp = unit.userData.maxHp || player.maxHp;
                player.hurtFlash = 1;
                updatePlayerHPUI();
              }

              if (unit.userData.hp <= 0) {
                unit.userData.alive = false;
                if (unit.userData.isPlayer) {
                  player.hp = 0;
                  updatePlayerHPUI();
                  updatePlayerDeathState();
                  showAnnouncement('YOU DOWN');
                }
                unit.visible = false;
                growTeam(data.team, 1);
              }

              break;
            }
          }
        }
      }

      function updatePlayerDamageFlash(dt) {
        if (player.hurtFlash > 0) {
          player.hurtFlash = Math.max(0, player.hurtFlash - dt * 1.8);
          document.body.style.boxShadow = `inset 0 0 0 9999px rgba(255, 0, 0, ${player.hurtFlash * 0.12})`;
        } else {
          document.body.style.boxShadow = '';
        }
      }

      function updateReload(dt) {
        if (!reloading) return;
        reloadTimer -= dt;
        if (reloadTimer <= 0) finishReload();
      }

      function resetForNextRound() {
        if (matchOver) return;
        roundIndex++;
        updateScoreUI();
        respawnRound();
      }

      function handlePlayerInput(dt) {
        if (portraitMode || roundEnding || matchOver || !player.alive) return;

        movePlayer(dt);
        updatePlayerUnit();
      }

      // ─── Touch / Mouse Controls ───────────────────────────────────────────────
      shootBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        setFiringHeld(true);
      }, { passive: false });

      shootBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        setFiringHeld(false);
      }, { passive: false });

      shootBtn.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        setFiringHeld(false);
      }, { passive: false });

      shootBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        initAudio();
        setFiringHeld(true);
      });

      document.addEventListener('mouseup', () => setFiringHeld(false));
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // マウスで視点操作 (デスクトップ確認用)
      let mouseLocked = false;
      canvas.addEventListener('click', () => {
        if (!portraitMode && canvas.requestPointerLock) {
          canvas.requestPointerLock();
        }
      });
      document.addEventListener('pointerlockchange', () => {
        mouseLocked = document.pointerLockElement === canvas;
      });
      document.addEventListener('mousemove', (e) => {
        if (!mouseLocked) return;
        const sensitivity = 0.0022;
        yaw   -= e.movementX * sensitivity;
        pitch -= e.movementY * sensitivity;
        const pitchLimit = Math.PI / 2 - 0.05;
        pitch = THREE.MathUtils.clamp(pitch, -pitchLimit, pitchLimit);
      });

      // キーボード移動 (WASD) ─ デスクトップ確認用
      const keys = {};
      document.addEventListener('keydown', (e) => { keys[e.code] = true; });
      document.addEventListener('keyup',   (e) => { keys[e.code] = false; });

      function handleKeyboard(dt) {
        if (!player.alive || portraitMode) return;
        let fx = 0, fz = 0;
        if (keys['KeyW'] || keys['ArrowUp'])    { fx += 1; }
        if (keys['KeyS'] || keys['ArrowDown'])   { fx -= 1; }
        if (keys['KeyA'] || keys['ArrowLeft'])   { fz -= 1; }
        if (keys['KeyD'] || keys['ArrowRight'])  { fz += 1; }
        if (fx === 0 && fz === 0) return;
        const fwdX = -Math.sin(yaw);
        const fwdZ = -Math.cos(yaw);
        const rgtX =  Math.cos(yaw);
        const rgtZ = -Math.sin(yaw);
        const speed = PLAYER_MOVE_SPEED;
        const moveX = (fwdX * fx + rgtX * fz) * speed * dt;
        const moveZ = (fwdZ * fx + rgtZ * fz) * speed * dt;
        moveEntityXZ(camera, moveX, moveZ, 0.45);
        clampCamera();
      }

      // タッチ操作
      document.addEventListener('touchstart', (e) => {
        if (portraitMode) return;

        for (const touch of e.changedTouches) {
          const x = touch.clientX;
          const y = touch.clientY;

          const shootRect = shootBtn.getBoundingClientRect();
          const joyRect = joystickEl.getBoundingClientRect();

          const inShoot = x >= shootRect.left && x <= shootRect.right && y >= shootRect.top && y <= shootRect.bottom;
          const inJoy = x >= joyRect.left && x <= joyRect.right && y >= joyRect.top && y <= joyRect.bottom;

          if (inShoot) continue;

          if (inJoy && joystickTouchId === null) {
            joystickTouchId = touch.identifier;
            setJoystickFromTouch(touch);
            continue;
          }

          if (x > window.innerWidth * 0.42 && aimTouchId === null) {
            aimTouchId = touch.identifier;
            aim.lastX = x;
            aim.lastY = y;
          }
        }
      }, { passive: false });

      document.addEventListener('touchmove', (e) => {
        if (portraitMode) return;

        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            setJoystickFromTouch(touch);
          }

          if (touch.identifier === aimTouchId) {
            const dx = touch.clientX - aim.lastX;
            const dy = touch.clientY - aim.lastY;
            aim.lastX = touch.clientX;
            aim.lastY = touch.clientY;

            const sensitivity = 0.0046;
            yaw -= dx * sensitivity;
            pitch -= dy * sensitivity;

            const pitchLimit = Math.PI / 2 - 0.05;
            pitch = THREE.MathUtils.clamp(pitch, -pitchLimit, pitchLimit);
          }
        }

        if (joystickTouchId !== null || aimTouchId !== null) e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchend', (e) => {
        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            joystickTouchId = null;
            resetJoystickVisual();
          }
          if (touch.identifier === aimTouchId) {
            aimTouchId = null;
          }
        }
      }, { passive: false });

      document.addEventListener('touchcancel', (e) => {
        for (const touch of e.changedTouches) {
          if (touch.identifier === joystickTouchId) {
            joystickTouchId = null;
            resetJoystickVisual();
          }
          if (touch.identifier === aimTouchId) {
            aimTouchId = null;
          }
        }
      }, { passive: false });

      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        updateOrientationUI();
      }

      // ─── Units ───────────────────────────────────────────────────────────────
      const playerUnit = createUnit(TEAM.BLUE, true);
      const blueBots = [createUnit(TEAM.BLUE), createUnit(TEAM.BLUE), createUnit(TEAM.BLUE)];
      const redBots  = [createUnit(TEAM.RED),  createUnit(TEAM.RED),  createUnit(TEAM.RED),  createUnit(TEAM.RED)];

      // ─── Main Loop ───────────────────────────────────────────────────────────
      function animate() {
        requestAnimationFrame(animate);

        const dt = Math.min(clock.getDelta(), 0.033);
        const t = clock.elapsedTime;

        if (!matchOver) {
          if (!roundEnding) {
            handlePlayerInput(dt);
            handleKeyboard(dt);
            updatePlayerUnit();
            updateGun();

            for (const u of units) {
              aiUpdate(u, t, dt);
            }

            updateBullets(dt);
            checkRoundEnd();
          } else {
            roundResetTimer -= dt;
            if (roundResetTimer <= 0) {
              resetForNextRound();
            }
          }

          updateReload(dt);
          updatePlayerDamageFlash(dt);
        }

        camera.rotation.x = pitch;
        camera.rotation.y = yaw;
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', resize);

      // ─── Init ────────────────────────────────────────────────────────────────
      function initGame() {
        updateScoreUI();
        updateAmmoUI();
        updatePlayerHPUI();
        updateOrientationUI();

        const blueUnits = [playerUnit, ...blueBots];
        const redUnits  = [...redBots];

        blueUnits.forEach((u, i) => {
          const p = getSpawnPoint(TEAM.BLUE, i);
          u.position.set(p.x, 0, p.z);
          u.visible = !u.userData.isPlayer;
          u.userData.alive = true;
          u.userData.level = 1;
          u.userData.hp = 100;
        });

        redUnits.forEach((u, i) => {
          const p = getSpawnPoint(TEAM.RED, i);
          u.position.set(p.x, 0, p.z);
          u.visible = true;
          u.userData.alive = true;
          u.userData.level = 1;
          u.userData.hp = 100;
        });

        camera.position.set(getSpawnPoint(TEAM.BLUE, 0).x, 1.6, getSpawnPoint(TEAM.BLUE, 0).z);
        playerUnit.position.copy(camera.position);
        player.maxHp = playerUnit.userData.maxHp;
        player.hp = player.maxHp;
        player.alive = true;
        updatePlayerHPUI();
      }

      initGame();
      animate();

    })();
  </script>
</body>
</html>
