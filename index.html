<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D FPS Enhanced 4v4</title>
  <style>
    html, body {
      margin: 0; width: 100%; height: 100%;
      overflow: hidden; background: #0b0f14;
      overscroll-behavior: none; touch-action: none;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    #game { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud { position: absolute; inset: 0; pointer-events: none; }

    #status {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      color: #fff; font-weight: 800; letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7); line-height: 1.5;
    }
    #scoreBoard { font-size: 18px; margin-bottom: 4px; }
    #roundState { font-size: 13px; opacity: 0.9; margin-bottom: 6px; }
    #ammo { display: block; font-size: 14px; opacity: 0.9; margin-top: 4px; }
    #reloadIndicator {
      display: none; font-size: 13px; color: #ffd84d; margin-top: 3px;
      text-shadow: 0 0 8px rgba(255,216,77,0.7);
    }
    #reloadBar {
      display: none; margin-top: 5px; width: 140px;
      height: 4px; background: rgba(255,255,255,0.15);
      border-radius: 2px; overflow: hidden;
    }
    #reloadBarFill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd84d, #ffb51e);
      border-radius: 2px; transition: width 0.05s linear;
    }
    #hpBlock { margin-top: 8px; width: 170px; max-width: 45vw; }
    #hpLabel {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; margin-bottom: 4px; opacity: 0.95;
    }
    #hpBarOuter {
      width: 100%; height: 12px; border-radius: 999px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
      overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.35);
    }
    #hpBarInner {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #3cff7d, #29d65e);
      border-radius: 999px; transition: width 0.08s linear;
    }
    #crosshair {
      position: absolute; left: 50%; top: 50%;
      width: 20px; height: 20px;
      transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ""; position: absolute; left: 50%; top: 50%;
      background: #35ff7d; box-shadow: 0 0 8px rgba(53,255,125,0.55);
      transform: translate(-50%, -50%); border-radius: 2px;
    }
    #crosshair::before { width: 20px; height: 2px; }
    #crosshair::after  { width: 2px;  height: 20px; }

    #announce {
      position: absolute; left: 50%; top: 38%;
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0; color: #ffffff;
      font-size: clamp(30px, 7vw, 70px); font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 0 14px rgba(255,255,255,0.55), 0 3px 14px rgba(0,0,0,0.8);
      z-index: 20; pointer-events: none; white-space: nowrap;
    }
    #announce.show { animation: pop 0.55s ease-out forwards; }
    @keyframes pop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.45); }
      18%  { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
      58%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); }
    }

#lobbyOverlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center; flex-direction: column;
  background: radial-gradient(circle at center, rgba(16,24,36,0.72), rgba(4,8,14,0.95));
  z-index: 120; pointer-events: auto; color: #fff;
  text-align: center; gap: 14px;
}
#lobbyCard {
  padding: 28px 26px 24px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow: 0 18px 48px rgba(0,0,0,0.42), inset 0 0 30px rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  width: min(86vw, 460px);
}
#lobbyTitle {
  font-size: clamp(34px, 7vw, 58px);
  font-weight: 1000;
  letter-spacing: 0.10em;
  text-shadow: 0 0 16px rgba(100,220,255,0.36), 0 4px 18px rgba(0,0,0,0.7);
  margin-bottom: 10px;
}
#lobbySub {
  font-size: clamp(14px, 3.2vw, 20px);
  opacity: 0.9;
  line-height: 1.6;
  margin-bottom: 20px;
}
#lobbyStartBtn {
  position: absolute;
  right: 18px; bottom: 18px;
  border: none;
  padding: 18px 22px;
  border-radius: 18px;
  min-width: 170px;
  background: linear-gradient(135deg, #2a87ff, #8b5cff);
  color: white;
  font-size: clamp(16px, 3.6vw, 22px);
  font-weight: 900;
  letter-spacing: 0.08em;
  box-shadow: 0 14px 34px rgba(64,100,255,0.36), inset 0 0 18px rgba(255,255,255,0.12);
  pointer-events: auto;
  touch-action: none; -webkit-tap-highlight-color: transparent;
}
#lobbyStartBtn:active { transform: scale(0.97); filter: brightness(1.1); }
#resultOverlay {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center; flex-direction: column;
  background: radial-gradient(circle at center, rgba(15,20,33,0.58), rgba(0,0,0,0.94));
  z-index: 130; pointer-events: none; color: #fff;
  text-align: center;
}
#resultText {
  font-size: clamp(38px, 8.5vw, 86px);
  font-weight: 1000;
  letter-spacing: 0.12em;
  text-shadow: 0 0 18px rgba(255,255,255,0.25), 0 0 28px rgba(120,180,255,0.22), 0 8px 24px rgba(0,0,0,0.8);
  animation: resultPop 0.95s ease-out infinite alternate;
}
#resultSub {
  margin-top: 14px;
  font-size: clamp(14px, 3vw, 20px);
  opacity: 0.88;
  letter-spacing: 0.08em;
}
@keyframes resultPop {
  from { transform: scale(0.98); filter: brightness(1.0); }
  to   { transform: scale(1.03); filter: brightness(1.2); }
}
    #rotateOverlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center; text-align: center;
      background: rgba(4,8,14,0.95); color: #ffffff;
      z-index: 100; pointer-events: all; padding: 24px; box-sizing: border-box;
      font-size: clamp(18px, 4.5vw, 30px); font-weight: 800;
      letter-spacing: 0.05em; line-height: 1.6;
    }

    #joystick {
      position: absolute; left: 18px; bottom: 18px;
      width: min(34vw, 170px); height: min(34vw, 170px);
      max-width: 170px; max-height: 170px;
      min-width: 120px; min-height: 120px;
      pointer-events: none; z-index: 30;
    }
    #joystick .base {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(2px); box-shadow: inset 0 0 24px rgba(255,255,255,0.04);
    }
    #joystick .knob {
      position: absolute; left: 50%; top: 50%;
      width: 34%; height: 34%; transform: translate(-50%, -50%);
      border-radius: 50%; background: rgba(255,255,255,0.26);
      border: 2px solid rgba(255,255,255,0.24);
      box-shadow: 0 0 18px rgba(255,255,255,0.15);
    }

    /* SHOOT ボタン */
    #shootBtn {
      position: absolute; right: 14px; bottom: 120px;
      width: min(16vw, 96px); height: min(16vw, 96px);
      max-width: 96px; max-height: 96px;
      min-width: 80px; min-height: 80px;
      border: none; border-radius: 50%;
      background: linear-gradient(180deg, #ff6a6a, #d90c0c);
      color: white; font-size: clamp(13px, 2.6vw, 18px);
      font-weight: 900; letter-spacing: 0.08em;
      box-shadow: 0 10px 30px rgba(255,42,42,0.35), inset 0 0 18px rgba(255,255,255,0.15);
      pointer-events: auto; z-index: 9999;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    #shootBtn:active { transform: scale(0.96); filter: brightness(1.08); }

    /* RELOAD ボタン（弾薬アイコン） */
    #reloadBtn {
      position: absolute;
      right: calc(14px + min(16vw, 96px) + 14px);
      bottom: calc(120px + min(16vw, 96px) - min(13vw, 78px));
      width: min(13vw, 78px); height: min(13vw, 78px);
      max-width: 78px; max-height: 78px;
      min-width: 62px; min-height: 62px;
      border: none; border-radius: 50%;
      background: linear-gradient(160deg, #2a3a50, #1a2535);
      border: 2px solid rgba(255,216,77,0.45);
      box-shadow: 0 6px 20px rgba(0,0,0,0.45), inset 0 0 12px rgba(255,216,77,0.08);
      pointer-events: auto; z-index: 9999;
      touch-action: none; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
    }
    #reloadBtn:active { transform: scale(0.93); filter: brightness(1.12); }

    /* 弾薬シルエット（CSS描画） */
    #reloadBtn::before {
      content: "";
      display: block;
      width: 38%;
      height: 58%;
      background: linear-gradient(180deg, #ffd84d 0%, #ffb51e 60%, #c8921a 100%);
      border-radius: 40% 40% 20% 20% / 30% 30% 10% 10%;
      box-shadow: 0 0 10px rgba(255,210,60,0.55), 0 0 20px rgba(255,180,30,0.25);
      position: relative;
    }
    #reloadBtn::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -82%);
      width: 22%;
      height: 16%;
      background: rgba(255,216,77,0.55);
      border-radius: 3px 3px 0 0;
      box-shadow: 0 0 6px rgba(255,216,77,0.4);
    }

    /* ADS（注視）ボタン */
    #adsBtn {
      position: absolute;
      /* reloadBtn の「少し右上」に配置 */
      right: calc(14px + min(16vw, 96px) + 14px - 20px);
      bottom: calc(120px + min(16vw, 96px) - min(13vw, 78px) + min(13vw, 78px) + 10px);
      width: min(13vw, 78px); height: min(13vw, 78px);
      max-width: 78px; max-height: 78px;
      min-width: 62px; min-height: 62px;
      border: none; border-radius: 50%;
      background: linear-gradient(160deg, #1a2e44, #0d1e30);
      border: 2px solid rgba(100,200,255,0.5);
      box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 0 12px rgba(100,200,255,0.08);
      pointer-events: auto; z-index: 9999;
      touch-action: none; -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s, border-color 0.15s;
      overflow: visible;
    }
    #adsBtn:active { transform: scale(0.93); filter: brightness(1.15); }
    #adsBtn.ads-active {
      border-color: rgba(100,220,255,0.9);
      box-shadow: 0 0 18px rgba(100,200,255,0.5), inset 0 0 12px rgba(100,200,255,0.2);
    }

    /* スコープ（レティクル）シルエット – CSS only */
    #adsBtn::before {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 52%;
      height: 52%;
      border-radius: 50%;
      border: 2.5px solid rgba(130,210,255,0.9);
      box-shadow: 0 0 8px rgba(100,200,255,0.5);
    }
    /* 十字線（水平）*/
    #adsBtn::after {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      height: 1.5px;
      background: rgba(130,210,255,0.9);
      box-shadow: 0 0 5px rgba(100,200,255,0.5);
    }
    /* 十字線（垂直）は擬似要素が2つしか使えないためインナー要素で実装 */
    #adsCrossV {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 1.5px;
      height: 70%;
      background: rgba(130,210,255,0.9);
      box-shadow: 0 0 5px rgba(100,200,255,0.5);
      pointer-events: none;
      border-radius: 1px;
    }
    /* スコープ外枠の小さいノッチ */
    #adsDot {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(130,210,255,0.85);
      box-shadow: 0 0 4px rgba(100,200,255,0.6);
      pointer-events: none;
    }

    #fileLogWrap {
      position: absolute; left: 12px; top: 12px; z-index: 160;
      width: min(42vw, 420px); pointer-events: none; color: #e8ffe8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    #fileLogTitle {
      display: inline-block; margin: 0 0 6px 0; padding: 6px 10px;
      border-radius: 8px 8px 0 0;
      background: rgba(0,0,0,0.76); border: 1px solid rgba(255,255,255,0.15);
      border-bottom: none; font-size: 12px; font-weight: 800;
      letter-spacing: 0.04em; pointer-events: none;
    }
    #fileLogArea {
      display: block; width: 100%; height: min(24vh, 220px); min-height: 120px;
      box-sizing: border-box; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 0 10px 10px 10px; background: rgba(0,0,0,0.72);
      color: #e6ffe6; padding: 10px; resize: none; outline: none;
      overflow: auto; white-space: pre-wrap; word-break: break-word;
      font-size: 11px; line-height: 1.45; pointer-events: auto;
      box-shadow: 0 10px 22px rgba(0,0,0,0.3);
    }
    @media (orientation: portrait) { #rotateOverlay { display: flex; } }
  </style>
</head>
<body>
  <div id="game">
    <canvas id="c"></canvas>
    <div id="hud">
      <div id="status">
        <div id="scoreBoard">BLUE <span id="blueScore">0</span> / RED <span id="redScore">0</span></div>
        <div id="roundState">ROUND: <span id="roundText">1</span> | 先に5点で勝利</div>
        <span id="ammo">AMMO: <span id="ammoCount">30</span> / ∞</span>
        <span id="reloadIndicator">⟳ RELOADING...</span>
        <div id="reloadBar"><div id="reloadBarFill"></div></div>
        <div id="hpBlock">
          <div id="hpLabel"><span>HP</span><span id="hpText">100 / 100</span></div>
          <div id="hpBarOuter"><div id="hpBarInner"></div></div>
        </div>
      </div>
      <div id="crosshair"></div>
      <div id="announce"></div>
      <div id="joystick">
        <div class="base"></div>
        <div class="knob" id="knob"></div>
      </div>
      <button id="shootBtn">FIRE</button>
      <button id="reloadBtn" aria-label="リロード"></button>
      <!-- ADS ボタン（CSSスコープアイコン） -->
      <button id="adsBtn" aria-label="注視（ADS）">
        <div id="adsCrossV"></div>
        <div id="adsDot"></div>
      </button>
      <div id="fileLogWrap">
        <div id="fileLogTitle">📁 ファイル読み込みログ</div>
        <textarea id="fileLogArea" readonly spellcheck="false" aria-label="ログ" placeholder="ju.glb / ju.mp3 の読み込み状況"></textarea>
      </div>
      <div id="lobbyOverlay">
        <div id="lobbyCard">
          <div id="lobbyTitle">ARENA LOBBY</div>
          <div id="lobbySub">右下の「戦いにいく」を押すと出撃します。<br>倒れたら味方を観戦し、5点先取で自動的にロビーへ戻ります。</div>
        </div>
        <button id="lobbyStartBtn">戦いにいく</button>
      </div>
      <div id="resultOverlay">
        <div id="resultText">YOUR TEAM WON</div>
        <div id="resultSub">Returning to lobby...</div>
      </div>
      <div id="rotateOverlay">画面を横向きにしてください</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    (() => {
      /* ── DOM refs ─────────────────────────────────── */
      const canvas          = document.getElementById('c');
      const shootBtn        = document.getElementById('shootBtn');
      const reloadBtn       = document.getElementById('reloadBtn');
      const adsBtn          = document.getElementById('adsBtn');
      const announce        = document.getElementById('announce');
      const blueScoreEl     = document.getElementById('blueScore');
      const redScoreEl      = document.getElementById('redScore');
      const roundTextEl     = document.getElementById('roundText');
      const ammoCountEl     = document.getElementById('ammoCount');
      const hpTextEl        = document.getElementById('hpText');
      const hpBarInner      = document.getElementById('hpBarInner');
      const joystickEl      = document.getElementById('joystick');
      const knobEl          = document.getElementById('knob');
      const rotateOverlay   = document.getElementById('rotateOverlay');
      const fileLogArea     = document.getElementById('fileLogArea');
      const reloadIndicator = document.getElementById('reloadIndicator');
      const reloadBarEl     = document.getElementById('reloadBar');
      const reloadBarFill   = document.getElementById('reloadBarFill');
      const lobbyOverlay    = document.getElementById('lobbyOverlay');
      const lobbyStartBtn   = document.getElementById('lobbyStartBtn');
      const resultOverlay   = document.getElementById('resultOverlay');
      const resultTextEl    = document.getElementById('resultText');
      const resultSubEl     = document.getElementById('resultSub');

      const GUN_MODEL_URL   = 'ju.glb';
      const SHOOT_AUDIO_URL = 'ju.mp3';

      // 銃モデルの保存軸ズレを外から調整するための回転設定（度）
      const GUN_ROT_X = 0;
      const GUN_ROT_Y = 0; // 横向きなら 90 / -90 などに調整
      const GUN_ROT_Z = 0;

      const audioSupport = (() => { try { return typeof Audio !== 'undefined'; } catch { return false; } })();

      function logFileLine(msg, kind = 'info') {
        const ts = new Date().toLocaleTimeString('ja-JP', { hour12: false });
        const line = `[${ts}] ${msg}`;
        if (fileLogArea) { fileLogArea.value += (fileLogArea.value ? '\n' : '') + line; fileLogArea.scrollTop = fileLogArea.scrollHeight; }
        const m = kind === 'error' ? 'error' : (kind === 'warn' ? 'warn' : 'log');
        console[m](line);
      }

      function describeError(err) {
        if (!err) return '不明なエラー';
        if (typeof err === 'string') return err;
        if (err instanceof Error) return err.message || String(err);
        return err.message || err.statusText || err.toString?.() || JSON.stringify(err);
      }

      async function probeAsset(url, label) {
        try {
          const r = await fetch(url, { method: 'HEAD', cache: 'no-store' });
          if (!r.ok) { logFileLine(`🔴 ${label}: ${r.status} ${r.statusText||'HTTP error'}`, 'error'); return false; }
          logFileLine(`🟢 ${label}: 事前チェック成功`); return true;
        } catch (err) { logFileLine(`🔴 ${label}: 通信エラー - ${describeError(err)}`, 'error'); return false; }
      }

      /* ── レンダラー ────────────────────────────────── */
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false, powerPreference: 'high-performance' });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setClearColor(0x0b0f14, 1);
      renderer.autoClear = false;

      /* ── シーン ────────────────────────────────────── */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xc7e2ff);
      scene.fog = new THREE.Fog(0xc7e2ff, 34, 110);

      const uiScene = new THREE.Scene();
      uiScene.add(new THREE.AmbientLight(0xffffff, 2.0));
      const uiDirLight = new THREE.DirectionalLight(0xffffff, 2.5);
      uiDirLight.position.set(1, 2, 3);
      uiScene.add(uiDirLight);
      uiScene.add(new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 1.5));

      /* ── カメラ ────────────────────────────────────── */
      const CAMERA_FOV_NORMAL = 70;
      const CAMERA_FOV_ADS    = 56; // 1.25倍ズーム相当（tan(70/2)/tan(56/2) ≈ 1.25）
      const camera = new THREE.PerspectiveCamera(CAMERA_FOV_NORMAL, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.rotation.order = 'YXZ';
      camera.position.set(-16, 1.6, 0);

      /* ── ライト ────────────────────────────────────── */
      scene.add(new THREE.HemisphereLight(0xeef8ff, 0xaabed3, 2.0));
      const dir = new THREE.DirectionalLight(0xffffff, 2.35);
      dir.position.set(10, 18, 8);
      scene.add(dir);
      scene.add(new THREE.AmbientLight(0xe2effa, 0.96));

      for (const [x, z] of [[-20,-18],[-12,-4],[-4,12],[6,-10],[14,6],[22,-16],[0,0],[-8,20],[18,18],[-18,18]]) {
        const lamp = new THREE.PointLight(0xffffff, 0.55, 18, 2.0);
        lamp.position.set(x, 4.2, z);
        scene.add(lamp);
      }

      /* ── フロア ────────────────────────────────────── */
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(104, 104),
        new THREE.MeshStandardMaterial({ color: 0x5f6d78, roughness: 0.98, metalness: 0.0 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);
      const grid = new THREE.GridHelper(104, 52, 0xb8c6d4, 0x8793a0);
      grid.position.y = 0.01;
      scene.add(grid);

      const border = 34;

      /* ── スポーン ──────────────────────────────────── */
      const spawnPoints = {
        blue: [{ x:-26,z:-20 },{ x:-26,z:-6 },{ x:-26,z:6 },{ x:-26,z:20 }],
        red:  [{ x: 26,z:-20 },{ x: 26,z:-6 },{ x: 26,z:6 },{ x: 26,z:20 }]
      };
      const spawnSafeRadius = 5.0;

        wall:  new THREE.MeshStandardMaterial({ color: 0xa7b2bf, roughness: 0.92, metalness: 0.03 }),
        crate: new THREE.MeshStandardMaterial({ color: 0xb07a45, roughness: 0.96, metalness: 0.0 }),

      function rectIntersectsCircle(minX, maxX, minZ, maxZ, cx, cz, radius) {
        const nx = THREE.MathUtils.clamp(cx, minX, maxX);
        const nz = THREE.MathUtils.clamp(cz, minZ, maxZ);
        const dx = cx - nx, dz = cz - nz;
        return (dx*dx + dz*dz) <= radius*radius;
      }

      function addObstacle(x, z, sx, sy, sz, matKey = 'wall', yOffset = 0) {
        const minX = x - sx/2, maxX = x + sx/2;
        const minZ = z - sz/2, maxZ = z + sz/2;
        for (const p of [...spawnPoints.blue, ...spawnPoints.red]) {
          if (rectIntersectsCircle(minX, maxX, minZ, maxZ, p.x, p.z, spawnSafeRadius)) return null;
        }
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), obstacleMaterials[matKey]);
        mesh.position.set(x, sy/2 + yOffset, z);
        obstacleGroup.add(mesh);
        obstacleData.push({ minX, maxX, minZ, maxZ });
        if (sx * sz > 2.0) coverPositions.push(new THREE.Vector3(x, 0, z));
        return mesh;
      }

      /* ── コリジョンヘルパー ────────────────────────── */
      function isBlocked(x, z, radius = 0.48) {
        for (const o of obstacleData) {
          const cx = THREE.MathUtils.clamp(x, o.minX, o.maxX);
          const cz = THREE.MathUtils.clamp(z, o.minZ, o.maxZ);
          const dx = x - cx, dz = z - cz;
          if ((dx*dx + dz*dz) < radius*radius) return true;
        }
        return false;
      }

      function moveEntityXZ(entity, dx, dz, radius = 0.48) {
        const pos = entity.position;
        const nx = pos.x + dx, nz = pos.z + dz;
        const inBounds = Math.abs(nx) <= border && Math.abs(nz) <= border;
        if (inBounds && !isBlocked(nx, nz, radius)) { pos.x = nx; pos.z = nz; return true; }
        let moved = false;
        const xO = pos.x + dx;
        if (Math.abs(xO) <= border && !isBlocked(xO, pos.z, radius)) { pos.x = xO; moved = true; }
        const zO = pos.z + dz;
        if (Math.abs(zO) <= border && !isBlocked(pos.x, zO, radius)) { pos.z = zO; moved = true; }
        return moved;
      }

      function segmentIntersectsRect2D(x1, z1, x2, z2, minX, maxX, minZ, maxZ, radius = 0.05) {
        const left = minX-radius, right = maxX+radius, top = minZ-radius, bottom = maxZ+radius;
        let t0=0, t1=1;
        const dx=x2-x1, dz=z2-z1;
        for (const [p,q] of [[-dx,x1-left],[dx,right-x1],[-dz,z1-top],[dz,bottom-z1]]) {
          if (Math.abs(p) < 1e-8) { if (q < 0) return false; }
          else {
            const r = q/p;
            if (p < 0) { if (r > t1) return false; if (r > t0) t0=r; }
            else        { if (r < t0) return false; if (r < t1) t1=r; }
          }
        }
        return true;
      }

      function bulletHitsAnyObstacle(prev, next) {
        for (const o of obstacleData) {
          if (segmentIntersectsRect2D(prev.x, prev.z, next.x, next.z, o.minX, o.maxX, o.minZ, o.maxZ, 0.06)) return true;
        }
        return false;
      }

      function hasLineOfSight(ax, az, bx, bz) {
        for (const o of obstacleData) {
          if (segmentIntersectsRect2D(ax, az, bx, bz, o.minX, o.maxX, o.minZ, o.maxZ, 0.12)) return false;
        }
        return true;

          spark.rotation.z = angle;
          spark.position.set(Math.cos(angle) * len * 0.5, Math.sin(angle) * len * 0.5, 0);
          flashGroup.add(spark);
        }

        // 前方への光線（砲口方向）
        const rayMat = new THREE.MeshStandardMaterial({
          color: 0xffee88,
          emissive: 0xffcc00,
          emissiveIntensity: 5.0,
          transparent: true,
          opacity: 0.8,

        });
        const rayGeom = new THREE.CylinderGeometry(0.008, 0.025, 0.18, 5);
        rayGeom.rotateX(Math.PI / 2); // Z方向（前方）へ
        const ray = new THREE.Mesh(rayGeom, rayMat);
        ray.position.z = -0.09; // 少し前方に
        flashGroup.add(ray);

        muzzleFlashes.push({
          group: flashGroup,
          life: 0.055,   // 55ms で消滅
          maxLife: 0.055
        });

      function updateMuzzleFlashes(dt) {
        for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
          const f = muzzleFlashes[i];
          f.life -= dt;

          if (f.life <= 0) {
            uiScene.remove(f.group);
            // マテリアル・ジオメトリの後処理
            f.group.traverse(obj => {
              if (obj.isMesh) {
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
              }
            });
            muzzleFlashes.splice(i, 1);
            continue;
          }

          // フェードアウト＋スケールアップ
          const t = f.life / f.maxLife; // 1→0
          f.group.traverse(obj => {
            if (obj.isMesh && obj.material) {
              obj.material.opacity = t * (obj.material.opacity > 0 ? 1.0 : 0);
            }
          });
          const scale = 1.0 + (1.0 - t) * 1.6;
          f.group.scale.setScalar(scale);

          // フラッシュを銃口の前に配置（worldspace で毎フレーム追随）
          if (gunRoot) {
            camera.updateMatrixWorld();
            const camMat = camera.matrixWorld;

              gunPosCurrent.x,

            f.group.position.copy(muzzleWorld);

            // カメラの向きを向くよう向ける
            const camQuat = new THREE.Quaternion();
            camera.getWorldQuaternion(camQuat);
            f.group.quaternion.copy(camQuat);
          }
        }
      }

      /* ── オーディオ ────────────────────────────────── */
      let audioCtx=null, decodedAudioBuffer=null;
      let audioUnlocked=false, audioPreloadDone=false;
      const shootSoundPool = [];
      let shootSoundIndex=0, useAudioContext=false;

      async function _resumeAndPlayViaAudioContext() {
        try {
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          const src = audioCtx.createBufferSource();
          src.buffer = decodedAudioBuffer;
          src.connect(audioCtx.destination);
          src.start(0);
        } catch(err) { logFileLine(`🔴 AudioContext 再生エラー: ${describeError(err)}`, 'error'); }
      }

      async function preloadShootSound() {
        if (!audioSupport) { logFileLine('⚠️ Audio 非サポート', 'warn'); return; }
        logFileLine(`📦 射撃音プリロード: ${SHOOT_AUDIO_URL}`);
        try {
          const res = await fetch(SHOOT_AUDIO_URL, { cache: 'force-cache' });
          if (!res.ok) { logFileLine(`🔴 ju.mp3: ${res.status}`, 'error'); setupFallbackAudioPool(null); return; }
          const ab = await res.arrayBuffer();
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            decodedAudioBuffer = await audioCtx.decodeAudioData(ab.slice(0));
            useAudioContext = true; audioPreloadDone = true;
            logFileLine('🟢 射撃音プリロード完了（AudioContext）');
            return;
          } catch(e) {
            logFileLine(`⚠️ AudioContext decode失敗: ${describeError(e)}`, 'warn');
            if (audioCtx) { try { audioCtx.close(); } catch{} audioCtx=null; }
          }
          const blob = new Blob([ab], { type:'audio/mpeg' });
          setupFallbackAudioPool(URL.createObjectURL(blob));
        } catch(err) { logFileLine(`🔴 ju.mp3 fetch失敗: ${describeError(err)}`, 'error'); setupFallbackAudioPool(null); }
      }

      function setupFallbackAudioPool(blobUrl) {
        for (let i=0; i<8; i++) {
          const a = new Audio(); a.volume=0.95; a.preload='auto';
          if (blobUrl) { a.src=blobUrl; a.load(); }
          a.addEventListener('canplaythrough', () => { if (i===0 && !audioPreloadDone) { audioPreloadDone=true; logFileLine('🟢 射撃音プリロード完了（HTMLAudio）'); }}, { once:true });
          a.addEventListener('error', () => { if (i===0) logFileLine(`🔴 射撃音プリロード失敗`, 'error'); }, { once:true });
          shootSoundPool.push(a);
        }
      }

      function unlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        if (useAudioContext && audioCtx && audioCtx.state==='suspended') {
          audioCtx.resume().then(() => logFileLine('🔊 AudioContext resume 成功')).catch(e => logFileLine(`⚠️ resume 失敗: ${describeError(e)}`,'warn'));
        }
        for (const a of shootSoundPool) {
          try { const p=a.play(); if (p && typeof p.then==='function') p.then(()=>{a.pause();a.currentTime=0;}).catch(()=>{}); else { a.pause(); a.currentTime=0; } } catch{}
        }
      }

      function playShootSound() {
        if (!audioSupport) return;
        if (useAudioContext && audioCtx && decodedAudioBuffer) { _resumeAndPlayViaAudioContext(); return; }
        if (!shootSoundPool.length) return;
        const a = shootSoundPool[shootSoundIndex];
        shootSoundIndex = (shootSoundIndex+1) % shootSoundPool.length;
        try { a.currentTime=0; const p=a.play(); if (p && typeof p.catch==='function') p.catch(e => logFileLine(`⚠️ 再生ポリシー: ${describeError(e)}`,'warn')); } catch(e) { logFileLine(`🔴 再生エラー: ${describeError(e)}`,'error'); }

          u.userData.coverTimer = 0;
          u.userData.stuckTimer = 0;
          u.userData.prevPos.copy(u.position);
          u.userData.wanderDir.set(THREE.MathUtils.randFloat(-1,1), THREE.MathUtils.randFloat(-1,1)).normalize();
          u.userData.wanderTimer = THREE.MathUtils.randFloat(0.8, 2.5);
          if (resetLevels) u.userData.level = 1;
          applyGrowthStats(u);
          u.userData.fireCooldown = THREE.MathUtils.randFloat(u.userData.fireMin, u.userData.fireMax);
          u.scale.setScalar(1 + (u.userData.level - 1) * 0.015);
        });

        clearBullets();
        ammo = MAG_SIZE;
        reloading = false;
        reloadTimer = 0;
        firingHeld = false;
        if (fireLoopTimer !== null) { clearInterval(fireLoopTimer); fireLoopTimer = null; }
        setADS(false);
        adsFovCurrent = CAMERA_FOV_NORMAL;
        camera.fov = CAMERA_FOV_NORMAL;
        camera.updateProjectionMatrix();

        playerUnit.position.copy(camera.position);
        playerUnit.visible = false;
        applyGrowthStats(playerUnit);
        player.maxHp = playerUnit.userData.maxHp;
        player.hp = player.maxHp;
        player.alive = true;
        updatePlayerHPUI();
        updateAmmoUI();
        updateScoreUI();
      }

      function startBattle() {
        if (returnLobbyTimer !== null) { clearTimeout(returnLobbyTimer); returnLobbyTimer = null; }
        blueScore = 0;
        redScore = 0;
        roundIndex = 1;
        roundEnding = false;
        matchOver = false;
        roundResetTimer = 0;
        resetArenaState({ resetLevels: true });
        camera.position.set(getSpawnPoint(TEAM.BLUE, 0).x, 1.6, getSpawnPoint(TEAM.BLUE, 0).z);
        yaw = 0;
        pitch = 0;
        syncCameraRotation();
        gameMode = GAME_MODE.BATTLE;
        setModeUI();
      }

      function returnToLobby() {
        if (returnLobbyTimer !== null) { clearTimeout(returnLobbyTimer); returnLobbyTimer = null; }
        blueScore = 0;
        redScore = 0;
        roundIndex = 1;
        roundEnding = false;
        matchOver = false;
        roundResetTimer = 0;
        resetArenaState({ resetLevels: true });
        gameMode = GAME_MODE.LOBBY;
        spectateTarget = null;
        camera.position.set(0, 14, 30);
        camera.lookAt(0, 0, 0);
        setModeUI();
      }

      function showFinalResult(winnerTeam) {
        const won = winnerTeam === TEAM.BLUE;
        if (resultTextEl) resultTextEl.textContent = won ? 'YOUR TEAM WON' : 'YOUR TEAM LOST';
        if (resultSubEl) resultSubEl.textContent = won ? 'Returning to lobby...' : 'Returning to lobby...';
        gameMode = GAME_MODE.RESULT;
        setModeUI();
        if (returnLobbyTimer !== null) clearTimeout(returnLobbyTimer);
        returnLobbyTimer = setTimeout(() => returnToLobby(), 2200);
      }

      /* ── カメラ ────────────────────────────────────── */
      function clampCamera() {
        camera.position.x = THREE.MathUtils.clamp(camera.position.x, -border, border);
        camera.position.z = THREE.MathUtils.clamp(camera.position.z, -border, border);
        camera.position.y = 1.6;
      }
      function syncCameraRotation() { camera.rotation.x=pitch; camera.rotation.y=yaw; }

      /* ── スポーン ──────────────────────────────────── */
      function getSpawnPoint(team, index=0) {
        const list = team===TEAM.BLUE ? spawnPoints.blue : spawnPoints.red;
        return list[index % list.length];
      }
      function randomSpawn(team) {
        const list = team===TEAM.BLUE ? spawnPoints.blue : spawnPoints.red;
        return list[Math.floor(Math.random()*list.length)];
      }

      /* ── ユニット生成 ──────────────────────────────── */
      function createUnit(team, isPlayer=false) {
        const unit = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.32, 0.88, 6, 12),
          team===TEAM.BLUE ? unitMaterials.blueBody : unitMaterials.redBody
        );
        body.position.y = 1.05;
        unit.add(body);
        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 14, 10),
          team===TEAM.BLUE ? unitMaterials.blueHead : unitMaterials.redHead
        );
        head.position.y = 1.72;
        unit.add(head);

        unit.userData = {
          team, isPlayer, alive: true, level: 1,
          hp: 100, maxHp: 100, radius: 1.0,
          moveSpeed: 1.0, bulletDamage: 8, bulletSpeed: 16,
          fireMin: 0.35, fireMax: 1.2,
          fireCooldown: THREE.MathUtils.randFloat(0.35, 1.2),
          aiState: 'wander',
          coverTarget: null,
          coverTimer: 0,
          strafeDir: 1,
          strafeTimer: THREE.MathUtils.randFloat(0.4, 1.2),
          stuckTimer: 0,
          prevPos: new THREE.Vector3(),
          wanderDir: new THREE.Vector2(THREE.MathUtils.randFloat(-1,1), THREE.MathUtils.randFloat(-1,1)).normalize(),
          wanderTimer: THREE.MathUtils.randFloat(0.8, 2.5),
        };

        if (isPlayer) unit.visible = false;
        scene.add(unit);
        units.push(unit);
        return unit;
      }

      function applyGrowthStats(unit, refillHp=true) {
        const lv = Math.max(1, unit.userData.level||1);
        unit.userData.maxHp       = Math.round(100 + (lv-1)*20);
        if (refillHp) unit.userData.hp = unit.userData.maxHp;
        else unit.userData.hp = Math.min(unit.userData.hp, unit.userData.maxHp);
        unit.userData.radius      = 1.0 + (lv-1)*0.02;
        unit.userData.moveSpeed   = 1.0 + (lv-1)*0.06;
        unit.userData.bulletDamage= 8   + (lv-1)*1.4;
        unit.userData.bulletSpeed = 16  + (lv-1)*0.35;
        unit.userData.fireMin     = Math.max(0.18, 0.35-(lv-1)*0.02);
        unit.userData.fireMax     = Math.max(0.55, 1.2 -(lv-1)*0.05);
      }

      function growTeam(team, amount=1) {
        for (const u of units) {
          if (!u.userData.alive || u.userData.team!==team) continue;
          u.userData.level = Math.min((u.userData.level||1)+amount, 20);
          applyGrowthStats(u, false);
          u.scale.setScalar(1+(u.userData.level-1)*0.02);
        }
      }

      function respawnUnit(unit) {
        const sp = randomSpawn(unit.userData.team);
        unit.position.set(sp.x, 0, sp.z);
        unit.visible = !unit.userData.isPlayer;
        unit.userData.alive = true;
        unit.userData.aiState = 'wander';
        unit.userData.coverTarget = null;
        unit.userData.stuckTimer = 0;
        unit.userData.prevPos.copy(unit.position);
        unit.userData.wanderDir.set(THREE.MathUtils.randFloat(-1,1), THREE.MathUtils.randFloat(-1,1)).normalize();
        unit.userData.wanderTimer = THREE.MathUtils.randFloat(0.8, 2.5);
        applyGrowthStats(unit);
        unit.userData.fireCooldown = THREE.MathUtils.randFloat(unit.userData.fireMin, unit.userData.fireMax);
        unit.scale.setScalar(1+(unit.userData.level-1)*0.015);
      }

      const playerUnit = createUnit(TEAM.BLUE, true);
      const blueBots   = [createUnit(TEAM.BLUE), createUnit(TEAM.BLUE), createUnit(TEAM.BLUE)];
      const redBots    = [createUnit(TEAM.RED),  createUnit(TEAM.RED),  createUnit(TEAM.RED),  createUnit(TEAM.RED)];

      /* ── ラウンド管理 ──────────────────────────────── */
      function clearBullets() {
        for (const b of bullets) { group.remove(b); if (b.geometry) b.geometry.dispose(); }
        bullets.length = 0;
      }

      function startReload() {
        if (gameMode !== GAME_MODE.BATTLE || reloading || roundEnding || matchOver || !player.alive) return;
        reloading = true;
        firingHeld = false;
        if (fireLoopTimer !== null) { clearInterval(fireLoopTimer); fireLoopTimer=null; }
        reloadTimer = RELOAD_TIME;
        gunState.reloadAnim = true;
        gunState.reloadAnimT = 0;
        gunState.reloadAnimDur = RELOAD_TIME;
        updateAmmoUI();
      }

      function finishReload() {
        ammo=MAG_SIZE; reloading=false;
        gunState.reloadAnim=false; gunState.reloadAnimT=0;
        updateAmmoUI();
      }

      function respawnRound() {
        if (matchOver) return;
        roundEnding=false; roundResetTimer=0;

        [playerUnit, ...blueBots].forEach((u,i) => {
          const p = getSpawnPoint(TEAM.BLUE, i);
          u.position.set(p.x, 0, p.z);
        });
        [...redBots].forEach((u,i) => {
          const p = getSpawnPoint(TEAM.RED, i);
          u.position.set(p.x, 0, p.z);
        });

        camera.position.set(getSpawnPoint(TEAM.BLUE,0).x, 1.6, getSpawnPoint(TEAM.BLUE,0).z);
        yaw=0; pitch=0;

        for (const u of units) u.userData.level = Math.min((u.userData.level||1)+1, 12);
        applyGrowthStats(playerUnit);
        player.hp=playerUnit.userData.maxHp; player.alive=true;
        updatePlayerHPUI();

        playerUnit.visible=false;
        for (const u of blueBots) { u.visible=true; u.userData.alive=true; applyGrowthStats(u); u.userData.aiState='wander'; u.userData.stuckTimer=0; }
        for (const u of redBots)  { u.visible=true; u.userData.alive=true; applyGrowthStats(u); u.userData.aiState='wander'; u.userData.stuckTimer=0; }

        clearBullets();
        ammo=MAG_SIZE; reloading=false; reloadTimer=0;
        firingHeld=false; gunState.reloadAnim=false;
        if (fireLoopTimer!==null) { clearInterval(fireLoopTimer); fireLoopTimer=null; }
        // ADS リセット
        setADS(false);
        adsFovCurrent = CAMERA_FOV_NORMAL;
        camera.fov = CAMERA_FOV_NORMAL;
        camera.updateProjectionMatrix();
        updateAmmoUI(); updateOrientationUI();
      }

      function endRound(winnerTeam) {
        if (roundEnding || matchOver) return;
        roundEnding = true;
        if (winnerTeam===TEAM.BLUE) blueScore++; else redScore++;
        updateScoreUI();
        showAnnouncement(`${winnerTeam===TEAM.BLUE ? 'BLUE' : 'RED'} +1`);
        clearBullets(); reloading=false; firingHeld=false;
        if (fireLoopTimer!==null) { clearInterval(fireLoopTimer); fireLoopTimer=null; }
        if (blueScore>=WIN_SCORE || redScore>=WIN_SCORE) {
          matchOver = true;
          roundResetTimer = 0;
          const winner = blueScore>=WIN_SCORE ? TEAM.BLUE : TEAM.RED;
          showFinalResult(winner);
          return;
        }
        roundResetTimer = 1.5;
        setTimeout(() => {
          if (!matchOver) {
            roundEnding = false;
            resetForNextRound();
          }
        }, 1500);
      }

      function checkRoundEnd() {
        if (roundEnding || matchOver) return;
        const ba = getAliveUnitsByTeam(TEAM.BLUE).length;
        const ra = getAliveUnitsByTeam(TEAM.RED).length;
        if (ba===0 && ra>0) endRound(TEAM.RED);
        else if (ra===0 && ba>0) endRound(TEAM.BLUE);
        else if (ra===0 && ba===0) endRound(Math.random()<0.5?TEAM.BLUE:TEAM.RED);
      }

      /* ── 射撃 ──────────────────────────────────────── */
      function distancePointToSegment(point, a, b) {
        const ab = new THREE.Vector3().subVectors(b, a);
        const ap = new THREE.Vector3().subVectors(point, a);
        const abLenSq = ab.lengthSq();
        if (abLenSq < 1e-8) return point.distanceTo(a);
        const t = THREE.MathUtils.clamp(ap.dot(ab)/abLenSq, 0, 1);
        const closest = a.clone().add(ab.multiplyScalar(t));
        return point.distanceTo(closest);
      }

      /* ── トレーサー弾（発光ライン）────────────────── */
      function createTracerBullet(position, direction, team, speed, life, damage) {
        const fastSpeed = 340;
        const tracerLife = 0.06;

        const tracerLen = 1.4;
        const geometry = new THREE.CylinderGeometry(0.025, 0.025, tracerLen, 6);
        geometry.rotateX(Math.PI/2);

        const color = team===TEAM.BLUE ? 0xffffaa : 0xff4444;
        const material = new THREE.MeshStandardMaterial({
          color, emissive: color, emissiveIntensity: 3.0,
          roughness: 0.0, metalness: 0.0, transparent: true, opacity: 0.95
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);

        const dir = direction.clone().normalize();
        const quat = new THREE.Quaternion();
        quat.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
        mesh.quaternion.copy(quat);

        mesh.userData = {
          dir: dir.clone(),
          prev: position.clone(),
          speed: fastSpeed,
          life: tracerLife,
          damage, team,
          isTracer: true
        };
        group.add(mesh);
        bullets.push(mesh);
        return mesh;
      }

      function createAIBullet(position, direction, team, speed, life, damage) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 8, 8),
          team===TEAM.BLUE
            ? new THREE.MeshStandardMaterial({ color:0x88ccff, emissive:0x2266ff, emissiveIntensity:1.5, roughness:0.2 })
            : new THREE.MeshStandardMaterial({ color:0xff4444, emissive:0xff0000, emissiveIntensity:1.5, roughness:0.2 })
        );
        mesh.position.copy(position);
        mesh.userData = {
          dir: direction.clone().normalize(),
          prev: position.clone(),
          speed, life, damage, team, isTracer: false
        };
        group.add(mesh);
        bullets.push(mesh);
        return mesh;
      }

      function getAliveUnitsByTeam(team) {
        return units.filter(u => u.userData.team===team && u.userData.alive);
      }

      function getNearestEnemy(unit) {
        const enemies = units.filter(u => u.userData.alive && u.userData.team!==unit.userData.team);
        let best=null, bestDist=Infinity;
        for (const e of enemies) {
          const d=unit.position.distanceTo(e.position);
          if (d<bestDist) { bestDist=d; best=e; }
        }
        return best;
      }

      function getNearestCoverFrom(pos, targetPos, maxDist=28) {
        let best=null, bestScore=-Infinity;
        for (const c of coverPositions) {
          const dist = pos.distanceTo(c);
          if (dist > maxDist || dist < 1.5) continue;
          const toTarget = new THREE.Vector3().subVectors(targetPos, c).normalize();
          const fromCover = new THREE.Vector3().subVectors(c, pos).normalize();
          const dot = toTarget.dot(fromCover);
          const score = dot - dist * 0.05;
          if (score > bestScore) { bestScore=score; best=c.clone(); }
        }
        return best;
      }

      function shootPlayer() {
        if (gameMode !== GAME_MODE.BATTLE || portraitMode || roundEnding || matchOver || reloading || !player.alive) return;
        if (ammo <= 0) { startReload(); return; }
        unlockAudio(); playShootSound(); triggerRecoil();
        ammo--;
        updateAmmoUI();
        syncCameraRotation();
        const dirVec = new THREE.Vector3();
        camera.getWorldDirection(dirVec);
        const spawnPos = camera.position.clone().add(dirVec.clone().multiplyScalar(0.92));
        createTracerBullet(spawnPos, dirVec, TEAM.BLUE, 340, 0.06, DAMAGE_PER_BULLET);
        // マズルフラッシュ生成
        createMuzzleFlash();
        if (ammo <= 0) startReload();
      }

      function setFiringHeld(state) {
        if (gameMode !== GAME_MODE.BATTLE) {
          firingHeld = false;
          if (fireLoopTimer!==null) { clearInterval(fireLoopTimer); fireLoopTimer=null; }
          return;
        }
        firingHeld = state;
        if (state && !reloading && !roundEnding && !matchOver && player.alive && fireLoopTimer===null) {
          shootPlayer();
          fireLoopTimer = setInterval(() => {
            if (!firingHeld || reloading || roundEnding || matchOver || !player.alive) {
              clearInterval(fireLoopTimer); fireLoopTimer=null; return;
            }
            shootPlayer();
          }, FIRE_INTERVAL*1000);
        } else if (!state && fireLoopTimer!==null) {
          clearInterval(fireLoopTimer); fireLoopTimer=null;
        }
      }

      /* ── ジョイスティック ──────────────────────────── */
      function setJoystickFromTouch(touch) {
        const rect = joystickEl.getBoundingClientRect();
        const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
        let dx=touch.clientX-cx, dy=touch.clientY-cy;
        const len=Math.hypot(dx,dy), max=rect.width*0.30;
        if (len>max) { dx=dx/len*max; dy=dy/len*max; }
        joy.x=dx/max; joy.y=dy/max;
        knobEl.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      }
      function resetJoystickVisual() {
        joy.x=0; joy.y=0;
        knobEl.style.transform='translate(-50%, -50%)';
      }

      /* ── プレイヤー移動 ────────────────────────────── */
      function movePlayer(dt) {
        if (!player.alive) { moveVelocity.x=0; moveVelocity.z=0; return; }
        syncCameraRotation();
        const inputX=THREE.MathUtils.clamp(joy.x,-1,1);
        const inputY=THREE.MathUtils.clamp(joy.y,-1,1);
        const moveForward=-inputY, moveLeft=inputX;
        const magnitude=Math.min(1,Math.hypot(moveLeft,moveForward));

        const forwardVec=new THREE.Vector3();
        camera.getWorldDirection(forwardVec);
        forwardVec.y=0;
        if (forwardVec.lengthSq()<1e-8) forwardVec.set(0,0,-1); else forwardVec.normalize();
        const rightVec=new THREE.Vector3().crossVectors(forwardVec,camera.up).normalize();

        const desiredDir=new THREE.Vector3()
          .addScaledVector(forwardVec,moveForward)
          .addScaledVector(rightVec,moveLeft);
        const desiredSpeed=PLAYER_MOVE_SPEED*magnitude;
        if (desiredDir.lengthSq()>1e-8) desiredDir.normalize();
        desiredDir.multiplyScalar(desiredSpeed);

        const response=1-Math.exp(-20.0*dt);
        moveVelocity.x=THREE.MathUtils.lerp(moveVelocity.x,desiredDir.x,response);
        moveVelocity.z=THREE.MathUtils.lerp(moveVelocity.z,desiredDir.z,response);

        if (magnitude<0.02) {
          const stop=Math.pow(0.03,dt);
          moveVelocity.x*=stop; moveVelocity.z*=stop;
          if (Math.abs(moveVelocity.x)<0.01) moveVelocity.x=0;
          if (Math.abs(moveVelocity.z)<0.01) moveVelocity.z=0;
        }

        const moved=moveEntityXZ(camera,moveVelocity.x*dt,moveVelocity.z*dt,0.45);
        if (!moved) {
          if (!moveEntityXZ(camera,moveVelocity.x*dt,0,0.45)) moveVelocity.x*=0.1;
          if (!moveEntityXZ(camera,0,moveVelocity.z*dt,0.45)) moveVelocity.z*=0.1;
        }
        clampCamera();
      }

      function updatePlayerUnit() { playerUnit.position.copy(camera.position); playerUnit.visible=false; }
      function updatePlayerDeathState() {
        player.alive = player.hp > 0;
        if (!player.alive) {
          firingHeld = false;
          if (fireLoopTimer!==null) { clearInterval(fireLoopTimer); fireLoopTimer = null; }
          setADS(false);
          gameMode = GAME_MODE.SPECTATE;
          spectateTarget = getSpectateTarget();
        }
      }

function updateSpectatorCamera(dt) {
  if (gameMode !== GAME_MODE.SPECTATE) return;
  if (!spectateTarget || !spectateTarget.userData.alive) spectateTarget = getSpectateTarget();
  if (!spectateTarget) return;
  const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(spectateTarget.quaternion);
  forward.y = 0;
  if (forward.lengthSq() < 1e-8) forward.set(0, 0, 1);
  forward.normalize();
  const desired = spectateTarget.position.clone().addScaledVector(forward, -4.0);
  desired.y = spectateTarget.position.y + 1.85;
  camera.position.lerp(desired, 1 - Math.exp(-6 * dt));
  camera.lookAt(spectateTarget.position.x, spectateTarget.position.y + 1.05, spectateTarget.position.z);
}

      /* ── 銃モデル ──────────────────────────────────── */
      function installGunModel(gltf) {
        if (gunRoot && gunRoot.parent) { gunRoot.parent.remove(gunRoot); gunRoot=null; }
        const root = gltf.scene || (gltf.scenes && gltf.scenes[0]);
        if (!root) { gunState.error='シーンなし'; logFileLine(`🔴 ${gunState.error}`, 'error'); return; }

        root.traverse((obj) => {
          if (!obj.isMesh) return;
          obj.castShadow=false; obj.receiveShadow=false;
          const applyMat = (mat) => {
            if (!mat) return new THREE.MeshStandardMaterial({ color:0xcccccc });
            const std=new THREE.MeshStandardMaterial({
              color: mat.color ? mat.color.clone() : new THREE.Color(0xcccccc),
              roughness:0.45, metalness:0.25,
            });
            if (mat.map) { std.map=mat.map; std.map.colorSpace=THREE.SRGBColorSpace; }
            if (mat.normalMap) std.normalMap=mat.normalMap;
            if (mat.transparent) { std.transparent=true; std.opacity=mat.opacity??1.0; }
            std.needsUpdate=true; return std;
          };
          if (Array.isArray(obj.material)) obj.material=obj.material.map(applyMat);
          else obj.material=applyMat(obj.material);
        });

        const box=new THREE.Box3().setFromObject(root);
        const size=new THREE.Vector3(), center=new THREE.Vector3();
        box.getSize(size); box.getCenter(center);
        if (!Number.isFinite(size.x) || size.lengthSq()<1e-8) {
          gunState.error='バウンディングボックス無効'; logFileLine(`🔴 ${gunState.error}`, 'error'); return;
        }
        root.position.sub(center);
        const maxDim=Math.max(size.x,size.y,size.z);
        root.scale.setScalar(0.95/maxDim);

        // 初期位置を通常（腰だめ）に設定
        root.position.copy(GUN_BASE_POS_NORMAL);
        root.rotation.set(
          THREE.MathUtils.degToRad(GUN_ROT_X),
          THREE.MathUtils.degToRad(GUN_ROT_Y),
          THREE.MathUtils.degToRad(GUN_ROT_Z)
        );
        uiScene.add(root);
        gunRoot=root; gunState.modelReady=true;
        // lerp用の現在位置も初期化
        gunPosCurrent.copy(GUN_BASE_POS_NORMAL);
        logFileLine('🟢 銃モデル読み込み完了');
      }

      function loadGunModel() {
        logFileLine(`📦 銃モデル読み込み: ${GUN_MODEL_URL}`);
        probeAsset(GUN_MODEL_URL, 'ju.glb');
        const lm=new THREE.LoadingManager();
        lm.onError=(url) => logFileLine(`🔴 読み込み失敗: ${url}`, 'error');
        const loader=new GLTFLoader(lm);
        loader.load(GUN_MODEL_URL, (gltf) => {
          try { installGunModel(gltf); } catch(e) { gunState.error=describeError(e); logFileLine(`🔴 処理中エラー: ${gunState.error}`, 'error'); }
        }, undefined, (err) => {
          const detail=describeError(err);
          gunState.error=`ju.glb 読み込み失敗: ${detail}`;
          logFileLine(`🔴 ${gunState.error}`, 'error');
        });
      }

      /* ── 銃のアップデート（ADS lerp・リコイル・リロードアニメ統合）─── */
      function updateGun(dt) {
        if (!gunRoot) return;

        // リコイル減衰（ADS時は少し早く収束）
        gunState.recoil = THREE.MathUtils.lerp(
          gunState.recoil,
          0,
          1 - Math.exp(-(adsActive ? 18 : 14) * dt)
        );

        // ADS: カメラFOVを滑らかに変化
        const targetFov = adsActive ? CAMERA_FOV_ADS : CAMERA_FOV_NORMAL;
        adsFovCurrent = THREE.MathUtils.lerp(adsFovCurrent, targetFov, 1 - Math.exp(-12 * dt));
        if (Math.abs(adsFovCurrent - camera.fov) > 0.05) {
          camera.fov = adsFovCurrent;
          camera.updateProjectionMatrix();
        }

        // 銃のローカル位置を目標に向けてlerp（ADS←→通常のスムーズ移動）
        const lerpSpeed = 1 - Math.exp(-14 * dt);
        gunPosCurrent.lerp(gunPosTarget, lerpSpeed);

        // リロードアニメーション オフセット
        let reloadOffsetY = 0;
        if (gunState.reloadAnim) {
          gunState.reloadAnimT = Math.min(gunState.reloadAnimT + dt, gunState.reloadAnimDur);
          const p = gunState.reloadAnimT / gunState.reloadAnimDur;
          if (p < 0.5) {
            const t = p / 0.5;
            reloadOffsetY = -0.35 * t * t;
          } else {
            const t = (p - 0.5) / 0.5;
            const overshoot = 1 - Math.pow(2, -10 * t) * Math.cos(t * Math.PI * 2.5);
            reloadOffsetY = -0.35 * (1 - overshoot);
          }
        }

        // カメラのワールド行列に基づいて銃の位置・向きを計算
        camera.updateMatrixWorld();
        const camMat = camera.matrixWorld;
        const recoil = gunState.recoil;

        const recoilY = recoil * (adsActive ? 0.008 : 0.022);
        const recoilZ = recoil * (adsActive ? 0.022 : 0.05);

        const localOffset = new THREE.Vector3(
          gunPosCurrent.x,
          gunPosCurrent.y + recoilY + reloadOffsetY,
          gunPosCurrent.z + recoilZ
        );

        const worldPos = localOffset.clone().applyMatrix4(camMat);
        gunRoot.position.copy(worldPos);

        const camQuat = new THREE.Quaternion();
        camera.getWorldQuaternion(camQuat);
        const baseRotQuat = new THREE.Quaternion().setFromEuler(GUN_BASE_ROT);
        const recoilPitchQuat = new THREE.Quaternion().setFromAxisAngle(
          new THREE.Vector3(1, 0, 0),
          -recoil * (adsActive ? 0.035 : 0.07)
        );
        gunRoot.quaternion.copy(camQuat).multiply(baseRotQuat).multiply(recoilPitchQuat);
      }

      function triggerRecoil() { gunState.recoil = Math.min(1.0, gunState.recoil + 0.72); }

      loadGunModel();

      /* ═══════════════════════════════════════════════
         強化 AI システム
      ═══════════════════════════════════════════════ */
      function aiUpdate(unit, time, dt) {
        if (!unit.userData.alive || unit.userData.isPlayer) return;

        const ud = unit.userData;

        // スタック検出
        const distMoved = unit.position.distanceTo(ud.prevPos);
        if (distMoved < 0.01) {
          ud.stuckTimer += dt;
        } else {
          ud.stuckTimer = 0;
          ud.prevPos.copy(unit.position);
        }
        if (ud.stuckTimer > 1.0) {
          ud.stuckTimer = 0;
          ud.aiState = 'wander';
          ud.coverTarget = null;
          ud.wanderDir.set(THREE.MathUtils.randFloat(-1,1), THREE.MathUtils.randFloat(-1,1)).normalize();
          ud.wanderTimer = THREE.MathUtils.randFloat(0.6, 1.5);
          unit.position.x += ud.wanderDir.x * 1.2;
          unit.position.z += ud.wanderDir.y * 1.2;
          unit.position.x = THREE.MathUtils.clamp(unit.position.x, -border+1, border-1);
          unit.position.z = THREE.MathUtils.clamp(unit.position.z, -border+1, border-1);
        }

        const target = getNearestEnemy(unit);
        if (!target) {
          ud.wanderTimer -= dt;
          if (ud.wanderTimer <= 0) {
            ud.wanderTimer = THREE.MathUtils.randFloat(0.8, 2.5);
            ud.wanderDir.set(THREE.MathUtils.randFloat(-1,1), THREE.MathUtils.randFloat(-1,1)).normalize();
          }
          moveEntityXZ(unit, ud.wanderDir.x*dt*1.5, ud.wanderDir.y*dt*1.5, 0.52);
          unit.position.y = Math.sin(time*2) * 0.05;
          return;
        }

        const dx=target.position.x-unit.position.x;
        const dz=target.position.z-unit.position.z;
        const dist=Math.hypot(dx,dz);
        const hasSight=hasLineOfSight(unit.position.x, unit.position.z, target.position.x, target.position.z);

        if (dist > 22 || (!hasSight && ud.aiState!=='cover')) {
          ud.aiState = 'approach';
        } else if (hasSight && dist <= 22) {
          if (ud.coverTimer <= 0) {
            if (Math.random() < 0.015 && ud.aiState==='combat') {
              const cv = getNearestCoverFrom(unit.position, target.position, 20);
              if (cv) {
                ud.coverTarget = cv;
                ud.aiState = 'cover';
                ud.coverTimer = THREE.MathUtils.randFloat(1.2, 3.0);
              }
            } else {
              ud.aiState = 'combat';
            }
          }
        }

        let vx=0, vz=0;
        const unitSpeed = 3.25 * (ud.moveSpeed||1);

        if (ud.aiState==='wander') {
          ud.wanderTimer -= dt;
          if (ud.wanderTimer <= 0) {
            ud.wanderTimer=THREE.MathUtils.randFloat(0.8,2.5);
            ud.wanderDir.set(THREE.MathUtils.randFloat(-1,1),THREE.MathUtils.randFloat(-1,1)).normalize();
          }
          vx=ud.wanderDir.x*0.7; vz=ud.wanderDir.y*0.7;

        } else if (ud.aiState==='approach') {
          ud.wanderTimer-=dt;
          if (ud.wanderTimer<=0) {
            ud.wanderTimer=THREE.MathUtils.randFloat(0.5,1.5);
            ud.wanderDir.set(THREE.MathUtils.randFloat(-1,1),THREE.MathUtils.randFloat(-1,1)).normalize();
          }
          const chaseX=dx/Math.max(dist,0.001), chaseZ=dz/Math.max(dist,0.001);
          vx=chaseX*1.1 + ud.wanderDir.x*0.3;
          vz=chaseZ*1.1 + ud.wanderDir.y*0.3;

        } else if (ud.aiState==='combat') {
          ud.strafeTimer -= dt;
          if (ud.strafeTimer <= 0) {
            ud.strafeDir *= -1;
            ud.strafeTimer = THREE.MathUtils.randFloat(0.18, 0.55);
          }
          const keepDist = dist < 8 ? -1 : (dist > 18 ? 1 : 0);
          const chaseX=dx/Math.max(dist,0.001), chaseZ=dz/Math.max(dist,0.001);
          const strafeX=-chaseZ * ud.strafeDir;
          const strafeZ= chaseX * ud.strafeDir;
          vx = chaseX*keepDist*0.8 + strafeX*1.25;
          vz = chaseZ*keepDist*0.8 + strafeZ*1.25;

        } else if (ud.aiState==='cover') {
          ud.coverTimer -= dt;
          if (ud.coverTimer <= 0 || !ud.coverTarget) {
            ud.coverTarget=null; ud.aiState='combat';
          } else {
            const cdx=ud.coverTarget.x-unit.position.x;
            const cdz=ud.coverTarget.z-unit.position.z;
            const cdist=Math.hypot(cdx,cdz);
            if (cdist < 1.5) {
              ud.strafeTimer-=dt;
              if (ud.strafeTimer<=0) { ud.strafeDir*=-1; ud.strafeTimer=THREE.MathUtils.randFloat(0.4,1.0); }
              const chaseX=dx/Math.max(dist,0.001), chaseZ=dz/Math.max(dist,0.001);
              vx=-chaseZ*ud.strafeDir*0.4; vz=chaseX*ud.strafeDir*0.4;
            } else {
              vx=cdx/cdist; vz=cdz/cdist;
            }
          }
        }

        const len=Math.hypot(vx,vz);
        if (len>0.001) { vx/=len; vz/=len; }
        const moved=moveEntityXZ(unit, vx*dt*unitSpeed, vz*dt*unitSpeed, 0.52);
        unit.position.y = Math.sin(time*2+unit.id)*0.05;

        if (!moved || unit.position.x<-border+1 || unit.position.x>border-1) {
          ud.wanderDir.x*=-1; unit.position.x=THREE.MathUtils.clamp(unit.position.x,-border+1,border-1);
        }
        if (!moved || unit.position.z<-border+1 || unit.position.z>border-1) {
          ud.wanderDir.y*=-1; unit.position.z=THREE.MathUtils.clamp(unit.position.z,-border+1,border-1);
        }

        unit.lookAt(target.position.x, target.position.y+1.0, target.position.z);

        ud.fireCooldown -= dt;
        const shootRange=48;
        if (ud.fireCooldown<=0 && dist<shootRange && hasSight && !roundEnding && !matchOver) {
          const muzzlePos=new THREE.Vector3(unit.position.x, unit.position.y+1.55, unit.position.z);
          const spread = ud.aiState==='combat' ? 0.008 : 0.02;
          const aimPos = target.position.clone();
          const targetPrev = target.userData.prevPos ? target.userData.prevPos.clone() : target.position.clone();
          const targetVel = target.position.clone().sub(targetPrev).multiplyScalar(1 / Math.max(dt, 0.016));
          const leadTime = THREE.MathUtils.clamp(dist / Math.max(unit.userData.bulletSpeed || 16, 1), 0.05, 0.22);
          aimPos.y += 1.05;
          aimPos.addScaledVector(targetVel, leadTime * 0.65);
          aimPos.x += THREE.MathUtils.randFloat(-spread, spread) * dist;
          aimPos.z += THREE.MathUtils.randFloat(-spread, spread) * dist;
          const shootDir = aimPos.sub(muzzlePos).normalize();
          createAIBullet(
            muzzlePos.clone().add(shootDir.clone().multiplyScalar(0.25)),
            shootDir, unit.userData.team,
            unit.userData.bulletSpeed||16, 4.0,
            unit.userData.bulletDamage||8
          );
          ud.fireCooldown = THREE.MathUtils.randFloat(0.12, 0.46);
        }
      }

      /* ── 弾更新 ────────────────────────────────────── */
      function updateBullets(dt) {
        for (let i=bullets.length-1; i>=0; i--) {
          const bullet=bullets[i];
          const data=bullet.userData;

          data.prev.copy(bullet.position);
          bullet.position.addScaledVector(data.dir, data.speed*dt);
          data.life-=dt;

          if (data.isTracer && bullet.material) {
            bullet.material.opacity=Math.max(0, data.life/0.06)*0.95;
          }

          if (data.life<=0) {
            group.remove(bullet); if (bullet.geometry) bullet.geometry.dispose(); if (bullet.material) bullet.material.dispose();
            bullets.splice(i,1); continue;
          }

          if (bulletHitsAnyObstacle(data.prev, bullet.position)) {
            group.remove(bullet); if (bullet.geometry) bullet.geometry.dispose(); if (bullet.material) bullet.material.dispose();
            bullets.splice(i,1); continue;
          }

          const hitTeam=data.team===TEAM.BLUE?TEAM.RED:TEAM.BLUE;
          const targetUnits=units.filter(u=>u.userData.alive && u.userData.team===hitTeam);

          for (const unit of targetUnits) {
            const center=new THREE.Vector3(unit.position.x, unit.position.y+1.05, unit.position.z);
            if (distancePointToSegment(center, data.prev, bullet.position) < unit.userData.radius) {
              unit.userData.hp-=data.damage;
              group.remove(bullet); if (bullet.geometry) bullet.geometry.dispose(); if (bullet.material) bullet.material.dispose();
              bullets.splice(i,1);

              if (unit.userData.isPlayer) {
                player.hp=Math.max(0, unit.userData.hp);
                player.maxHp=unit.userData.maxHp||player.maxHp;
                player.hurtFlash=1;
                updatePlayerHPUI();
              }

              if (unit.userData.hp<=0) {
                unit.userData.alive=false;
                if (unit.userData.isPlayer) {
                  player.hp=0; updatePlayerHPUI(); updatePlayerDeathState();
                  showAnnouncement('YOU DOWN');
                }
                unit.visible=false;
                growTeam(data.team, 1);
              }
              break;
            }
          }
        }
      }

      function updatePlayerDamageFlash(dt) {
        if (player.hurtFlash>0) {
          player.hurtFlash=Math.max(0,player.hurtFlash-dt*1.8);
          document.body.style.boxShadow=`inset 0 0 0 9999px rgba(255,0,0,${player.hurtFlash*0.12})`;
        } else {
          document.body.style.boxShadow='';
        }
      }

      function updateReload(dt) {
        if (!reloading) return;
        reloadTimer-=dt;
        updateAmmoUI();
        if (reloadTimer<=0) finishReload();
      }

      function resetForNextRound() {
        if (matchOver) return;
        roundIndex++;
        updateScoreUI();
        respawnRound();
        if (gameMode !== GAME_MODE.RESULT && gameMode !== GAME_MODE.LOBBY) gameMode = GAME_MODE.BATTLE;
        setModeUI();
      }

      function handlePlayerInput(dt) {
        if (gameMode !== GAME_MODE.BATTLE || portraitMode || roundEnding || matchOver || !player.alive) return;
        movePlayer(dt); updatePlayerUnit();
      }

      /* ── タッチ / マウスイベント ───────────────────── */
      shootBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        unlockAudio(); if (gameMode === GAME_MODE.BATTLE) setFiringHeld(true);
      }, { passive:false });
      shootBtn.addEventListener('touchend',    (e)=>{ e.preventDefault(); setFiringHeld(false); }, { passive:false });
      shootBtn.addEventListener('touchcancel', (e)=>{ e.preventDefault(); setFiringHeld(false); }, { passive:false });
      shootBtn.addEventListener('mousedown',   (e)=>{ e.preventDefault(); unlockAudio(); setFiringHeld(true); });
      document.addEventListener('mouseup', ()=>setFiringHeld(false));

      reloadBtn.addEventListener('touchstart', (e)=>{
        e.preventDefault(); e.stopPropagation();
        unlockAudio();
        if (gameMode === GAME_MODE.BATTLE && !reloading && ammo<MAG_SIZE && !roundEnding && !matchOver && player.alive) startReload();
      }, { passive:false });
      reloadBtn.addEventListener('mousedown', (e)=>{
        e.preventDefault(); unlockAudio();
        if (!reloading && ammo<MAG_SIZE && !roundEnding && !matchOver && player.alive) startReload();
      });

      if (lobbyStartBtn) {
        lobbyStartBtn.addEventListener('click', (e) => {
          e.preventDefault();
          unlockAudio();
          startBattle();
        });
        lobbyStartBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          unlockAudio();
          startBattle();
        }, { passive:false });
      }

      // ADS ボタン: 押すたびにADSを切り替え（トグル）
      adsBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        unlockAudio();
        if (gameMode !== GAME_MODE.LOBBY) toggleADS();
      }, { passive:false });
      adsBtn.addEventListener('touchend', (e) => {
        e.preventDefault(); e.stopPropagation();
      }, { passive:false });
      adsBtn.addEventListener('touchcancel', (e) => {
        e.preventDefault(); e.stopPropagation();
      }, { passive:false });
      // マウスでのADS（デスクトップテスト用）
      adsBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        unlockAudio();
        if (gameMode !== GAME_MODE.LOBBY) toggleADS();
      });

      document.addEventListener('mousedown', ()=>unlockAudio());
      document.addEventListener('contextmenu', (e)=>e.preventDefault());

      document.addEventListener('touchstart', (e)=>{
        unlockAudio();
        if (gameMode !== GAME_MODE.BATTLE || portraitMode) return;
        for (const touch of e.changedTouches) {
          const x=touch.clientX, y=touch.clientY;
          const shootRect=shootBtn.getBoundingClientRect();
          const reloadRect=reloadBtn.getBoundingClientRect();
          const adsRect=adsBtn.getBoundingClientRect();
          const joyRect=joystickEl.getBoundingClientRect();
          const inShoot =x>=shootRect.left&&x<=shootRect.right&&y>=shootRect.top&&y<=shootRect.bottom;
          const inReload=x>=reloadRect.left&&x<=reloadRect.right&&y>=reloadRect.top&&y<=reloadRect.bottom;
          const inAds   =x>=adsRect.left&&x<=adsRect.right&&y>=adsRect.top&&y<=adsRect.bottom;
          const inJoy   =x>=joyRect.left&&x<=joyRect.right&&y>=joyRect.top&&y<=joyRect.bottom;
          if (inShoot||inReload||inAds) continue;
          if (inJoy && joystickTouchId===null) { joystickTouchId=touch.identifier; setJoystickFromTouch(touch); continue; }
          if (x>window.innerWidth*0.42 && aimTouchId===null) { aimTouchId=touch.identifier; aim.lastX=x; aim.lastY=y; }
        }
      }, { passive:false });

      document.addEventListener('touchmove', (e)=>{
        if (gameMode !== GAME_MODE.BATTLE || portraitMode) return;
        for (const touch of e.changedTouches) {
          if (touch.identifier===joystickTouchId) { setJoystickFromTouch(touch); }
          if (touch.identifier===aimTouchId) {
            const dx=touch.clientX-aim.lastX, dy=touch.clientY-aim.lastY;
            aim.lastX=touch.clientX; aim.lastY=touch.clientY;
            const sensitivity=0.0039;
            yaw-=dx*sensitivity; pitch-=dy*sensitivity;
            const pitchLimit=Math.PI/2-0.05;
            pitch=THREE.MathUtils.clamp(pitch,-pitchLimit,pitchLimit);
          }
        }
        if (joystickTouchId!==null || aimTouchId!==null) e.preventDefault();
      }, { passive:false });

      document.addEventListener('touchend', (e)=>{
        if (gameMode !== GAME_MODE.BATTLE) return;
        for (const touch of e.changedTouches) {
          if (touch.identifier===joystickTouchId) { joystickTouchId=null; resetJoystickVisual(); }
          if (touch.identifier===aimTouchId) aimTouchId=null;
          // ADSのtouchendはadsBtn側で処理済み
        }
      }, { passive:false });

      document.addEventListener('touchcancel', (e)=>{
        if (gameMode !== GAME_MODE.BATTLE) return;
        for (const touch of e.changedTouches) {
          if (touch.identifier===joystickTouchId) { joystickTouchId=null; resetJoystickVisual(); }
          if (touch.identifier===aimTouchId) aimTouchId=null;
          if (touch.identifier===adsTouchId) { adsTouchId=null; setADS(false); }
        }
      }, { passive:false });

      /* ── リサイズ ──────────────────────────────────── */
      function resize() {
        const w=window.innerWidth, h=window.innerHeight;
        renderer.setSize(w,h,false);
        camera.aspect=w/h; camera.updateProjectionMatrix();
        updateOrientationUI();
      setModeUI();
      }

      /* ── メインループ ──────────────────────────────── */
      const clock = new THREE.Clock();

      function updateLobbyCamera(dt) {
        const desired = new THREE.Vector3(0, 14, 30);
        camera.position.lerp(desired, 1 - Math.exp(-2.5 * dt));
        camera.lookAt(0, 0, 0);
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt=Math.min(clock.getDelta(), 0.033);
        const t=clock.elapsedTime;

        if (gameMode === GAME_MODE.LOBBY) {
          updateLobbyCamera(dt);
          renderer.clear();
          renderer.render(scene, camera);
          renderer.clearDepth();
          renderer.render(uiScene, camera);
          return;
        }

        if (gameMode === GAME_MODE.SPECTATE) {
          syncCameraRotation();
          handlePlayerInput(dt);
          updatePlayerUnit();
          updateSpectatorCamera(dt);
          updateGun(dt);
          updateMuzzleFlashes(dt);
          for (const u of units) aiUpdate(u, t, dt);
          updateBullets(dt);
          checkRoundEnd();
          updateReload(dt);
          updatePlayerDamageFlash(dt);
        } else if (gameMode === GAME_MODE.BATTLE) {
          syncCameraRotation();
          handlePlayerInput(dt);
          updatePlayerUnit();
          updateGun(dt);
          updateMuzzleFlashes(dt);
          for (const u of units) aiUpdate(u, t, dt);
          updateBullets(dt);
          checkRoundEnd();
          updateReload(dt);
          updatePlayerDamageFlash(dt);
        } else if (gameMode === GAME_MODE.RESULT) {
          updateGun(dt);
          updateMuzzleFlashes(dt);
        }

        renderer.clear();
        renderer.render(scene, camera);
        renderer.clearDepth();
        renderer.render(uiScene, camera);
      }

      window.addEventListener('resize',            resize);
      window.addEventListener('orientationchange', resize);

      /* ── 初期化 ────────────────────────────────────── */
      function initGame() {
        updateScoreUI(); updateAmmoUI(); updatePlayerHPUI(); updateOrientationUI();
        resetArenaState({ resetLevels: true });
        gameMode = GAME_MODE.LOBBY;
        camera.position.set(0, 14, 30);
        camera.lookAt(0, 0, 0);
        setModeUI();
      }

      /* ── 起動 ──────────────────────────────────────── */
      logFileLine('起動: ロビー / 観戦 / 強化AI / ADS対応FPS');
      preloadShootSound();
      initGame();
      animate();
    })();
  </script>
</body>
