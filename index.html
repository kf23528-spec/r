<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TACT-4 | Team Deathmatch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;}
#c{display:block;width:100vw;height:100vh;}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;}
#scorebar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.75);padding:8px 16px;font-size:13px;color:#fff;border-bottom:1px solid rgba(255,255,255,0.1);}
#scorebar .team{display:flex;align-items:center;gap:8px;}
#scorebar .kills{font-size:22px;font-weight:700;}
#scorebar .label{font-size:11px;opacity:0.6;letter-spacing:1px;}
#scorebar .blue .kills{color:#5BB5FF;}
#scorebar .red .kills{color:#FF5B5B;}
#scorebar .mid{text-align:center;}
#scorebar .deaths{font-size:12px;color:#FFD700;}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;}
#crosshair svg{display:block;}
#hit-indicator{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;border:3px solid #FF5B5B;opacity:0;pointer-events:none;z-index:10;transition:opacity 0.1s;}
#health-bar{position:fixed;bottom:env(safe-area-inset-bottom,0);left:50%;transform:translateX(-50%);width:200px;height:8px;background:rgba(255,255,255,0.15);border-radius:4px;z-index:10;margin-bottom:12px;}
#health-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#FF5B5B,#FFD700,#5CFF8A);transition:width 0.15s;}
#health-num{position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 24px);left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:600;z-index:10;letter-spacing:1px;}
#ammo{position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 12px);right:16px;color:#fff;font-size:16px;font-weight:700;z-index:10;text-align:right;}
#ammo .cur{font-size:28px;}
#kill-feed{position:fixed;top:70px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:10;pointer-events:none;}
.kf-entry{background:rgba(0,0,0,0.7);padding:4px 10px;border-radius:4px;font-size:12px;color:#fff;animation:kf-anim 3s forwards;}
@keyframes kf-anim{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;}
#overlay h1{font-size:32px;font-weight:700;letter-spacing:3px;margin-bottom:8px;}
#overlay p{font-size:14px;opacity:0.6;margin-bottom:32px;text-align:center;max-width:340px;}
#overlay button{background:#5BB5FF;color:#000;border:none;padding:14px 40px;font-size:15px;font-weight:700;border-radius:6px;cursor:pointer;letter-spacing:2px;}
#overlay button:hover{background:#fff;}
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;color:#fff;}
#win-overlay h1{font-size:48px;font-weight:900;letter-spacing:4px;margin-bottom:16px;}
#win-overlay p{font-size:18px;opacity:0.7;margin-bottom:32px;}
#win-overlay button{background:#5BB5FF;color:#000;border:none;padding:14px 40px;font-size:15px;font-weight:700;border-radius:6px;cursor:pointer;}
#death-screen{position:fixed;inset:0;background:rgba(200,0,0,0.2);display:none;pointer-events:none;z-index:50;align-items:center;justify-content:center;}
#death-screen p{color:#FF5B5B;font-size:28px;font-weight:700;letter-spacing:3px;}
#pointer-lock-msg{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:12px;z-index:10;pointer-events:none;}
/* Mobile controls */
#mobile-controls{display:none;position:fixed;inset:0;pointer-events:none;z-index:20;}
#joystick-zone{position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 20px);left:20px;width:140px;height:140px;pointer-events:all;}
#joystick-base{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);}
#joystick-knob{position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.35);border:2px solid rgba(255,255,255,0.5);top:50%;left:50%;transform:translate(-50%,-50%);transition:none;}
#fire-btn{position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 20px);right:20px;width:80px;height:80px;border-radius:50%;background:rgba(255,80,80,0.8);border:3px solid rgba(255,120,120,0.9);pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px;user-select:none;-webkit-tap-highlight-color:transparent;}
#reload-btn{position:absolute;bottom:calc(env(safe-area-inset-bottom,0) + 110px);right:20px;width:52px;height:52px;border-radius:50%;background:rgba(255,200,50,0.7);border:2px solid rgba(255,220,80,0.9);pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;user-select:none;-webkit-tap-highlight-color:transparent;}
#look-zone{position:absolute;top:0;right:0;width:60%;height:100%;pointer-events:all;}
@media(max-width:768px){
  #mobile-controls{display:block;}
  #crosshair{display:none;}
  #pointer-lock-msg{display:none;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="scorebar">
    <div class="team blue">
      <div>
        <div class="label">BLUE TEAM</div>
        <div class="kills" id="blue-kills">0</div>
      </div>
    </div>
    <div class="mid">
      <div class="deaths" id="deaths-display">DEATHS: 0</div>
      <div style="font-size:10px;opacity:0.4;margin-top:2px;">FIRST TO 20</div>
    </div>
    <div class="team red">
      <div style="text-align:right;">
        <div class="label">RED TEAM</div>
        <div class="kills" id="red-kills">0</div>
      </div>
    </div>
  </div>
</div>

<div id="crosshair">
  <svg width="20" height="20" viewBox="0 0 20 20">
    <line x1="10" y1="3" x2="10" y2="8" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="10" y1="12" x2="10" y2="17" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="3" y1="10" x2="8" y2="10" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <line x1="12" y1="10" x2="17" y2="10" stroke="white" stroke-width="1.5" opacity="0.9"/>
  </svg>
</div>

<div id="hit-indicator"></div>
<div id="health-bar"><div id="health-fill" style="width:100%"></div></div>
<div id="health-num">100 HP</div>
<div id="ammo"><span class="cur" id="ammo-cur">30</span> / <span id="ammo-res">90</span></div>
<div id="kill-feed"></div>
<div id="pointer-lock-msg">クリックして操作開始</div>

<div id="overlay">
  <h1>TACT-4</h1>
  <p>4 vs 4 チームデスマッチ<br>先に20キルを奪ったチームの勝利<br><br>【PC】クリック後 WASD+マウスで操作<br>【スマホ】左バーチャルパッド+右スワイプ+射撃ボタン</p>
  <button id="start-btn">START MATCH</button>
</div>

<div id="win-overlay">
  <h1 id="win-text">VICTORY</h1>
  <p id="win-sub">Blue Team wins!</p>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<div id="death-screen" style="display:flex;">
  <p id="death-msg" style="display:none;">ELIMINATED</p>
</div>

<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <div id="fire-btn">FIRE</div>
  <div id="reload-btn">R</div>
  <div id="look-zone"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ── Globals ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87CEEB);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 30, 120);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 1.65, 0);

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  running: false,
  blueKills: 0,
  redKills: 0,
  playerDeaths: 0,
  playerHP: 100,
  playerMaxHP: 100,
  ammo: 30,
  maxAmmo: 30,
  reserve: 90,
  reloading: false,
  reloadTimer: 0,
  dead: false,
  respawnTimer: 0,
  yaw: 0,
  pitch: 0,
  shootCooldown: 0,
};

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
let pointerLocked = false;
let mouseDX = 0, mouseDY = 0;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'KeyR' && !state.reloading && state.ammo < state.maxAmmo && state.reserve > 0) startReload();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', () => {
  if(!isMobile() && !pointerLocked) canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
  document.getElementById('pointer-lock-msg').style.opacity = pointerLocked ? '0' : '1';
});
document.addEventListener('mousemove', e => {
  if(!pointerLocked) return;
  mouseDX += e.movementX;
  mouseDY += e.movementY;
});
document.addEventListener('mousedown', e => {
  if(e.button === 0 && pointerLocked) tryShoot();
});

function isMobile(){ return window.innerWidth <= 768 || navigator.maxTouchPoints > 0; }

// ── Mobile Controls ───────────────────────────────────────────────────────────
const joystickZone = document.getElementById('joystick-zone');
const joystickKnob = document.getElementById('joystick-knob');
const fireBtn = document.getElementById('fire-btn');
const reloadBtn = document.getElementById('reload-btn');
const lookZone = document.getElementById('look-zone');

const jsState = { active: false, id: null, cx: 70, cy: 70, dx: 0, dy: 0 };
const lookState = { active: false, id: null, lx: 0, ly: 0 };
let fireHeld = false;

function getJoystickRect(){ return joystickZone.getBoundingClientRect(); }

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = getJoystickRect();
  jsState.active = true;
  jsState.id = t.identifier;
  jsState.cx = r.left + r.width/2;
  jsState.cy = r.top + r.height/2;
  updateJoystick(t);
}, {passive:false});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  for(let t of e.changedTouches){
    if(jsState.active && t.identifier === jsState.id) updateJoystick(t);
    if(lookState.active && t.identifier === lookState.id){
      mouseDX += (t.clientX - lookState.lx) * 1.5;
      mouseDY += (t.clientY - lookState.ly) * 1.5;
      lookState.lx = t.clientX;
      lookState.ly = t.clientY;
    }
  }
}, {passive:false});

document.addEventListener('touchend', e => {
  for(let t of e.changedTouches){
    if(jsState.active && t.identifier === jsState.id){
      jsState.active = false; jsState.dx = 0; jsState.dy = 0;
      joystickKnob.style.transform = 'translate(-50%,-50%)';
    }
    if(lookState.active && t.identifier === lookState.id) lookState.active = false;
  }
});

function updateJoystick(t){
  const r = 44;
  let dx = t.clientX - jsState.cx;
  let dy = t.clientY - jsState.cy;
  const len = Math.sqrt(dx*dx+dy*dy);
  if(len > r){ dx = dx/len*r; dy = dy/len*r; }
  jsState.dx = dx/r;
  jsState.dy = dy/r;
  joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

lookZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if(!lookState.active){
    lookState.active = true;
    lookState.id = t.identifier;
    lookState.lx = t.clientX;
    lookState.ly = t.clientY;
  }
}, {passive:false});

fireBtn.addEventListener('touchstart', e => { e.preventDefault(); fireHeld = true; tryShoot(); }, {passive:false});
fireBtn.addEventListener('touchend', e => { e.preventDefault(); fireHeld = false; }, {passive:false});
reloadBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  if(!state.reloading && state.ammo < state.maxAmmo && state.reserve > 0) startReload();
}, {passive:false});

// ── Scene Setup ──────────────────────────────────────────────────────────────
// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
scene.add(sun);

// Floor
const floorGeo = new THREE.PlaneGeometry(100, 100);
const floorMat = new THREE.MeshLambertMaterial({color: 0xB8A898});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid lines
const gridHelper = new THREE.GridHelper(100, 20, 0x888888, 0x888888);
gridHelper.material.opacity = 0.25;
gridHelper.material.transparent = true;
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Sky
const skyGeo = new THREE.SphereGeometry(150, 16, 8);
const skyMat = new THREE.MeshBasicMaterial({color: 0x6BA3BE, side: THREE.BackSide});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ── Stage Geometry ────────────────────────────────────────────────────────────
const obstacles = []; // {mesh, box}

function addBox(x, y, z, w, h, d, color, castShadow=true){
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({color});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y+h/2, z);
  mesh.castShadow = castShadow;
  mesh.receiveShadow = true;
  scene.add(mesh);
  const box = new THREE.Box3().setFromObject(mesh);
  obstacles.push({mesh, box});
  return mesh;
}

function addWall(x, y, z, w, h, d, color){
  return addBox(x, y, z, w, h, d, color ?? 0xAAAAAA);
}

// Outer walls
addWall(-50, 0, 0,  1, 4, 100, 0x999988);
addWall( 50, 0, 0,  1, 4, 100, 0x999988);
addWall(0, 0, -50, 100, 4,  1, 0x999988);
addWall(0, 0,  50, 100, 4,  1, 0x999988);

// Central structure
addWall(0, 0, 0, 8, 4, 2, 0x887766);
addWall(0, 0, 8, 2, 4, 8, 0x887766);
addWall(0, 0,-8, 2, 4, 8, 0x887766);

// Containers (crates / cover boxes)
const containerColor = 0x5577AA;
const crateColor = 0x99773344;

// Blue side containers
addBox(-18, 0, -10, 4, 3, 2, 0x4466AA);
addBox(-18, 0, -6,  2, 3, 2, 0x4466AA);
addBox(-12, 0, -18, 2, 2, 4, 0x668844);
addBox(-24, 0,  0,  2, 3, 6, 0x4466AA);
addBox(-30, 0, 12,  4, 3, 2, 0x4466AA);
addBox(-20, 0, 18,  2, 3, 4, 0x4466AA);
addBox(-8,  0, 24,  4, 2, 2, 0x668844);

// Red side containers
addBox(18, 0, 10, 4, 3, 2, 0xAA4444);
addBox(18, 0,  6, 2, 3, 2, 0xAA4444);
addBox(12, 0, 18, 2, 2, 4, 0x884444);
addBox(24, 0,  0, 2, 3, 6, 0xAA4444);
addBox(30, 0,-12, 4, 3, 2, 0xAA4444);
addBox(20, 0,-18, 2, 3, 4, 0xAA4444);
addBox(8,  0,-24, 4, 2, 2, 0x884444);

// Mid field cover
addBox(-6, 0, 0, 2, 2, 2, 0xBBAA88);
addBox( 6, 0, 0, 2, 2, 2, 0xBBAA88);
addBox( 0, 0, 12, 2, 2, 4, 0xBBAA88);
addBox( 0, 0,-12, 2, 2, 4, 0xBBAA88);
addBox(-14, 0, 6, 2, 1.5, 4, 0x996655);
addBox( 14, 0,-6, 2, 1.5, 4, 0x996655);

// Raised platforms
addBox(-20, 0,-20, 8, 1, 8, 0xAA9988);
addBox( 20, 0, 20, 8, 1, 8, 0x997766);

// ── Character Creation ────────────────────────────────────────────────────────
function makeCuboid(topColor, bodyColor, isAlly){
  const g = new THREE.Group();
  // body
  const bodyGeo = new THREE.BoxGeometry(0.6, 1.0, 0.3);
  const bodyMat = new THREE.MeshLambertMaterial({color: bodyColor});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);
  // head
  const headGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
  const headMat = new THREE.MeshLambertMaterial({color: topColor});
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.2;
  head.castShadow = true;
  g.add(head);
  // legs
  for(let s of [-1,1]){
    const legGeo = new THREE.BoxGeometry(0.22, 0.6, 0.22);
    const legMat = new THREE.MeshLambertMaterial({color: isAlly ? 0x2244AA : 0xAA2222});
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(s*0.16, -0.3, 0);
    leg.castShadow = true;
    g.add(leg);
  }
  g.position.y = 0.3;
  return g;
}

// Nametag (canvas texture)
function makeNametag(name, color){
  const canvas2 = document.createElement('canvas');
  canvas2.width = 256; canvas2.height = 64;
  const ctx = canvas2.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.fillStyle = color === 'blue' ? 'rgba(50,120,255,0.85)' : 'rgba(255,60,60,0.85)';
  ctx.roundRect(8, 8, 240, 48, 10);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(name, 128, 32);
  const tex = new THREE.CanvasTexture(canvas2);
  const mat = new THREE.SpriteMaterial({map: tex, depthTest: false});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.2, 0.3, 1);
  sprite.position.y = 0.5;
  return sprite;
}

// Gun fallback
function makeGunFallback(){
  const g = new THREE.Group();
  const barrelGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8);
  const gripGeo = new THREE.BoxGeometry(0.06, 0.15, 0.06);
  const mat = new THREE.MeshLambertMaterial({color: 0x555566});
  const barrel = new THREE.Mesh(barrelGeo, mat);
  barrel.rotation.x = Math.PI/2;
  barrel.position.z = -0.2;
  g.add(barrel);
  const grip = new THREE.Mesh(gripGeo, mat);
  grip.position.y = -0.09;
  g.add(grip);
  return g;
}

// Viewmodel gun
const gunGroup = new THREE.Group();
const gunModel = makeGunFallback();
gunGroup.add(gunModel);
gunGroup.position.set(0.22, -0.22, -0.4);
camera.add(gunGroup);
scene.add(camera);

// ── Spawn Points ──────────────────────────────────────────────────────────────
const blueSpawns = [
  [-30,-30], [-35,-25], [-25,-35], [-32,-20]
].map(([x,z])=>new THREE.Vector3(x, 1.65, z));
const redSpawns = [
  [30,30], [35,25], [25,35], [32,20]
].map(([x,z])=>new THREE.Vector3(x, 1.65, z));

// ── Characters ────────────────────────────────────────────────────────────────
const NAMES_ALLY = ['Raze','Sage','Breach'];
const NAMES_ENEMY = ['Phoenix','Jett','Sage-R','Reyna'];

class Character {
  constructor(isAlly, index){
    this.isAlly = isAlly;
    this.hp = 100;
    this.alive = true;
    this.name = isAlly ? NAMES_ALLY[index] : NAMES_ENEMY[index];
    this.color = isAlly ? 'blue' : 'red';
    this.mesh = makeCuboid(
      isAlly ? 0x3366DD : 0xDD3333,
      isAlly ? 0x2255BB : 0xBB2222,
      isAlly
    );
    this.nameSprite = makeNametag(this.name, this.color);
    this.nameSprite.position.y = 2.2;
    this.mesh.add(this.nameSprite);
    scene.add(this.mesh);

    // Spawn
    const spawns = isAlly ? blueSpawns : redSpawns;
    const sp = spawns[index % spawns.length];
    this.mesh.position.copy(sp);
    this.mesh.position.y = 0;

    // AI state
    this.vel = new THREE.Vector3();
    this.target = null;
    this.shootTimer = 0;
    this.moveTimer = 0;
    this.moveDir = new THREE.Vector3();
    this.waypoint = null;
    this.waypointTimer = 0;
    this.respawnTimer = 0;
    this.sightRange = 28;
  }

  respawn(){
    const spawns = this.isAlly ? blueSpawns : redSpawns;
    const sp = spawns[Math.floor(Math.random()*spawns.length)];
    this.mesh.position.copy(sp);
    this.mesh.position.y = 0;
    this.hp = 100;
    this.alive = true;
    this.mesh.visible = true;
    this.target = null;
  }

  takeDamage(dmg){
    if(!this.alive) return;
    this.hp -= dmg;
    if(this.hp <= 0){
      this.hp = 0;
      this.alive = false;
      this.mesh.visible = false;
      this.respawnTimer = 5;
      return true; // killed
    }
    return false;
  }
}

// Player position object
const playerPos = new THREE.Vector3(blueSpawns[0].x, blueSpawns[0].y, blueSpawns[0].z);
camera.position.copy(playerPos);

const allies = [0,1,2].map(i => new Character(true, i));
const enemies = [0,1,2,3].map(i => new Character(false, i));
const allChars = [...allies, ...enemies];

// ── Collision ─────────────────────────────────────────────────────────────────
const playerBox = new THREE.Box3();
const tempBox = new THREE.Box3();

function collidePlayer(pos){
  playerBox.setFromCenterAndSize(pos, new THREE.Vector3(0.5, 1.6, 0.5));
  for(const obs of obstacles){
    obs.box.setFromObject(obs.mesh);
    if(playerBox.intersectsBox(obs.box)){
      return true;
    }
  }
  return false;
}

function collideChar(pos){
  tempBox.setFromCenterAndSize(pos, new THREE.Vector3(0.5, 1.6, 0.5));
  for(const obs of obstacles){
    obs.box.setFromObject(obs.mesh);
    if(tempBox.intersectsBox(obs.box)) return true;
  }
  return false;
}

function clampToStage(pos){
  pos.x = Math.max(-49, Math.min(49, pos.x));
  pos.z = Math.max(-49, Math.min(49, pos.z));
}

// ── Raycast Sight Check ───────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const obsOnly = () => obstacles.map(o => o.mesh);

function hasLineOfSight(from, to){
  const dir = to.clone().sub(from).normalize();
  const dist = from.distanceTo(to);
  raycaster.set(from, dir);
  raycaster.far = dist;
  const hits = raycaster.intersectObjects(obsOnly());
  return hits.length === 0;
}

// ── Bullets ───────────────────────────────────────────────────────────────────
const bullets = [];
const bulletGeo = new THREE.SphereGeometry(0.05, 4, 4);
const bulletMats = {
  ally: new THREE.MeshBasicMaterial({color: 0x88DDFF}),
  enemy: new THREE.MeshBasicMaterial({color: 0xFF8844}),
};

function spawnBullet(from, dir, isAlly){
  const mesh = new THREE.Mesh(bulletGeo, isAlly ? bulletMats.ally : bulletMats.enemy);
  mesh.position.copy(from);
  scene.add(mesh);
  bullets.push({mesh, dir: dir.clone(), speed: 40, isAlly, life: 2});
}

// ── Shoot ─────────────────────────────────────────────────────────────────────
function tryShoot(){
  if(state.dead || !state.running) return;
  if(state.shootCooldown > 0 || state.reloading) return;
  if(state.ammo <= 0){ startReload(); return; }
  state.ammo--;
  state.shootCooldown = 0.1;
  updateAmmoUI();

  // Muzzle flash
  gunGroup.rotation.x = -0.08;
  setTimeout(()=>{ gunGroup.rotation.x = 0; }, 60);

  // Direction from camera
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.quaternion);
  const from = camera.position.clone();

  spawnBullet(from, dir, true);

  // Immediate raycast check
  raycaster.set(from, dir);
  raycaster.far = 80;
  const charMeshes = enemies.filter(e=>e.alive).map(e=>e.mesh.children).flat();
  const enemyMeshArr = enemies.filter(e=>e.alive).flatMap(e=>[e.mesh,...e.mesh.children]);
  const hits = raycaster.intersectObjects(enemyMeshArr, true);
  if(hits.length > 0){
    const hit = hits[0];
    // Find which enemy
    for(const e of enemies){
      if(!e.alive) continue;
      const ebox = new THREE.Box3().setFromObject(e.mesh);
      if(ebox.containsPoint(hit.point)){
        const killed = e.takeDamage(35);
        showHitIndicator();
        if(killed){
          state.blueKills++;
          addKillfeed('YOU', e.name, true);
          updateScoreUI();
          checkWin();
        }
        break;
      }
    }
  }
}

function startReload(){
  if(state.reloading || state.reserve <= 0) return;
  state.reloading = true;
  state.reloadTimer = 2.0;
}

function showHitIndicator(){
  const el = document.getElementById('hit-indicator');
  el.style.opacity = '1';
  setTimeout(()=>{ el.style.opacity = '0'; }, 200);
}

// ── Kill Feed ─────────────────────────────────────────────────────────────────
function addKillfeed(killer, victim, isBlue){
  const kf = document.getElementById('kill-feed');
  const el = document.createElement('div');
  el.className = 'kf-entry';
  el.style.borderLeft = isBlue ? '3px solid #5BB5FF' : '3px solid #FF5B5B';
  el.textContent = `${killer} ▶ ${victim}`;
  kf.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 3100);
}

// ── UI Updates ────────────────────────────────────────────────────────────────
function updateScoreUI(){
  document.getElementById('blue-kills').textContent = state.blueKills;
  document.getElementById('red-kills').textContent = state.redKills;
  document.getElementById('deaths-display').textContent = `DEATHS: ${state.playerDeaths}`;
}
function updateHealthUI(){
  const pct = Math.max(0, state.playerHP / state.playerMaxHP * 100);
  document.getElementById('health-fill').style.width = pct + '%';
  document.getElementById('health-num').textContent = Math.ceil(state.playerHP) + ' HP';
}
function updateAmmoUI(){
  document.getElementById('ammo-cur').textContent = state.ammo;
  document.getElementById('ammo-res').textContent = state.reserve;
}
function checkWin(){
  if(state.blueKills >= 20 || state.redKills >= 20){
    const wo = document.getElementById('win-overlay');
    const wt = document.getElementById('win-text');
    const ws = document.getElementById('win-sub');
    if(state.blueKills >= 20){
      wt.textContent = 'VICTORY'; wt.style.color = '#5BB5FF';
      ws.textContent = 'Blue Team wins! ' + state.blueKills + ' : ' + state.redKills;
    } else {
      wt.textContent = 'DEFEAT'; wt.style.color = '#FF5B5B';
      ws.textContent = 'Red Team wins! ' + state.redKills + ' : ' + state.blueKills;
    }
    wo.style.display = 'flex';
    state.running = false;
    if(document.pointerLockElement) document.exitPointerLock();
  }
}

// ── Player Death / Respawn ────────────────────────────────────────────────────
function playerDie(){
  state.dead = true;
  state.playerDeaths++;
  state.playerHP = 0;
  updateHealthUI();
  updateScoreUI();
  const ds = document.getElementById('death-screen');
  const dm = document.getElementById('death-msg');
  ds.style.background = 'rgba(200,0,0,0.35)';
  dm.style.display = 'block';
  state.respawnTimer = 5;
  if(pointerLocked) document.exitPointerLock();
}

function playerRespawn(){
  state.dead = false;
  state.playerHP = state.playerMaxHP;
  state.ammo = state.maxAmmo;
  state.reserve = 90;
  updateHealthUI();
  updateAmmoUI();
  document.getElementById('death-msg').style.display = 'none';
  document.getElementById('death-screen').style.background = 'transparent';
  // Teleport to spawn
  const sp = blueSpawns[0];
  camera.position.set(sp.x, sp.y, sp.z);
  state.yaw = 0; state.pitch = 0;
}

// ── AI Movement & Combat ──────────────────────────────────────────────────────
const PATROL_POINTS_BLUE = [
  new THREE.Vector3(-20,-0,0), new THREE.Vector3(-15,-0,-15),
  new THREE.Vector3(-10,-0,-5), new THREE.Vector3(-25,-0,-10),
  new THREE.Vector3(-5,-0,-20), new THREE.Vector3(-30,-0,5),
];
const PATROL_POINTS_RED = [
  new THREE.Vector3(20,0,0), new THREE.Vector3(15,0,15),
  new THREE.Vector3(10,0,5), new THREE.Vector3(25,0,10),
  new THREE.Vector3(5,0,20), new THREE.Vector3(30,0,-5),
];

function updateAI(char, dt, enemies_list){
  if(!char.alive){
    char.respawnTimer -= dt;
    if(char.respawnTimer <= 0) char.respawn();
    return;
  }

  // Update shoot timer
  char.shootTimer -= dt;
  char.waypointTimer -= dt;

  // Find visible target
  const pos = char.mesh.position.clone();
  pos.y += 1.2;
  char.target = null;

  for(const e of enemies_list){
    if(!e.alive) continue;
    const epos = e.isAlly
      ? camera.position.clone()
      : (e.mesh ? e.mesh.position.clone().add(new THREE.Vector3(0,1.2,0)) : null);
    if(!epos) continue;

    // Player as potential target for enemies
    let targetPos;
    if(!char.isAlly && e === 'player'){
      targetPos = camera.position.clone().add(new THREE.Vector3(0,0,0));
    } else if(e.mesh){
      targetPos = e.mesh.position.clone().add(new THREE.Vector3(0,1.2,0));
    } else continue;

    const dist = pos.distanceTo(targetPos);
    if(dist > char.sightRange) continue;
    if(hasLineOfSight(pos, targetPos)){
      char.target = {pos: targetPos, ref: e};
      break;
    }
  }

  // Rotate toward target or waypoint
  if(char.target){
    const dir = char.target.pos.clone().sub(pos);
    dir.y = 0;
    if(dir.length() > 0.1){
      const angle = Math.atan2(dir.x, dir.z);
      char.mesh.rotation.y = angle;
    }

    // Shoot
    if(char.shootTimer <= 0){
      char.shootTimer = 0.6 + Math.random()*0.4;
      const fromPos = pos.clone();
      const toPos = char.target.pos.clone();
      const shotDir = toPos.sub(fromPos).normalize();
      // Add inaccuracy
      shotDir.x += (Math.random()-0.5)*0.08;
      shotDir.y += (Math.random()-0.5)*0.05;
      shotDir.normalize();
      spawnBullet(fromPos, shotDir, char.isAlly);

      // Hit check against target
      if(char.target.ref === 'player'){
        if(!state.dead){
          const hitChance = 0.35;
          if(Math.random() < hitChance){
            state.playerHP -= 20 + Math.random()*10;
            updateHealthUI();
            showDamageVignette();
            if(state.playerHP <= 0){
              state.redKills++;
              addKillfeed(char.name, 'YOU', false);
              updateScoreUI();
              checkWin();
              playerDie();
            }
          }
        }
      } else if(char.target.ref && char.target.ref.mesh){
        const hitChance = 0.4;
        if(Math.random() < hitChance){
          const killed = char.target.ref.takeDamage(30);
          if(killed){
            if(char.isAlly){
              state.blueKills++;
              addKillfeed(char.name, char.target.ref.name, true);
            } else {
              state.redKills++;
              addKillfeed(char.name, char.target.ref.name, false);
            }
            updateScoreUI();
            checkWin();
          }
        }
      }
    }

    // Move toward target but keep some distance
    const distToTarget = pos.distanceTo(char.target.pos);
    if(distToTarget > 8){
      const moveDir = char.target.pos.clone().sub(pos);
      moveDir.y = 0;
      moveDir.normalize();
      const newPos = char.mesh.position.clone().add(moveDir.multiplyScalar(dt*3.5));
      newPos.y = 0;
      if(!collideChar(newPos.clone().add(new THREE.Vector3(0,0.8,0)))){
        clampToStage(newPos);
        char.mesh.position.copy(newPos);
      }
    }
  } else {
    // Patrol
    const patrolPoints = char.isAlly ? PATROL_POINTS_BLUE : PATROL_POINTS_RED;
    if(!char.waypoint || char.waypointTimer <= 0 || char.mesh.position.distanceTo(char.waypoint) < 1.5){
      char.waypoint = patrolPoints[Math.floor(Math.random()*patrolPoints.length)].clone();
      char.waypointTimer = 4 + Math.random()*3;
    }
    const dir = char.waypoint.clone().sub(char.mesh.position);
    dir.y = 0;
    if(dir.length() > 0.5){
      dir.normalize();
      const angle = Math.atan2(dir.x, dir.z);
      char.mesh.rotation.y = angle;
      const speed = 2.5;
      const newPos = char.mesh.position.clone().add(dir.multiplyScalar(dt*speed));
      newPos.y = 0;
      if(!collideChar(newPos.clone().add(new THREE.Vector3(0,0.8,0)))){
        clampToStage(newPos);
        char.mesh.position.copy(newPos);
      }
    }
  }
}

function showDamageVignette(){
  const ds = document.getElementById('death-screen');
  ds.style.background = 'rgba(200,0,0,0.25)';
  setTimeout(()=>{ if(!state.dead) ds.style.background = 'transparent'; }, 300);
}

// ── Player Movement ───────────────────────────────────────────────────────────
const vel = new THREE.Vector3();
const tmpMove = new THREE.Vector3();

function updatePlayer(dt){
  if(state.dead) return;

  // Mouse / touch look
  const sensitivity = isMobile() ? 0.004 : 0.002;
  state.yaw   -= mouseDX * sensitivity;
  state.pitch -= mouseDY * sensitivity;
  state.pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, state.pitch));
  mouseDX = 0; mouseDY = 0;

  camera.quaternion.setFromEuler(new THREE.Euler(state.pitch, state.yaw, 0, 'YXZ'));

  // Keyboard / joystick
  let fwd = 0, right = 0;
  if(keys['KeyW'] || keys['ArrowUp'])    fwd   += 1;
  if(keys['KeyS'] || keys['ArrowDown'])  fwd   -= 1;
  if(keys['KeyA'] || keys['ArrowLeft'])  right -= 1;
  if(keys['KeyD'] || keys['ArrowRight']) right += 1;

  if(jsState.active){
    fwd   = -jsState.dy;
    right = jsState.dx;
  }

  // Auto-fire on mobile when held
  if(fireHeld && state.shootCooldown <= 0 && !state.reloading){
    tryShoot();
  }

  const speed = 5.5;
  const forward = new THREE.Vector3(-Math.sin(state.yaw), 0, -Math.cos(state.yaw));
  const rightV   = new THREE.Vector3( Math.cos(state.yaw), 0, -Math.sin(state.yaw));

  tmpMove.set(0, 0, 0);
  tmpMove.addScaledVector(forward, fwd * dt * speed);
  tmpMove.addScaledVector(rightV, right * dt * speed);

  // Try X
  const newPosX = camera.position.clone();
  newPosX.x += tmpMove.x;
  if(!collidePlayer(newPosX)) camera.position.x = newPosX.x;

  // Try Z
  const newPosZ = camera.position.clone();
  newPosZ.z += tmpMove.z;
  if(!collidePlayer(newPosZ)) camera.position.z = newPosZ.z;

  clampToStage(camera.position);

  // Reload
  if(state.reloading){
    state.reloadTimer -= dt;
    if(state.reloadTimer <= 0){
      const need = state.maxAmmo - state.ammo;
      const take = Math.min(need, state.reserve);
      state.ammo += take;
      state.reserve -= take;
      state.reloading = false;
      updateAmmoUI();
    }
  }
  state.shootCooldown = Math.max(0, state.shootCooldown - dt);
}

// ── Bullet Update ─────────────────────────────────────────────────────────────
function updateBullets(dt){
  for(let i = bullets.length-1; i >= 0; i--){
    const b = bullets[i];
    b.life -= dt;
    if(b.life <= 0){
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);

    // Check obstacle collision
    let hitObs = false;
    for(const obs of obstacles){
      const obox = new THREE.Box3().setFromObject(obs.mesh);
      if(obox.containsPoint(b.mesh.position)){ hitObs = true; break; }
    }
    if(hitObs){
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(t){
  requestAnimationFrame(loop);
  if(!state.running) return;

  const dt = Math.min((t - lastTime)/1000, 0.05);
  lastTime = t;

  updatePlayer(dt);

  // Respawn timer
  if(state.dead){
    state.respawnTimer -= dt;
    if(state.respawnTimer <= 0) playerRespawn();
  }

  // Build enemy list for AI
  const playerTarget = 'player';
  const allyTargetsForEnemy = [...allies.filter(a=>a.alive), playerTarget];
  const enemyTargetsForAlly = enemies;

  // Update allies
  for(const ally of allies) updateAI(ally, dt, enemyTargetsForAlly);
  // Update enemies
  for(const enemy of enemies) updateAI(enemy, dt, allyTargetsForEnemy);

  // Bullets
  updateBullets(dt);

  // Nametag always faces camera
  for(const char of allChars){
    if(char.alive && char.nameSprite){
      char.nameSprite.lookAt(camera.position);
    }
  }

  renderer.render(scene, camera);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Start / Restart ───────────────────────────────────────────────────────────
function startGame(){
  state.running = true;
  state.blueKills = 0;
  state.redKills = 0;
  state.playerDeaths = 0;
  state.playerHP = state.playerMaxHP;
  state.ammo = state.maxAmmo;
  state.reserve = 90;
  state.dead = false;
  state.reloading = false;
  state.yaw = 0;
  state.pitch = 0;
  mouseDX = 0; mouseDY = 0;

  for(const ally of allies) ally.respawn();
  for(const enemy of enemies) enemy.respawn();

  const sp = blueSpawns[0];
  camera.position.set(sp.x, sp.y, sp.z);
  camera.quaternion.setFromEuler(new THREE.Euler(0, 0, 0, 'YXZ'));

  updateScoreUI();
  updateHealthUI();
  updateAmmoUI();

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('win-overlay').style.display = 'none';
  document.getElementById('death-msg').style.display = 'none';
  document.getElementById('death-screen').style.background = 'transparent';
  document.getElementById('kill-feed').innerHTML = '';

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', ()=>{
  document.getElementById('win-overlay').style.display = 'none';
  startGame();
});

// Initial render for loading screen
renderer.render(scene, camera);

})();
</script>
