<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS - VALORANT Style</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Consolas', monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }

#ui {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  pointer-events: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: #00ff88;
  box-shadow: 0 0 4px #00ff88;
}
#crosshair::before { width: 2px; height: 20px; top: 0; left: 9px; }
#crosshair::after  { width: 20px; height: 2px; top: 9px; left: 0; }
.ch-dot {
  position: absolute; width: 3px; height: 3px;
  background: #00ff88; border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  box-shadow: 0 0 4px #00ff88;
}

#hud {
  position: absolute; bottom: 20px; left: 20px;
  color: #fff; font-size: 14px; line-height: 1.6;
  text-shadow: 0 0 8px rgba(0,200,100,0.8);
}
#hud .label { color: #00ff88; font-size: 11px; letter-spacing: 2px; }
#health-bar-bg {
  width: 160px; height: 8px; background: rgba(255,255,255,0.15);
  border-radius: 4px; margin-top: 4px; overflow: hidden;
}
#health-bar { height: 100%; background: linear-gradient(90deg, #00ff88, #00cc66);
  border-radius: 4px; transition: width 0.15s; }

#ammo-display {
  position: absolute; bottom: 20px; right: 20px;
  color: #fff; text-align: right; font-size: 28px; font-weight: bold;
  text-shadow: 0 0 10px rgba(255,200,0,0.8);
}
#ammo-display .ammo-label { font-size: 11px; color: #aaa; letter-spacing: 2px; }

#kill-feed {
  position: absolute; top: 20px; right: 20px;
  color: #fff; font-size: 13px; text-align: right;
  pointer-events: none;
}
.kill-entry { 
  padding: 3px 8px; margin-bottom: 4px;
  background: rgba(0,0,0,0.5); border-left: 2px solid #ff4444;
  animation: fadeKill 3s forwards;
}
.kill-ally { border-left-color: #4488ff; }
@keyframes fadeKill {
  0%{opacity:1} 70%{opacity:1} 100%{opacity:0}
}

#score-panel {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 40px; color: #fff; font-size: 14px;
}
.team-score { text-align: center; }
.team-score .num { font-size: 32px; font-weight: bold; }
.score-ally .num { color: #4488ff; text-shadow: 0 0 10px #4488ff; }
.score-enemy .num { color: #ff4444; text-shadow: 0 0 10px #ff4444; }
.score-divider { font-size: 28px; line-height: 1.5; color: #888; }
.team-label { font-size: 11px; letter-spacing: 2px; color: #aaa; }

#damage-flash {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,0,0,0.0); pointer-events: none;
  border: 0px solid rgba(255,0,0,0);
  transition: all 0.1s;
}

#minimap {
  position: absolute; top: 20px; left: 20px;
  width: 140px; height: 140px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }

#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; pointer-events: all;
}
#overlay h1 {
  font-size: 48px; letter-spacing: 8px; color: #00ff88;
  text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
  margin-bottom: 10px;
}
#overlay .subtitle {
  font-size: 13px; letter-spacing: 4px; color: #aaa;
  margin-bottom: 40px;
}
#overlay .instructions {
  font-size: 13px; color: #ccc; line-height: 2;
  margin-bottom: 40px; text-align: center;
}
#overlay .instructions span { color: #00ff88; }
#start-btn {
  padding: 14px 60px; font-size: 16px; letter-spacing: 4px;
  background: transparent; color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer; pointer-events: all;
  text-transform: uppercase; font-family: inherit;
  transition: all 0.2s;
}
#start-btn:hover {
  background: #00ff88; color: #000;
  box-shadow: 0 0 20px #00ff88;
}

#result-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.88); z-index: 100;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; pointer-events: all;
}
#result-title { font-size: 56px; letter-spacing: 10px; margin-bottom: 12px; }
#result-sub { font-size: 14px; letter-spacing: 4px; color: #aaa; margin-bottom: 40px; }
#retry-btn {
  padding: 12px 50px; font-size: 15px; letter-spacing: 3px;
  background: transparent; color: #fff;
  border: 1px solid #fff; cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
#retry-btn:hover { background: rgba(255,255,255,0.1); }

#reload-flash {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  color: #ffcc00; font-size: 13px; letter-spacing: 3px;
  opacity: 0; transition: opacity 0.3s;
}

#mobile-controls {
  display: none;
  position: fixed; bottom: 0; left: 0; width: 100%; height: 200px;
  pointer-events: none; z-index: 20;
}
#left-stick-area {
  position: absolute; bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; pointer-events: all;
}
#left-stick {
  position: absolute; width: 50px; height: 50px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  transition: none;
}
#right-look-area {
  position: absolute; bottom: 0; right: 0;
  width: 50%; height: 200px;
  pointer-events: all; opacity: 0;
}

@media (max-width: 768px) {
  #mobile-controls { display: block; }
  #crosshair { transform: translate(-50%, -50%) scale(1.5); }
}

.hit-marker {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 30px; height: 30px; pointer-events: none;
  opacity: 0; transition: opacity 0.1s;
}
.hit-marker.show { opacity: 1; }
.hit-marker::before, .hit-marker::after {
  content: ''; position: absolute; background: #ff4444;
}
.hit-marker::before { width: 2px; height: 12px; top: 0; left: 14px; }
.hit-marker::after  { width: 12px; height: 2px; top: 14px; left: 0; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="ui">
  <div id="crosshair"><div class="ch-dot"></div></div>
  <div class="hit-marker" id="hit-marker"></div>

  <div id="minimap"><canvas id="minimap-canvas" width="140" height="140"></canvas></div>

  <div id="score-panel">
    <div class="team-score score-ally">
      <div class="team-label">ALLY</div>
      <div class="num" id="ally-kills">0</div>
    </div>
    <div class="score-divider">:</div>
    <div class="team-score score-enemy">
      <div class="team-label">ENEMY</div>
      <div class="num" id="enemy-kills">0</div>
    </div>
  </div>

  <div id="hud">
    <div class="label">HP</div>
    <div id="health-num">100</div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
  </div>

  <div id="ammo-display">
    <div class="ammo-label">AMMO</div>
    <div><span id="ammo-cur">30</span> / <span id="ammo-reserve">90</span></div>
  </div>

  <div id="kill-feed"></div>
  <div id="damage-flash"></div>
  <div id="reload-flash">RELOADING...</div>
</div>

<div id="overlay">
  <h1>STRIKER</h1>
  <div class="subtitle">FPS TACTICAL COMBAT</div>
  <div class="instructions">
    <span>WASD</span> 移動 &nbsp;|&nbsp; <span>マウス</span> 照準 &nbsp;|&nbsp; <span>左クリック</span> 射撃<br>
    <span>R</span> リロード &nbsp;|&nbsp; <span>Shift</span> ダッシュ<br>
    4v4 対戦 — 敵チームを全滅させろ
  </div>
  <button id="start-btn" onclick="startGame()">START GAME</button>
</div>

<div id="result-overlay">
  <div id="result-title"></div>
  <div id="result-sub"></div>
  <button id="retry-btn" onclick="resetGame()">PLAY AGAIN</button>
</div>

<div id="mobile-controls">
  <div id="left-stick-area"><div id="left-stick"></div></div>
  <div id="right-look-area"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 100);

const camera = new THREE.PerspectiveCamera(80, W/H, 0.1, 200);
camera.position.set(0, 1.7, 0);

const clock = new THREE.Clock();

// ─── ライティング ───
const ambient = new THREE.AmbientLight(0x4040ff, 0.4);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);
[[-20,8,0],[20,8,0],[0,8,-20],[0,8,20]].forEach(([x,y,z]) => {
  const pl = new THREE.PointLight(0x8888ff, 0.5, 30);
  pl.position.set(x,y,z); scene.add(pl);
});

// ─── ステージ構築 ───
const matFloor  = new THREE.MeshLambertMaterial({ color: 0x2d2d3d });
const matWall   = new THREE.MeshLambertMaterial({ color: 0x3a3a4d });
const matBox    = new THREE.MeshLambertMaterial({ color: 0x4a4a5d });
const matAccent = new THREE.MeshLambertMaterial({ color: 0xff4444 });
const matBlue   = new THREE.MeshLambertMaterial({ color: 0x2244aa });

function makeBox(w,h,d,x,y,z,mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat||matWall);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  scene.add(m); return m;
}

// フロア
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80,80),
  new THREE.MeshLambertMaterial({ color:0x252535 })
);
floor.rotation.x = -Math.PI/2; floor.receiveShadow=true; scene.add(floor);

// グリッドライン
const gridHelper = new THREE.GridHelper(80, 40, 0x333355, 0x282838);
gridHelper.position.y = 0.01; scene.add(gridHelper);

// 外壁
const wallH = 6;
makeBox(80,wallH,1, 0,wallH/2,-40, matWall);
makeBox(80,wallH,1, 0,wallH/2, 40, matWall);
makeBox(1,wallH,80, -40,wallH/2, 0, matWall);
makeBox(1,wallH,80,  40,wallH/2, 0, matWall);

// 天井ライト装飾
for(let x=-20;x<=20;x+=10) for(let z=-20;z<=20;z+=10) {
  const l = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshBasicMaterial({color:0xaaaaff}));
  l.rotation.x=Math.PI/2; l.position.set(x,5.9,z); scene.add(l);
}

// 中央コンテナブロック
makeBox(8,3,3,  0,1.5,-10, matBox);
makeBox(8,3,3,  0,1.5, 10, matBox);
makeBox(3,3,8, -10,1.5, 0, matBox);
makeBox(3,3,8,  10,1.5, 0, matBox);

// 側面カバー
makeBox(5,2,1, -15,1,-5, matBox);
makeBox(5,2,1,  15,1,-5, matBox);
makeBox(5,2,1, -15,1, 5, matBox);
makeBox(5,2,1,  15,1, 5, matBox);
makeBox(1,2,5, -5,1,-15, matBox);
makeBox(1,2,5,  5,1,-15, matBox);
makeBox(1,2,5, -5,1, 15, matBox);
makeBox(1,2,5,  5,1, 15, matBox);

// スポーン側分割壁
makeBox(1,4,20, -20,2,0, matWall);
makeBox(1,4,20,  20,2,0, matWall);

// 低いカバー
[-8,-5,-2,2,5,8].forEach((v,i)=>{
  makeBox(2,1,1, v,0.5,-20, matBox);
  makeBox(2,1,1, v,0.5, 20, matBox);
});

// チーム色マーカー
makeBox(6,0.1,6, 0,0.05,30, matBlue);
makeBox(6,0.1,6, 0,0.05,-30, matAccent);

// アクセントライン
const stripMat = new THREE.MeshBasicMaterial({color:0x00ff88});
const strip = new THREE.Mesh(new THREE.PlaneGeometry(80,0.1), stripMat);
strip.rotation.x=-Math.PI/2; strip.position.set(0,0.02,0); scene.add(strip);

// 壁面デコ
const wallDecoMat = new THREE.MeshBasicMaterial({color:0x4444ff, side:THREE.DoubleSide});
for(let i=0;i<6;i++){
  const d = new THREE.Mesh(new THREE.PlaneGeometry(0.5,2), wallDecoMat);
  d.position.set(-39.4, 3, (i-2.5)*6); scene.add(d);
  const d2 = d.clone(); d2.position.set(39.4,3,(i-2.5)*6); scene.add(d2);
}

// ─── コリジョンボックス収集 ───
const colliders = [];
scene.traverse(obj => {
  if (obj.isMesh && obj !== floor && obj !== strip && obj !== gridHelper) {
    const bb = new THREE.Box3().setFromObject(obj);
    colliders.push(bb);
  }
});

// ─── プレイヤー ───
const player = {
  pos: new THREE.Vector3(0, 1.7, 28),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  hp: 100, maxHp: 100,
  ammo: 30, maxAmmo: 30, reserve: 90,
  speed: 6, sprintSpeed: 10,
  alive: true, reloading: false, reloadTimer: 0,
  kills: 0,
};
camera.position.copy(player.pos);

// ─── 銃モデル（ビューモデル） ───
function makeGunModel() {
  const g = new THREE.Group();
  const bMat = new THREE.MeshLambertMaterial({color:0x222222});
  const mMat = new THREE.MeshLambertMaterial({color:0x444444});
  const aMat = new THREE.MeshLambertMaterial({color:0x111111});
  const rMat = new THREE.MeshBasicMaterial({color:0xff8800});

  // バレル
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.35,8), mMat);
  barrel.rotation.z = Math.PI/2; barrel.position.set(0.18,0,0);
  g.add(barrel);
  // フレーム
  const frame = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.07,0.06), bMat);
  frame.position.set(0.05, -0.02, 0); g.add(frame);
  // グリップ
  const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.12,0.05), aMat);
  grip.position.set(-0.05,-0.09,0); g.add(grip);
  // トリガーガード
  const tg = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.04,0.03), aMat);
  tg.position.set(-0.01,-0.06,0); g.add(tg);
  // マズルフラッシュ
  const mf = new THREE.Mesh(new THREE.ConeGeometry(0.04,0.1,6), rMat);
  mf.rotation.z = -Math.PI/2; mf.position.set(0.36,0,0);
  mf.visible = false; mf.name = 'muzzle'; g.add(mf);
  // スコープ
  const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.12,8), mMat);
  scope.rotation.z = Math.PI/2; scope.position.set(0.05, 0.05, 0); g.add(scope);

  g.scale.set(0.8,0.8,0.8);
  return g;
}

const gunCamera = new THREE.PerspectiveCamera(80, W/H, 0.01, 10);
const gunScene  = new THREE.Scene();
const gunModel  = makeGunModel();
gunModel.position.set(0.22, -0.18, -0.35);
gunScene.add(gunModel);
const gunLight = new THREE.AmbientLight(0xffffff, 1.5);
gunScene.add(gunLight);

// ─── 射撃エフェクト ───
function shootEffect() {
  const mf = gunModel.getObjectByName('muzzle');
  if(mf){ mf.visible=true; setTimeout(()=>mf.visible=false,60); }
  gunModel.position.z += 0.04;
  setTimeout(()=>gunModel.position.z -= 0.04, 60);
}

// ─── 弾痕 ───
const bulletHoles = [];
const bhMat = new THREE.MeshBasicMaterial({color:0x111111, depthWrite:false});
function spawnBulletHole(point, normal) {
  const bh = new THREE.Mesh(new THREE.CircleGeometry(0.05, 8), bhMat);
  bh.position.copy(point).addScaledVector(normal, 0.01);
  const up = Math.abs(normal.y) > 0.9 ? new THREE.Vector3(1,0,0) : new THREE.Vector3(0,1,0);
  bh.lookAt(point.clone().add(normal));
  scene.add(bh);
  bulletHoles.push({mesh:bh, life:15});
}

// ─── エージェント（敵・味方共通） ───
class Agent {
  constructor(isEnemy, spawnX, spawnZ, id) {
    this.isEnemy = isEnemy;
    this.id = id;
    this.hp = 100;
    this.maxHp = 100;
    this.alive = true;
    this.vel = new THREE.Vector3();
    this.speed = isEnemy ? 2.5 + Math.random() : 2.2 + Math.random()*0.5;
    this.state = 'patrol';
    this.target = null;
    this.stateTimer = Math.random()*3;
    this.shootTimer = 1 + Math.random()*2;
    this.wanderTarget = new THREE.Vector3(spawnX, 0, spawnZ);
    this.kills = 0;

    this.group = new THREE.Group();
    this.group.position.set(spawnX, 0, spawnZ);
    this._buildModel();
    scene.add(this.group);

    this.bb = new THREE.Box3();
    this.updateBB();
  }

  _buildModel() {
    const ec = this.isEnemy ? 0xff3333 : 0x3366ff;
    const bodyMat = new THREE.MeshLambertMaterial({color: ec});
    const skinMat = new THREE.MeshLambertMaterial({color:0xffccaa});
    const darkMat = new THREE.MeshLambertMaterial({color:0x222222});

    // 胴体
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.55,0.2), bodyMat);
    torso.position.y = 1.3; torso.castShadow=true; this.group.add(torso);
    // 腰
    const waist = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.2,0.18), darkMat);
    waist.position.y = 0.95; this.group.add(waist);
    // 頭
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), skinMat);
    head.position.y = 1.75; head.castShadow=true; this.group.add(head);
    this.headMesh = head;
    // ヘルメット
    const helm = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.15,0.32), darkMat);
    helm.position.y = 1.88; this.group.add(helm);
    // 左腕
    const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.45,0.12), bodyMat);
    lArm.position.set(-0.29,1.25,0); lArm.rotation.z=0.1; this.group.add(lArm);
    // 右腕（銃を持つ）
    const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.45,0.12), bodyMat);
    rArm.position.set(0.29,1.25,0); rArm.rotation.z=-0.1; this.group.add(rArm);
    // 左脚
    const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.17,0.55,0.17), darkMat);
    lLeg.position.set(-0.12,0.5,0); this.group.add(lLeg); this.lLeg=lLeg;
    // 右脚
    const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.17,0.55,0.17), darkMat);
    rLeg.position.set(0.12,0.5,0); this.group.add(rLeg); this.rLeg=rLeg;
    // 銃（小さい）
    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.06,0.05), new THREE.MeshLambertMaterial({color:0x111111}));
    gun.position.set(0.38,1.25,-0.15); this.group.add(gun);

    // HPバー
    const barBg = new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.06), new THREE.MeshBasicMaterial({color:0x330000}));
    barBg.position.y=2.2; barBg.rotation.x=-0.3; scene.add(barBg); this.barBg=barBg;
    const barFg = new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.06), new THREE.MeshBasicMaterial({color: this.isEnemy?0xff2222:0x2244ff}));
    barFg.position.copy(barBg.position).y+=0.001; barFg.rotation.x=-0.3; scene.add(barFg); this.barFg=barFg;
  }

  updateBB() {
    this.bb.setFromCenterAndSize(
      new THREE.Vector3(this.group.position.x, 1, this.group.position.z),
      new THREE.Vector3(0.6, 2, 0.6)
    );
  }

  getPos() { return this.group.position; }

  takeDamage(dmg) {
    if(!this.alive) return;
    this.hp = Math.max(0, this.hp-dmg);
    if(this.hp<=0) this.die();
    this.updateHPBar();
  }

  updateHPBar() {
    const ratio = this.hp/this.maxHp;
    this.barFg.scale.x = ratio;
    this.barFg.position.x = this.group.position.x - (1-ratio)*0.25;
    this.barBg.position.x = this.group.position.x;
    this.barBg.position.z = this.group.position.z;
    this.barFg.position.z = this.group.position.z;
    const y = 2.2; this.barBg.position.y=y; this.barFg.position.y=y;
  }

  die() {
    this.alive = false;
    this.group.rotation.z = Math.PI/2;
    this.group.position.y = -0.4;
    if(this.barBg) { this.barBg.visible=false; this.barFg.visible=false; }
  }

  update(dt, agents) {
    if(!this.alive) return;
    this.barBg.position.copy(this.group.position); this.barBg.position.y=2.2;
    this.barFg.position.copy(this.group.position); this.barFg.position.y=2.2;
    const ratio=this.hp/this.maxHp;
    this.barFg.scale.x=ratio;
    this.barFg.position.x = this.group.position.x-(1-ratio)*0.25;

    const pos = this.group.position;
    // ターゲット探し
    let nearest=null, nearDist=Infinity;
    const enemies = agents.filter(a=>a.isEnemy!==this.isEnemy && a.alive);
    if(!this.isEnemy && player.alive) enemies.push({
      getPos:()=>player.pos, hp:player.hp, alive:player.alive, isEnemy:false, isPlayer:true
    });
    enemies.forEach(e=>{
      const d = pos.distanceTo(e.getPos());
      if(d<nearDist){nearDist=d;nearest=e;}
    });
    this.target=nearest;
    this.stateTimer-=dt;

    // 脚アニメ
    const walkCycle = Math.sin(Date.now()*0.008)*0.3;
    this.lLeg.rotation.x = walkCycle; this.rLeg.rotation.x = -walkCycle;

    if(this.target && nearDist<25){
      this.state='combat';
      const dir = this.target.getPos().clone().sub(pos).setY(0).normalize();
      this.group.lookAt(this.target.getPos());

      if(nearDist>4){
        const newPos=pos.clone().addScaledVector(dir,this.speed*dt);
        if(Math.abs(newPos.x)<38 && Math.abs(newPos.z)<38) pos.copy(newPos);
        pos.y=0;
      }

      this.shootTimer-=dt;
      if(this.shootTimer<=0 && nearDist<20){
        this.shootTimer=0.8+Math.random()*1.5;
        this._shoot(nearest, nearDist);
      }
    } else {
      this.state='patrol';
      if(this.stateTimer<=0){
        this.stateTimer=3+Math.random()*4;
        const ang=Math.random()*Math.PI*2, r=3+Math.random()*12;
        this.wanderTarget.set(pos.x+Math.cos(ang)*r, 0, pos.z+Math.sin(ang)*r);
        this.wanderTarget.x=Math.max(-35,Math.min(35,this.wanderTarget.x));
        this.wanderTarget.z=Math.max(-35,Math.min(35,this.wanderTarget.z));
      }
      const wDir=this.wanderTarget.clone().sub(pos).setY(0);
      if(wDir.length()>0.5){
        wDir.normalize();
        const newPos=pos.clone().addScaledVector(wDir,this.speed*0.7*dt);
        if(Math.abs(newPos.x)<38 && Math.abs(newPos.z)<38){
          pos.copy(newPos); pos.y=0;
          this.group.lookAt(pos.clone().add(wDir));
        }
      }
    }
    this.updateBB();
  }

  _shoot(target, dist) {
    const accuracy=Math.max(0.4, 1-dist/30);
    if(Math.random()>accuracy) return;
    if(target.isPlayer===true){
      const dmg=8+Math.random()*7;
      applyDamageToPlayer(dmg);
    } else {
      target.takeDamage(15+Math.random()*10);
      if(!target.alive){
        this.kills++;
        addKillFeed(this.isEnemy?'敵 '+(this.id+1):'味方 '+(this.id+1), target.isPlayer?'YOU':( target.isEnemy?'敵':'味方')+'('+(target.id+1)+')', !this.isEnemy);
      }
    }
  }
}

// ─── ゲーム状態 ───
let agents=[], gameActive=false, gameOver=false;
let allyKills=0, enemyKills=0;

function initAgents() {
  agents.forEach(a=>{
    scene.remove(a.group);
    if(a.barBg) scene.remove(a.barBg);
    if(a.barFg) scene.remove(a.barFg);
  });
  agents=[];
  allyKills=0; enemyKills=0;
  updateScoreUI();

  // 敵 4体 (z < 0 側)
  const espawns=[[-8,2,-28],[8,2,-28],[-8,2,-22],[8,2,-22]];
  espawns.forEach(([x,y,z],i)=>agents.push(new Agent(true,x,z,i)));

  // 味方 4体 (z > 0 側)
  const aspawns=[[-8,2,22],[8,2,22],[-3,2,28],[3,2,28]];
  aspawns.forEach(([x,y,z],i)=>agents.push(new Agent(false,x,z,i)));
}

// ─── プレイヤー入力 ───
const keys={};
let mouseX=0,mouseY=0,pointerLocked=false;

document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);

canvas.addEventListener('click',()=>{
  if(!gameActive) return;
  canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange',()=>{
  pointerLocked=document.pointerLockElement===canvas;
});
document.addEventListener('mousemove',e=>{
  if(!pointerLocked||!gameActive) return;
  player.yaw   -= e.movementX*0.002;
  player.pitch -= e.movementY*0.002;
  player.pitch  = Math.max(-1.3,Math.min(1.3,player.pitch));
});

// ─── 射撃 ───
const raycaster=new THREE.Raycaster();
document.addEventListener('mousedown',e=>{
  if(e.button!==0||!gameActive||!player.alive) return;
  if(!pointerLocked){canvas.requestPointerLock();return;}
  shoot();
});

function shoot() {
  if(player.ammo<=0||player.reloading) return;
  player.ammo--;
  updateAmmoUI();
  shootEffect();
  showHitMarker(false);

  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const meshes=[];
  scene.traverse(o=>{if(o.isMesh)meshes.push(o);});
  const hits=raycaster.intersectObjects(meshes);

  let hit=false;
  for(const h of hits){
    let ag=null;
    agents.forEach(a=>{
      if(!hit && a.alive && a.group.children.includes(h.object)) ag=a;
    });
    if(ag){
      const dmg=25+Math.random()*15;
      const wasAlive=ag.alive;
      ag.takeDamage(dmg);
      showHitMarker(true);
      if(!ag.alive&&wasAlive){
        player.kills++;
        if(ag.isEnemy){ enemyKills++; addKillFeed('あなた','敵 '+(ag.id+1),true); }
        else { allyKills++; addKillFeed('あなた','味方 '+(ag.id+1),false); }
        updateScoreUI();
        checkWin();
      }
      hit=true; break;
    } else if(h.distance>0.5){
      if(h.face) spawnBulletHole(h.point, h.face.normal);
      break;
    }
  }
  if(player.ammo===0 && player.reserve>0) startReload();
}

function startReload() {
  if(player.reloading||player.ammo===player.maxAmmo||player.reserve<=0) return;
  player.reloading=true;
  document.getElementById('reload-flash').style.opacity='1';
  setTimeout(()=>{
    const need=player.maxAmmo-player.ammo;
    const got=Math.min(need,player.reserve);
    player.ammo+=got; player.reserve-=got;
    player.reloading=false;
    document.getElementById('reload-flash').style.opacity='0';
    updateAmmoUI();
  },2000);
}

document.addEventListener('keydown',e=>{
  if(e.code==='KeyR'&&!player.reloading) startReload();
});

// ─── プレイヤーダメージ ───
function applyDamageToPlayer(dmg) {
  if(!player.alive) return;
  player.hp=Math.max(0,player.hp-dmg);
  updateHpUI();
  flashDamage();
  if(player.hp<=0) playerDie();
}

function flashDamage(){
  const el=document.getElementById('damage-flash');
  el.style.background='rgba(255,0,0,0.35)';
  el.style.border='4px solid rgba(255,0,0,0.6)';
  setTimeout(()=>{el.style.background='rgba(255,0,0,0)';el.style.border='0px solid rgba(255,0,0,0)';},200);
}

let hitMarkerTimer=null;
function showHitMarker(isHit){
  const el=document.getElementById('hit-marker');
  el.classList.add('show');
  el.style.borderColor=isHit?'#ff4444':'transparent';
  if(hitMarkerTimer) clearTimeout(hitMarkerTimer);
  hitMarkerTimer=setTimeout(()=>el.classList.remove('show'),120);
}

function playerDie(){
  player.alive=false;
  setTimeout(()=>showResult(false),1500);
}

// ─── UI更新 ───
function updateHpUI(){
  document.getElementById('health-num').textContent=Math.ceil(player.hp);
  document.getElementById('health-bar').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('health-bar').style.background=
    player.hp>60?'linear-gradient(90deg,#00ff88,#00cc66)':
    player.hp>30?'linear-gradient(90deg,#ffcc00,#ff8800)':
    'linear-gradient(90deg,#ff4444,#cc2222)';
}
function updateAmmoUI(){
  document.getElementById('ammo-cur').textContent=player.ammo;
  document.getElementById('ammo-reserve').textContent=player.reserve;
}
function updateScoreUI(){
  document.getElementById('ally-kills').textContent=allyKills+player.kills;
  document.getElementById('enemy-kills').textContent=enemyKills;
}

// ─── キルフィード ───
function addKillFeed(killer,victim,isAlly){
  const kf=document.getElementById('kill-feed');
  const el=document.createElement('div');
  el.className='kill-entry'+(isAlly?' kill-ally':'');
  el.textContent=killer+' → '+victim;
  kf.appendChild(el);
  setTimeout(()=>el.remove(),3500);
  updateScoreUI();
}

// ─── 勝敗判定 ───
function checkWin(){
  const enemies=agents.filter(a=>a.isEnemy);
  const allies =agents.filter(a=>!a.isEnemy);
  if(enemies.every(a=>!a.alive)) showResult(true);
  else if(allies.every(a=>!a.alive)&&!player.alive) showResult(false);
}

function showResult(win){
  gameActive=false; gameOver=true;
  document.exitPointerLock();
  const ro=document.getElementById('result-overlay');
  const rt=document.getElementById('result-title');
  const rs=document.getElementById('result-sub');
  rt.textContent=win?'VICTORY':'DEFEAT';
  rt.style.color=win?'#00ff88':'#ff4444';
  rt.style.textShadow=win?'0 0 30px #00ff88':'0 0 30px #ff4444';
  rs.textContent=win?`撃破数: ${player.kills} / ラウンド終了`:`全滅 — 再挑戦するか？`;
  ro.style.display='flex';
}

// ─── ゲーム開始・リセット ───
function startGame(){
  document.getElementById('overlay').style.display='none';
  gameActive=true; gameOver=false;
  player.hp=100; player.ammo=30; player.reserve=90;
  player.pos.set(0,1.7,28); player.yaw=Math.PI; player.pitch=0;
  player.alive=true; player.reloading=false; player.kills=0;
  updateHpUI(); updateAmmoUI();
  initAgents();
  updateScoreUI();
  canvas.requestPointerLock();
}

function resetGame(){
  document.getElementById('result-overlay').style.display='none';
  startGame();
}

// ─── プレイヤー移動 ───
const playerBB=new THREE.Box3();
function movePlayer(dt){
  if(!player.alive) return;
  const yawQuat=new THREE.Quaternion();
  yawQuat.setFromAxisAngle(new THREE.Vector3(0,1,0), player.yaw);
  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(yawQuat);
  const rgt=new THREE.Vector3(1,0,0).applyQuaternion(yawQuat);
  const sprint=keys['ShiftLeft']||keys['ShiftRight'];
  const spd=sprint?player.sprintSpeed:player.speed;

  const move=new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp'])    move.addScaledVector(fwd,spd);
  if(keys['KeyS']||keys['ArrowDown'])  move.addScaledVector(fwd,-spd);
  if(keys['KeyA']||keys['ArrowLeft'])  move.addScaledVector(rgt,-spd);
  if(keys['KeyD']||keys['ArrowRight']) move.addScaledVector(rgt,spd);

  const newPos=player.pos.clone().addScaledVector(move,dt);
  newPos.y=1.7;
  newPos.x=Math.max(-38,Math.min(38,newPos.x));
  newPos.z=Math.max(-38,Math.min(38,newPos.z));

  playerBB.setFromCenterAndSize(newPos, new THREE.Vector3(0.5,1.7,0.5));
  let blocked=false;
  colliders.forEach(c=>{ if(playerBB.intersectsBox(c)) blocked=true; });
  if(!blocked) player.pos.copy(newPos);

  camera.position.copy(player.pos);
  const pitchQ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),player.pitch);
  camera.quaternion.copy(yawQuat).multiply(pitchQ);

  // ヘッドボブ
  if(move.length()>0.1){
    const bob=Math.sin(Date.now()*0.01)*0.03;
    camera.position.y+=bob;
  }
}

// ─── モバイルスティック ───
let stickActive=false, stickStart={x:0,y:0}, stickCur={x:0,y:0};
let lookActive=false, lookLast={x:0,y:0};
const stickArea=document.getElementById('left-stick-area');
const stickEl  =document.getElementById('left-stick');
const lookArea =document.getElementById('right-look-area');

stickArea.addEventListener('touchstart',e=>{
  stickActive=true;
  const t=e.touches[0];
  stickStart={x:t.clientX,y:t.clientY};
  stickCur={x:0,y:0};
},{passive:true});
stickArea.addEventListener('touchmove',e=>{
  if(!stickActive) return;
  const t=e.touches[0];
  const dx=t.clientX-stickStart.x, dy=t.clientY-stickStart.y;
  const len=Math.sqrt(dx*dx+dy*dy), max=50;
  stickCur={x:Math.max(-max,Math.min(max,dx)),y:Math.max(-max,Math.min(max,dy))};
  stickEl.style.transform=`translate(calc(-50% + ${stickCur.x}px), calc(-50% + ${stickCur.y}px))`;
},{passive:true});
stickArea.addEventListener('touchend',()=>{
  stickActive=false; stickCur={x:0,y:0};
  stickEl.style.transform='translate(-50%,-50%)';
});

lookArea.addEventListener('touchstart',e=>{
  lookActive=true;
  const t=e.touches[0];
  lookLast={x:t.clientX,y:t.clientY};
},{passive:true});
lookArea.addEventListener('touchmove',e=>{
  if(!lookActive||!gameActive) return;
  const t=e.touches[0];
  const dx=t.clientX-lookLast.x, dy=t.clientY-lookLast.y;
  player.yaw  -=dx*0.003;
  player.pitch-=dy*0.003;
  player.pitch=Math.max(-1.3,Math.min(1.3,player.pitch));
  lookLast={x:t.clientX,y:t.clientY};
  e.preventDefault();
},{passive:false});
lookArea.addEventListener('touchend',()=>lookActive=false);
lookArea.addEventListener('touchstart',e=>{
  if(e.touches.length>0&&gameActive&&player.alive&&player.ammo>0) shoot();
},{passive:true});

function applyMobileStick(dt){
  if(!stickActive||!gameActive) return;
  const yawQuat=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),player.yaw);
  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(yawQuat);
  const rgt=new THREE.Vector3(1,0,0).applyQuaternion(yawQuat);
  const spd=player.speed;
  const move=new THREE.Vector3();
  move.addScaledVector(fwd,-stickCur.y/50*spd);
  move.addScaledVector(rgt, stickCur.x/50*spd);
  const newPos=player.pos.clone().addScaledVector(move,dt);
  newPos.y=1.7;
  newPos.x=Math.max(-38,Math.min(38,newPos.x));
  newPos.z=Math.max(-38,Math.min(38,newPos.z));
  player.pos.copy(newPos);
}

// ─── ミニマップ ───
const mmCanvas=document.getElementById('minimap-canvas');
const mmCtx=mmCanvas.getContext('2d');
function drawMinimap(){
  mmCtx.clearRect(0,0,140,140);
  mmCtx.fillStyle='rgba(0,0,0,0.0)'; mmCtx.fillRect(0,0,140,140);
  const scale=140/80, cx=70, cy=70;
  const wx=(p)=>cx+(p.x)*scale;
  const wy=(p)=>cy+(p.z)*scale;

  // 障害物
  mmCtx.fillStyle='#444466';
  [[0,-10,8,3],[0,10,8,3],[-10,0,3,8],[10,0,3,8]].forEach(([x,z,w,d])=>{
    mmCtx.fillRect(wx({x:x-w/2}),wy({z:z-d/2}),w*scale,d*scale);
  });

  // エージェント
  agents.forEach(a=>{
    if(!a.alive) return;
    const p=a.getPos();
    mmCtx.beginPath(); mmCtx.arc(wx(p),wy(p),4,0,Math.PI*2);
    mmCtx.fillStyle=a.isEnemy?'#ff4444':'#4488ff'; mmCtx.fill();
  });

  // プレイヤー
  if(player.alive){
    const px=wx(player.pos), py=wy(player.pos);
    mmCtx.beginPath(); mmCtx.arc(px,py,5,0,Math.PI*2);
    mmCtx.fillStyle='#00ff88'; mmCtx.fill();
    // 向き
    const dx=Math.sin(-player.yaw)*10, dz=Math.cos(-player.yaw)*10;
    mmCtx.beginPath(); mmCtx.moveTo(px,py);
    mmCtx.lineTo(px+dx,py+dz);
    mmCtx.strokeStyle='#00ff88'; mmCtx.lineWidth=2; mmCtx.stroke();
  }
}

// ─── 弾痕更新 ───
function updateBulletHoles(dt){
  for(let i=bulletHoles.length-1;i>=0;i--){
    bulletHoles[i].life-=dt;
    if(bulletHoles[i].life<=0){
      scene.remove(bulletHoles[i].mesh);
      bulletHoles.splice(i,1);
    }
  }
}

// ─── リサイズ ───
window.addEventListener('resize',()=>{
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
  gunCamera.aspect=w/h; gunCamera.updateProjectionMatrix();
});

// ─── メインループ ───
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  if(gameActive && !gameOver){
    movePlayer(dt);
    applyMobileStick(dt);
    agents.forEach(a=>a.update(dt,agents));
    updateBulletHoles(dt);
    drawMinimap();

    // 味方AIの撃破チェック
    agents.forEach(a=>{
      if(!a.alive) return;
      const enemies=agents.filter(e=>e.isEnemy!==a.isEnemy&&!e.alive&&!e._killCounted);
      // （個別に処理済み）
    });
    // 全滅チェック（AIが倒した場合）
    const enemiesAlive=agents.filter(a=>a.isEnemy&&a.alive).length;
    const alliesAlive=agents.filter(a=>!a.isEnemy&&a.alive).length;
    if(enemiesAlive===0&&gameActive) { gameActive=false; showResult(true); }
    if(alliesAlive===0&&!player.alive&&gameActive) { gameActive=false; showResult(false); }

    updateScoreUI();
  }

  renderer.autoClear=true;
  renderer.render(scene, camera);

  // 銃のビューレイヤー描画
  renderer.autoClear=false;
  renderer.clearDepth();
  renderer.render(gunScene, gunCamera);
}
animate();
</script>
