<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>FPS Team Deathmatch</title>
  <style>
    :root{
      --blue:#4aa3ff;
      --red:#ff5c5c;
      --bg:#07111d;
      --panel: rgba(10, 15, 24, .72);
      --panel2: rgba(8, 12, 18, .88);
      --text:#eaf2ff;
      --muted:#9fb3cc;
      --accent:#79d0ff;
      --good:#44d18a;
      --warn:#ffd166;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #12263a 0%, #07111d 60%, #04070c 100%);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: var(--text);
    }
    .topbar {
      position: absolute;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(13,18,28,.82), rgba(8,12,18,.62));
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      min-width: min(720px, calc(100vw - 18px));
      justify-content: space-between;
    }
    .scoreWrap {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: .4px;
      flex-wrap: wrap;
    }
    .teamScore {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(14px, 2.2vw, 18px);
      white-space: nowrap;
    }
    .badge {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .badge.blue { background: var(--blue); }
    .badge.red { background: var(--red); }
    .stats {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(12px, 1.8vw, 15px);
      color: #d8e4f4;
      opacity: .98;
    }
    .statChip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.06);
    }
    #centerHint, #gameOver {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    #centerHint {
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(10,14,20,.55);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      max-width: min(92vw, 560px);
      color: #f1f7ff;
      font-weight: 700;
      line-height: 1.5;
      opacity: 0;
      transition: opacity .18s ease;
    }
    #centerHint.show { opacity: 1; }
    #centerHint .sub {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
    }
    #reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      opacity: .95;
      filter: drop-shadow(0 0 8px rgba(0,0,0,.25));
    }
    #reticle::before, #reticle::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.92);
      border-radius: 2px;
    }
    #reticle::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }
    #reticle::after {
      top: 8px;
      left: 0;
      width: 18px;
      height: 2px;
    }
    #touchLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #joyBase {
      position: absolute;
      left: calc(env(safe-area-inset-left, 0px) + 18px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(6px);
      pointer-events: auto;
      display: none;
    }
    #joyStick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;
      border-radius: 50%;
      background: rgba(122,208,255,.38);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
      transform: translate(0, 0);
    }
    #fireBtn {
      position: absolute;
      right: calc(env(safe-area-inset-right, 0px) + 18px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      width: min(24vw, 118px);
      height: min(24vw, 118px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.26), rgba(255,92,92,.22) 30%, rgba(255,92,92,.12) 64%, rgba(255,255,255,.08) 100%);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 12px 28px rgba(0,0,0,.28), inset 0 0 0 2px rgba(255,255,255,.05);
      display: none;
      pointer-events: auto;
      color: white;
      font-weight: 900;
      font-size: clamp(15px, 2.6vw, 19px);
      letter-spacing: .12em;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
    }
    #fireBtn span {
      display: block;
      transform: translateY(-1px);
    }
    #gameOver {
      top: 44%;
      width: min(92vw, 560px);
      padding: 18px 16px 16px;
      border-radius: 18px;
      background: var(--panel2);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 40px rgba(0,0,0,.38);
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      transform: translateX(-50%) scale(.98);
      color: white;
    }
    #gameOver.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }
    #gameOver h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: .04em;
    }
    #gameOver p {
      margin: 6px 0 14px;
      color: #d8e4f4;
      line-height: 1.6;
    }
    #restartBtn {
      pointer-events: auto;
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #79d0ff, #4aa3ff);
      color: #03101d;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: .04em;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(74,163,255,.28);
    }
    .mobileOnlyNote {
      display: none;
    }
    @media (pointer: coarse) {
      #joyBase, #fireBtn { display: flex; }
      .mobileOnlyNote { display: block; }
      .topbar { min-width: unset; width: calc(100vw - 12px); }
    }
    @media (max-width: 520px) {
      .topbar {
        padding: 8px 10px;
        gap: 8px;
      }
      .scoreWrap {
        gap: 8px;
      }
      .stats {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="topbar">
        <div class="scoreWrap">
          <div class="teamScore"><span class="badge blue"></span><span>BLUE <span id="blueScore">0</span></span></div>
          <div class="teamScore"><span class="badge red"></span><span>RED <span id="redScore">0</span></span></div>
        </div>
        <div class="stats">
          <div class="statChip">DEATHS: <span id="deaths">0</span></div>
          <div class="statChip">TARGET: 20 KILLS</div>
        </div>
      </div>

      <div id="centerHint" class="show">
        <div id="hintMain">クリックでポインターロック開始 / スマホはそのまま操作</div>
        <span class="sub">PC: WASD移動・マウス視点・左クリック射撃 / スマホ: 左下スティック・右半分スワイプで視点・右下ボタンで射撃</span>
      </div>

      <div id="reticle"></div>

      <div id="gameOver">
        <h1 id="winnerText">BLUE TEAM WINS</h1>
        <p id="resultText">先に20キルへ到達したチームが勝利です。</p>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>

    <div id="touchLayer">
      <div id="joyBase"><div id="joyStick"></div></div>
      <div id="fireBtn"><span>FIRE</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const blueScoreEl = document.getElementById('blueScore');
      const redScoreEl = document.getElementById('redScore');
      const deathsEl = document.getElementById('deaths');
      const hintEl = document.getElementById('centerHint');
      const hintMainEl = document.getElementById('hintMain');
      const gameOverEl = document.getElementById('gameOver');
      const winnerTextEl = document.getElementById('winnerText');
      const resultTextEl = document.getElementById('resultText');
      const restartBtn = document.getElementById('restartBtn');
      const joyBase = document.getElementById('joyBase');
      const joyStick = document.getElementById('joyStick');
      const fireBtn = document.getElementById('fireBtn');

      const isTouch = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
      const BLUE = 0x4aa3ff;
      const RED = 0xff5c5c;
      const ARENA = { w: 80, d: 80 };

      let scene, camera, renderer, orbit, clock;
      let player;
      let gameOver = false;
      let loaded = {
        human: false,
        gun: false,
        humanTemplate: null,
        gunTemplate: null
      };

      const keys = Object.create(null);
      const obstacleMeshes = [];
      const obstacleBoxes = [];
      const characters = [];
      const allHitboxes = [];
      const patrolPoints = [];
      const teamSpawns = {
        blue: [
          new THREE.Vector3(-30, 0,  26),
          new THREE.Vector3(-34, 0,  10),
          new THREE.Vector3(-30, 0, -10),
          new THREE.Vector3(-34, 0, -28)
        ],
        red: [
          new THREE.Vector3( 30, 0,  26),
          new THREE.Vector3( 34, 0,  10),
          new THREE.Vector3( 30, 0, -10),
          new THREE.Vector3( 34, 0, -28)
        ]
      };

      const ui = {
        blueScore: 0,
        redScore: 0,
        deaths: 0
      };

      const pointer = {
        locked: false,
        yaw: 0,
        pitch: 0,
        lookSensitivity: 0.0022,
        touchLookActive: false,
        touchLookId: null,
        lastTouchX: 0,
        lastTouchY: 0,
        moveTouchId: null,
        moveVec: new THREE.Vector2(),
        fireHeld: false,
        fireInterval: null
      };

      const tmpV3 = new THREE.Vector3();
      const tmpV2 = new THREE.Vector2();
      const tmpBox = new THREE.Box3();
      const raycaster = new THREE.Raycaster();
      const bulletHits = [];
      const obstacleHitObjects = [];
      let teamHumanLoadedOnce = false;
      let gunLoadedOnce = false;

      const lerp = THREE.MathUtils.lerp;
      const clamp = THREE.MathUtils.clamp;

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x07111d);
        scene.fog = new THREE.Fog(0x07111d, 42, 120);

        camera = new THREE.PerspectiveCamera(74, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(0, 1.72, 0);

        renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance'
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.outputEncoding = THREE.sRGBEncoding;

        orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enabled = false;

        clock = new THREE.Clock();

        buildLights();
        buildArena();
        buildPatrolPoints();

        player = createPlayer();

        createBots();

        loadModels();

        bindInput();
        bindResize();
        updateHUD();
        showHint(true);

        if (isTouch) {
          hintMainEl.textContent = 'スマホ操作モードです。左下スティックで移動、右半分スワイプで視点、右下で射撃。';
        }

        animate();
      }

      function buildLights() {
        const hemi = new THREE.HemisphereLight(0xcfe6ff, 0x182130, 1.7);
        scene.add(hemi);

        const dir = new THREE.DirectionalLight(0xffffff, 1.7);
        dir.position.set(20, 34, 14);
        scene.add(dir);

        const fill = new THREE.DirectionalLight(0x9bc9ff, 0.55);
        fill.position.set(-30, 24, -20);
        scene.add(fill);

        const amb = new THREE.AmbientLight(0x8090aa, 0.52);
        scene.add(amb);
      }

      function addObstacle(x, y, z, w, h, d, color, roughness = 1) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({
          color,
          roughness,
          metalness: 0.02
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.castShadow = false;
        mesh.receiveShadow = true;
        mesh.userData.isObstacle = true;
        scene.add(mesh);
        obstacleMeshes.push(mesh);

        const box = {
          x, z, w, d,
          minX: x - w / 2,
          maxX: x + w / 2,
          minZ: z - d / 2,
          maxZ: z + d / 2
        };
        obstacleBoxes.push(box);
        obstacleHitObjects.push(mesh);
        return mesh;
      }

      function buildArena() {
        const groundGeo = new THREE.PlaneGeometry(ARENA.w, ARENA.d, 1, 1);
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x1c2b3d,
          roughness: 1,
          metalness: 0
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(ARENA.w, 40, 0x6f87a8, 0x304059);
        grid.position.y = 0.01;
        scene.add(grid);

        // 外周壁
        addObstacle(0, 2.5, -ARENA.d/2 + 1.5, ARENA.w, 5, 3, 0x132030);
        addObstacle(0, 2.5,  ARENA.d/2 - 1.5, ARENA.w, 5, 3, 0x132030);
        addObstacle(-ARENA.w/2 + 1.5, 2.5, 0, 3, 5, ARENA.d, 0x132030);
        addObstacle( ARENA.w/2 - 1.5, 2.5, 0, 3, 5, ARENA.d, 0x132030);

        // 中央レーンのカバー
        addObstacle(-12, 1.35, 0, 4, 2.7, 12, 0x6f7f90);
        addObstacle(12, 1.35, 0, 4, 2.7, 12, 0x6f7f90);
        addObstacle(0, 1.0, -20, 18, 2, 4, 0x8c9aab);
        addObstacle(0, 1.0, 20, 18, 2, 4, 0x8c9aab);

        // 左側サイト
        addObstacle(-24, 1.4, -16, 8, 2.8, 4, 0x72859a);
        addObstacle(-26, 1.4, 14, 4, 2.8, 14, 0x5f6d7e);
        addObstacle(-18, 1.0, 26, 10, 2, 4, 0x7d8ca0);

        // 右側サイト
        addObstacle(24, 1.4, 16, 8, 2.8, 4, 0x72859a);
        addObstacle(26, 1.4, -14, 4, 2.8, 14, 0x5f6d7e);
        addObstacle(18, 1.0, -26, 10, 2, 4, 0x7d8ca0);

        // 低い箱・遮蔽物
        addObstacle(-8, 0.75, -6, 6, 1.5, 6, 0x4f6274);
        addObstacle( 8, 0.75,  6, 6, 1.5, 6, 0x4f6274);
        addObstacle(-3, 0.75,  8, 5, 1.5, 5, 0x4f6274);
        addObstacle( 3, 0.75, -8, 5, 1.5, 5, 0x4f6274);

        // 斜めに見えるような塔/バリア
        addObstacle(-36, 1.9, 0, 5, 3.8, 5, 0x41546d);
        addObstacle( 36, 1.9, 0, 5, 3.8, 5, 0x41546d);
        addObstacle( 0, 2.2, 34, 8, 4.4, 4, 0x3b516a);
        addObstacle( 0, 2.2,-34, 8, 4.4, 4, 0x3b516a);

        // 床のマーキング
        const laneMat = new THREE.MeshStandardMaterial({ color: 0x243448, roughness: 1 });
        const lane1 = new THREE.Mesh(new THREE.BoxGeometry(66, 0.02, 2), laneMat);
        lane1.position.set(0, 0.011, 0);
        scene.add(lane1);

        const lane2 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.02, 66), laneMat);
        lane2.position.set(0, 0.011, 0);
        scene.add(lane2);

        const decoMat = new THREE.MeshStandardMaterial({ color: 0x0f1b29, roughness: 1 });
        for (let i = 0; i < 8; i++) {
          const mark = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.02, 8), decoMat);
          mark.position.set(-10 + i * 3.25, 0.012, (i % 2 === 0 ? 1 : -1) * 14);
          scene.add(mark);
        }
      }

      function buildPatrolPoints() {
        const pts = [
          [-28, -26], [-16, -18], [-8, -26], [0, -18], [8, -26], [18, -18], [28, -26],
          [-28, 26],  [-16, 18],  [-8, 26],  [0, 18],  [8, 26],  [18, 18],  [28, 26],
          [-30, 0], [-20, 0], [-10, 0], [10, 0], [20, 0], [30, 0],
          [-24, 10], [-10, 10], [10, -10], [24, -10]
        ];
        pts.forEach(p => patrolPoints.push(new THREE.Vector3(p[0], 0, p[1])));
      }

      function makeLabelSprite(text, colorHex) {
        const color = colorHex === BLUE ? '#4aa3ff' : '#ff5c5c';
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景
        ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
        roundRect(ctx, 20, 18, 472, 92, 24, true, false);

        // 色帯
        ctx.fillStyle = color;
        roundRect(ctx, 28, 28, 70, 72, 18, true, false);

        // テキスト
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 118, 66);

        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 22px system-ui, sans-serif';
        ctx.fillText(colorHex === BLUE ? 'ALLY' : 'ENEMY', 118, 94);

        const tex = new THREE.CanvasTexture(canvas);
        tex.encoding = THREE.sRGBEncoding;
        tex.needsUpdate = true;
        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthTest: false,
          depthWrite: false
        });
        const spr = new THREE.Sprite(mat);
        spr.scale.set(4.9, 1.22, 1);
        return spr;
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
        ctx.beginPath();
        ctx.moveTo(x + r.tl, y);
        ctx.lineTo(x + w - r.tr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
        ctx.lineTo(x + w, y + h - r.br);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
        ctx.lineTo(x + r.bl, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
        ctx.lineTo(x, y + r.tl);
        ctx.quadraticCurveTo(x, y, x + r.tl, y);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

      class Character {
        constructor({ team, name, spawn }) {
          this.team = team;
          this.name = name;
          this.spawn = spawn.clone();
          this.health = 100;
          this.maxHealth = 100;
          this.dead = false;
          this.respawnAt = 0;
          this.fireCooldown = 0;
          this.wanderTarget = null;
          this.wanderTimer = 0;
          this.thinkTimer = 0;
          this.speed = team === 'blue' ? 4.15 : 4.2;
          this.radius = 0.7;
          this.height = 2.0;
          this.root = new THREE.Group();
          this.root.position.copy(this.spawn);
          this.root.userData.character = this;
          scene.add(this.root);

          this.visualRoot = new THREE.Group();
          this.root.add(this.visualRoot);

          this.collider = new THREE.Mesh(
            new THREE.BoxGeometry(1.1, 2.0, 1.1),
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
          );
          this.collider.position.set(0, 1.0, 0);
          this.collider.userData.character = this;
          this.root.add(this.collider);
          allHitboxes.push(this.collider);

          this.label = makeLabelSprite(name, team === 'blue' ? BLUE : RED);
          this.label.position.set(0, 2.9, 0);
          this.root.add(this.label);

          this.marker = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.2, 0.06, 18),
            new THREE.MeshBasicMaterial({ color: team === 'blue' ? BLUE : RED })
          );
          this.marker.rotation.x = Math.PI / 2;
          this.marker.position.set(0, 2.45, 0);
          this.root.add(this.marker);

          this.setFallbackAppearance();
          this.root.visible = true;
        }

        setFallbackAppearance() {
          while (this.visualRoot.children.length) {
            this.visualRoot.remove(this.visualRoot.children[0]);
          }

          const baseColor = this.team === 'blue' ? 0x4aa3ff : 0xff5c5c;
          const bodyColor = this.team === 'blue' ? 0x2c70c7 : 0xc14242;
          const capColor = this.team === 'blue' ? 0xa7d5ff : 0xffb0b0;

          const torso = new THREE.Mesh(
            new THREE.BoxGeometry(0.95, 1.2, 0.55),
            new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.95 })
          );
          torso.position.set(0, 1.15, 0);
          this.visualRoot.add(torso);

          const head = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.6, 0.6),
            new THREE.MeshStandardMaterial({ color: capColor, roughness: 0.95 })
          );
          head.position.set(0, 2.0, 0);
          this.visualRoot.add(head);

          const armGeo = new THREE.BoxGeometry(0.2, 0.9, 0.2);
          const armMat = new THREE.MeshStandardMaterial({ color: baseColor, roughness: 0.96 });
          const armL = new THREE.Mesh(armGeo, armMat);
          armL.position.set(-0.6, 1.15, 0);
          armL.rotation.z = 0.15;
          this.visualRoot.add(armL);
          const armR = new THREE.Mesh(armGeo, armMat);
          armR.position.set(0.6, 1.15, 0);
          armR.rotation.z = -0.15;
          this.visualRoot.add(armR);

          const legGeo = new THREE.BoxGeometry(0.24, 1.0, 0.24);
          const legL = new THREE.Mesh(legGeo, armMat);
          legL.position.set(-0.24, 0.25, 0);
          this.visualRoot.add(legL);
          const legR = new THREE.Mesh(legGeo, armMat);
          legR.position.set(0.24, 0.25, 0);
          this.visualRoot.add(legR);
        }

        setModelTemplate(template) {
          while (this.visualRoot.children.length) {
            this.visualRoot.remove(this.visualRoot.children[0]);
          }
          const model = THREE.SkeletonUtils.clone(template);
          model.traverse((o) => {
            if (o.isMesh) {
              o.castShadow = false;
              o.receiveShadow = true;
              if (o.material) {
                o.material = o.material.clone();
                o.material.metalness = 0.0;
                o.material.roughness = 1.0;
              }
            }
          });
          model.scale.setScalar(1.35);
          model.rotation.y = Math.PI;
          model.position.set(0, 0, 0);
          this.visualRoot.add(model);

          // 見た目の差異を少し調整
          if (this.team === 'blue') {
            model.traverse((o) => {
              if (o.isMesh && o.material && o.material.color) {
                o.material.color.offsetHSL(0.02, 0.08, 0.08);
              }
            });
          } else {
            model.traverse((o) => {
              if (o.isMesh && o.material && o.material.color) {
                o.material.color.offsetHSL(-0.02, 0.05, 0.02);
              }
            });
          }
        }

        setGunTemplate(template) {}

        respawn() {
          this.dead = false;
          this.health = this.maxHealth;
          this.root.visible = true;
          this.root.position.copy(this.spawn);
          this.wanderTarget = null;
          this.thinkTimer = 0;
          this.fireCooldown = 0;
        }

        kill(killer) {
          if (this.dead) return;
          this.dead = true;
          this.root.visible = false;
          this.respawnAt = performance.now() + 2800;

          if (killer && killer.team !== this.team) {
            if (killer.team === 'blue') ui.blueScore++;
            else ui.redScore++;
            updateHUD();
            checkWin();
          }

          if (this === player) {
            ui.deaths++;
            updateHUD();
          }
        }

        damage(amount, killer) {
          if (this.dead) return;
          this.health -= amount;
          if (this.health <= 0) {
            this.health = 0;
            this.kill(killer);
          }
        }

        get position() {
          return this.root.position;
        }

        updateFacing(targetPos) {
          const dx = targetPos.x - this.position.x;
          const dz = targetPos.z - this.position.z;
          this.root.rotation.y = Math.atan2(dx, dz);
        }
      }

      const playerState = {

      function loadModels() {
        const gltfLoader = new THREE.GLTFLoader();
        gltfLoader.load(
          './human1.glb',
          (gltf) => {
            loaded.human = true;

      function applyGunModel(template) {

      function bindInput() {
        window.addEventListener('keydown', (e) => {
          keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
          keys[e.code] = false;
        });

        // Desktop: クリックでポインターロック
        renderer.domElement.addEventListener('click', () => {
          if (gameOver) return;
          if (!isTouch && document.pointerLockElement !== renderer.domElement) {
            renderer.domElement.requestPointerLock?.();
          }
        });

        document.addEventListener('pointerlockchange', () => {
          pointer.locked = (document.pointerLockElement === renderer.domElement);
          if (pointer.locked) {
            showHint(false);
          } else if (!isTouch) {
            showHint(true);
          }
        });

        document.addEventListener('mousemove', (e) => {
          if (!pointer.locked || gameOver) return;
          pointer.yaw -= e.movementX * pointer.lookSensitivity;
          pointer.pitch -= e.movementY * pointer.lookSensitivity;
          pointer.pitch = clamp(pointer.pitch, -1.45, 1.45);
        });

        window.addEventListener('mousedown', (e) => {
          if (gameOver) return;
          if (!isTouch && e.button === 0) {
            if (document.pointerLockElement === renderer.domElement) {
              shootPlayer();
            }
          }
        });

        window.addEventListener('contextmenu', (e) => e.preventDefault());

        // Touch joystick
        let joyPointer = null;
        let joyCenter = { x: 0, y: 0 };

        joyBase.addEventListener('pointerdown', (e) => {
          if (gameOver) return;
          e.preventDefault();
          joyPointer = e.pointerId;
          joyBase.setPointerCapture(e.pointerId);
          const rect = joyBase.getBoundingClientRect();
          joyCenter.x = rect.left + rect.width / 2;
          joyCenter.y = rect.top + rect.height / 2;
          updateJoystick(e.clientX, e.clientY);
        });

        joyBase.addEventListener('pointermove', (e) => {
          if (e.pointerId !== joyPointer) return;
          e.preventDefault();
          updateJoystick(e.clientX, e.clientY);
        });

        const stopJoy = (e) => {
          if (e.pointerId !== joyPointer) return;
          e.preventDefault();
          joyPointer = null;
          pointer.moveVec.set(0, 0);
          joyStick.style.transform = 'translate(0px, 0px)';
        };

        joyBase.addEventListener('pointerup', stopJoy);
        joyBase.addEventListener('pointercancel', stopJoy);
        joyBase.addEventListener('lostpointercapture', () => {
          joyPointer = null;
          pointer.moveVec.set(0, 0);
          joyStick.style.transform = 'translate(0px, 0px)';
        });

        function updateJoystick(x, y) {
          const dx = x - joyCenter.x;
          const dy = y - joyCenter.y;
          const max = 44;
          const len = Math.hypot(dx, dy);
          const nx = len > 0 ? dx / len : 0;
          const ny = len > 0 ? dy / len : 0;
          const clamped = Math.min(len, max);
          joyStick.style.transform = `translate(${nx * clamped}px, ${ny * clamped}px)`;
          pointer.moveVec.set((nx * clamped) / max, (ny * clamped) / max);
        }

        // Touch look on canvas
        let lookPointer = null;

        renderer.domElement.addEventListener('pointerdown', (e) => {
          if (gameOver) return;
          if (e.pointerType !== 'touch') return;
          // 右半分を視点操作に使う。左下はジョイスティックが受ける。
          const rect = renderer.domElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          if (x < rect.width * 0.34) return;
          // 右下の射撃ボタンは別要素が受ける
          if (e.target === fireBtn || fireBtn.contains(e.target)) return;
          lookPointer = e.pointerId;
          pointer.touchLookId = e.pointerId;
          pointer.touchLookActive = true;
          pointer.lastTouchX = e.clientX;
          pointer.lastTouchY = e.clientY;
          renderer.domElement.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        renderer.domElement.addEventListener('pointermove', (e) => {
          if (e.pointerType !== 'touch') return;
          if (lookPointer !== e.pointerId || gameOver) return;
          e.preventDefault();
          const dx = e.clientX - pointer.lastTouchX;
          const dy = e.clientY - pointer.lastTouchY;
          pointer.lastTouchX = e.clientX;
          pointer.lastTouchY = e.clientY;
          pointer.yaw -= dx * 0.0055;
          pointer.pitch -= dy * 0.0055;
          pointer.pitch = clamp(pointer.pitch, -1.45, 1.45);
        });

        const endLook = (e) => {
          if (lookPointer !== e.pointerId) return;
          lookPointer = null;
          pointer.touchLookActive = false;
          pointer.touchLookId = null;
        };

        renderer.domElement.addEventListener('pointerup', endLook);
        renderer.domElement.addEventListener('pointercancel', endLook);
        renderer.domElement.addEventListener('lostpointercapture', () => {
          lookPointer = null;
          pointer.touchLookActive = false;
          pointer.touchLookId = null;
        });

        // Fire button
        const startFire = (e) => {
          if (gameOver) return;
          e.preventDefault();
          fireOnceForTouch();
          if (pointer.fireInterval) clearInterval(pointer.fireInterval);
          pointer.fireHeld = true;
          pointer.fireInterval = setInterval(() => {
            if (!gameOver && pointer.fireHeld) fireOnceForTouch();
          }, 220);
        };

        const stopFire = (e) => {
          if (e) e.preventDefault();
          pointer.fireHeld = false;
          if (pointer.fireInterval) {
            clearInterval(pointer.fireInterval);
            pointer.fireInterval = null;
          }
        };

        fireBtn.addEventListener('pointerdown', startFire);
        fireBtn.addEventListener('pointerup', stopFire);
        fireBtn.addEventListener('pointercancel', stopFire);
        fireBtn.addEventListener('pointerleave', stopFire);
        fireBtn.addEventListener('contextmenu', (e) => e.preventDefault());

        restartBtn.addEventListener('click', restartGame);

        window.addEventListener('blur', () => {
          keys.W = keys.A = keys.S = keys.D = false;
          stopFire();
          pointer.moveVec.set(0, 0);
          joyStick.style.transform = 'translate(0px, 0px)';
        });
      }

      function bindResize() {
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight, false);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      function updateHUD() {

      function checkWin() {
        if (gameOver) return;

          gameOver = true;

      function stopAllInputs() {
        pointer.fireHeld = false;
        if (pointer.fireInterval) {
          clearInterval(pointer.fireInterval);

      function restartGame() {
        ui.blueScore = 0;
        ui.redScore = 0;
        ui.deaths = 0;
        updateHUD();
        gameOver = false;
        gameOverEl.classList.remove('show');
        showHint(!isTouch);

        // reset player
        playerState.pos.set(teamSpawns.blue[0].x, 0, teamSpawns.blue[0].z + 4);
        playerState.health = 100;
        playerState.dead = false;
        playerState.respawnAt = 0;
        pointer.yaw = 0;
        pointer.pitch = 0;
        camera.rotation.set(0, 0, 0);

        // reset bots
        characters.forEach((c, i) => {
          const spawn = teamSpawns[c.team][i % teamSpawns[c.team].length].clone();
          c.spawn.copy(spawn);
          c.respawn();
        });
      }

      function stopAtWalls(pos, radius) {
        pos.x = clamp(pos.x, -ARENA.w / 2 + radius + 1.2, ARENA.w / 2 - radius - 1.2);
        pos.z = clamp(pos.z, -ARENA.d / 2 + radius + 1.2, ARENA.d / 2 - radius - 1.2);

        for (const b of obstacleBoxes) {
          const nearestX = clamp(pos.x, b.minX, b.maxX);
          const nearestZ = clamp(pos.z, b.minZ, b.maxZ);
          const dx = pos.x - nearestX;
          const dz = pos.z - nearestZ;
          if ((dx * dx + dz * dz) < radius * radius) {
            // 別軸で押し戻す
            const pushX = Math.abs(dx) > Math.abs(dz) ? (dx >= 0 ? radius - Math.abs(dx) : -(radius - Math.abs(dx))) : 0;
            const pushZ = Math.abs(dz) >= Math.abs(dx) ? (dz >= 0 ? radius - Math.abs(dz) : -(radius - Math.abs(dz))) : 0;
            if (pushX !== 0) pos.x += pushX * 0.55;
            if (pushZ !== 0) pos.z += pushZ * 0.55;
          }
        }
        pos.x = clamp(pos.x, -ARENA.w / 2 + radius + 1.2, ARENA.w / 2 - radius - 1.2);
        pos.z = clamp(pos.z, -ARENA.d / 2 + radius + 1.2, ARENA.d / 2 - radius - 1.2);
      }

      function canSee(source, target, ignoreChar) {
        const from = new THREE.Vector3(source.x, 1.55, source.z);
        const to = new THREE.Vector3(target.x, 1.55, target.z);
        const dir = to.clone().sub(from);
        const dist = dir.length();
        if (dist < 0.01) return true;
        dir.normalize();

        raycaster.set(from, dir);
        raycaster.far = dist;
        const hits = raycaster.intersectObjects(obstacleMeshes, true);
        return hits.length === 0;
      }

      function getVisibleEnemyFor(ch) {
        let best = null;
        let bestDist = Infinity;
        for (const other of characters) {
          if (other.dead || other.team === ch.team) continue;
          const d = ch.position.distanceTo(other.position);
          if (d > 34) continue;
          if (!canSee(ch.position, other.position, ch)) continue;
          if (d < bestDist) {
            best = other;
            bestDist = d;
          }
        }
        return best;
      }

      function pickPatrolPoint(ch) {
        const p = patrolPoints[(Math.random() * patrolPoints.length) | 0].clone();
        // チーム側に少し寄せる
        if (ch.team === 'blue') p.x = Math.min(p.x, 10 + Math.random() * 10);
        else p.x = Math.max(p.x, -10 - Math.random() * 10);
        return p;
      }

      function moveCharacter(ch, moveDir, speed, dt) {
        if (moveDir.lengthSq() < 0.0001) return;
        moveDir.normalize();

        const attempt = ch.position.clone();
        attempt.x += moveDir.x * speed * dt;
        attempt.z += moveDir.z * speed * dt;
        stopAtWalls(attempt, ch.radius);
        ch.position.copy(attempt);

        // 見た目の向き
        const lookYaw = Math.atan2(moveDir.x, moveDir.z);
        ch.root.rotation.y = lookYaw;
      }

      function chooseTargetMove(ch, target) {
        const to = target.position.clone().sub(ch.position);
        const dist = to.length();
        to.y = 0;
        if (dist < 0.001) return new THREE.Vector3();

        const dir = to.clone().normalize();
        // 遠ければ近づく、近ければ少し下がる
        if (dist > 12) return dir;
        if (dist < 7) return dir.multiplyScalar(-1);
        // 中距離は横移動も少し混ぜる
        const side = new THREE.Vector3(-dir.z, 0, dir.x);
        return dir.multiplyScalar(0.55).add(side.multiplyScalar((Math.random() > 0.5 ? 1 : -1) * 0.55));
      }

      function shootRay(origin, direction, shooter, damage) {
        const maxDist = 60;
        const bulletsFrom = new THREE.Vector3(origin.x, origin.y, origin.z);
        const dir = direction.clone().normalize();
        raycaster.set(bulletsFrom, dir);
        raycaster.far = maxDist;

        bulletHits.length = 0;
        const allObjects = obstacleHitObjects.concat(allHitboxes);
        const hits = raycaster.intersectObjects(allObjects, false);
        if (!hits.length) return;

        // 近い順に見て、最初の障害物 or 敵キャラを採用
        for (const hit of hits) {
          const obj = hit.object;
          if (obj.userData && obj.userData.isObstacle) {
            return;
          }
          const ch = obj.userData && obj.userData.character;
          if (!ch || ch.dead || ch === shooter) continue;
          if (ch.team === shooter.team) continue;
          ch.damage(damage, shooter);
          return;
        }
      }

      function shootFromCharacter(shooter, targetPos) {
        if (shooter.dead || gameOver) return;
        if (shooter.fireCooldown > 0) return;
        shooter.fireCooldown = shooter.team === 'blue' ? 0.22 : 0.28;

        const origin = shooter.position.clone();
        origin.y = 1.58;

        const dir = targetPos.clone().sub(origin);
        dir.y *= 0.35;

        // 少し散らす
        const spread = shooter === player ? 0.012 : 0.03;
        dir.x += (Math.random() - 0.5) * spread;
        dir.y += (Math.random() - 0.5) * spread * 0.55;
        dir.z += (Math.random() - 0.5) * spread;

        shootRay(origin, dir, shooter, shooter === player ? 34 : 28);
      }

      function shootPlayer() {
        if (gameOver) return;
        if (playerState.dead) return;
        if (playerState.shootCooldown > 0) return;

        playerState.shootCooldown = 0.15;
        const origin = new THREE.Vector3(playerState.pos.x, 1.62, playerState.pos.z);
        const dir = new THREE.Vector3(
          Math.sin(pointer.yaw) * Math.cos(pointer.pitch),
          Math.sin(pointer.pitch),
          -Math.cos(pointer.yaw) * Math.cos(pointer.pitch)
        ).normalize();

        shootRay(origin, dir, player, 34);
      }

      function fireOnceForTouch() {
        shootPlayer();
      }

      function updatePlayer(dt) {
        if (playerState.dead || gameOver) return;

        // desktop wasd + touch joystick
        const moveX = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0) + pointer.moveVec.x;
        const moveY = (keys.KeyS ? 1 : 0) - (keys.KeyW ? 1 : 0) + pointer.moveVec.y;

        const yaw = pointer.yaw;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));

        const desired = new THREE.Vector3();
        desired.addScaledVector(right, moveX);
        desired.addScaledVector(forward, moveY);
        if (desired.lengthSq() > 0) desired.normalize();

        const next = playerState.pos.clone().addScaledVector(desired, playerState.speed * dt);
        stopAtWalls(next, playerState.radius);
        playerState.pos.copy(next);

        if (keys.Space) {
          // 連打しないように、必要なら将来ここへ拡張
        }

        // 視点を反映
        camera.position.set(playerState.pos.x, 1.7, playerState.pos.z);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = pointer.yaw;
        camera.rotation.x = pointer.pitch;

        // 銃の簡易揺れ
        if (playerState.gun) {
          const bob = Math.sin(performance.now() * 0.012) * 0.008 * Math.min(1, desired.length() * 2);
          playerState.gun.position.y = -0.28 + bob;
          playerState.gun.position.x = 0.42 + Math.sin(performance.now() * 0.008) * 0.01;
        }

        if (playerState.shootCooldown > 0) playerState.shootCooldown -= dt;
      }

      function updateAI(ch, dt) {
        if (ch.dead || gameOver) return;
        if (ch.fireCooldown > 0) ch.fireCooldown -= dt;

        const visibleEnemy = getVisibleEnemyFor(ch);
        let moveDir = new THREE.Vector3();

        if (visibleEnemy) {
          ch.thinkTimer += dt;
          const toEnemy = visibleEnemy.position.clone().sub(ch.position);
          const dist = toEnemy.length();

          if (dist < 0.001) return;
          moveDir = chooseTargetMove(ch, visibleEnemy);

          // 視界が通っていれば射撃
          if (ch.fireCooldown <= 0 && dist < 35 && canSee(ch.position, visibleEnemy.position, ch)) {
            ch.updateFacing(visibleEnemy.position);
            shootFromCharacter(ch, visibleEnemy.position);
          }

          // 近すぎる時は少しずつ離れる
          if (dist < 7.5) {
            moveDir.add(toEnemy.clone().setY(0).normalize().multiplyScalar(-0.6));
          }
        } else {
          ch.wanderTimer -= dt;
          if (!ch.wanderTarget || ch.wanderTimer <= 0 || ch.position.distanceTo(ch.wanderTarget) < 1.4) {
            ch.wanderTarget = pickPatrolPoint(ch);
            ch.wanderTimer = 2.2 + Math.random() * 2.5;
          }
          moveDir = ch.wanderTarget.clone().sub(ch.position);
          moveDir.y = 0;

          // たまに振り向く
          if (moveDir.lengthSq() > 0.001) {
            ch.root.rotation.y = Math.atan2(moveDir.x, moveDir.z);
          }
        }

        // 障害物に引っかかったら少し方向転換
        const before = ch.position.clone();
        moveCharacter(ch, moveDir, ch.speed, dt);
        if (before.distanceToSquared(ch.position) < 0.00005) {
          const alt = new THREE.Vector3(moveDir.z, 0, -moveDir.x);
          moveCharacter(ch, alt, ch.speed * 0.8, dt);
          if (before.distanceToSquared(ch.position) < 0.00005) {
            ch.wanderTarget = null;
          }
        }

        // 生きている相手が近くで見えるときはより積極的に射撃
        if (visibleEnemy && visibleEnemy !== player && ch.fireCooldown <= 0) {
          const dist = ch.position.distanceTo(visibleEnemy.position);
          if (dist < 32) {
            ch.updateFacing(visibleEnemy.position);
            shootFromCharacter(ch, visibleEnemy.position);
          }
        }
      }

      function respawnIfNeeded(ch) {
        if (!ch.dead) return;
        if (performance.now() >= ch.respawnAt) {
          // チーム内で少し散らす
          const spawnList = teamSpawns[ch.team];
          const idx = (Math.random() * spawnList.length) | 0;
          ch.spawn.copy(spawnList[idx]).add(new THREE.Vector3((Math.random() - 0.5) * 3.5, 0, (Math.random() - 0.5) * 3.5));
          ch.respawn();
        }
      }

      function respawnPlayerIfNeeded() {
        if (!playerState.dead) return;
        if (performance.now() >= playerState.respawnAt) {
          playerState.dead = false;
          playerState.health = 100;
          playerState.pos.copy(teamSpawns.blue[0]).add(new THREE.Vector3(0, 0, 4));
        }
      }

      function killPlayer() {
        if (playerState.dead) return;
        playerState.dead = true;
        ui.deaths++;
        updateHUD();
        playerState.respawnAt = performance.now() + 2800;
      }

      function playerTakeDamage(amount, attacker) {
        if (playerState.dead || gameOver) return;
        playerState.health -= amount;
        if (playerState.health <= 0) {
          playerState.health = 0;
          killPlayer();
          if (attacker && attacker.team === 'red') {
            ui.redScore++;
            updateHUD();
            checkWin();
          }
        }
      }

      // 念のため、プレイヤーが死んだ時に表示更新だけ入れる拡張ポイント
      // このベースでは敵弾がプレイヤーに当たる処理は将来拡張しやすい形にしてある

      function updateEnemyShotsHitPlayer(dt) {
        // 近い将来の拡張用。ベースではプレイヤー被弾を簡潔にするためここにまとめる。
        // AIが射撃する際、弾線は味方を無視して障害物か敵に当たる。
        // プレイヤー側への被弾は「敵が射撃するRayの命中」で判定できるようにしておく。
      }

      function maybeHitPlayerFromEnemyRays() {
        // 射撃の際、敵AIの弾がプレイヤーに当たるかを確認。
        // プレイヤーは collider ではなく camera position を基準に簡易ヒット判定。
        // ここでは強めに簡略化し、敵の射撃時にプレイヤーに直線が通れば命中にする。
      }

      function enemyDirectHitToPlayer(shooter, targetPos) {
        if (playerState.dead || gameOver) return;
        const origin = shooter.position.clone();
        origin.y = 1.58;
        const target = new THREE.Vector3(playerState.pos.x, 1.58, playerState.pos.z);
        const dir = target.clone().sub(origin).normalize();

        // 射線上に障害物があるか確認
        raycaster.set(origin, dir);
        raycaster.far = origin.distanceTo(target);
        const blockHits = raycaster.intersectObjects(obstacleMeshes, true);
        if (blockHits.length) return;

        // プレイヤーの簡易当たり判定
        const toPlayer = target.clone().sub(origin);
        const proj = toPlayer.dot(dir);
        if (proj > 0 && proj < 60) {
          const closest = origin.clone().addScaledVector(dir, proj);
          const distXZ = Math.hypot(closest.x - target.x, closest.z - target.z);
          const distY = Math.abs(closest.y - target.y);
          if (distXZ < 0.9 && distY < 1.0) {
            playerTakeDamage(shooter === player ? 34 : 28, shooter);
          }
        }
      }

      function patchShotsToPlayer(ch, target) {
        if (ch.team !== 'red') return;
        if (playerState.dead || gameOver) return;
        // 敵の射撃からプレイヤーへの当たり判定を入れる。
        const origin = ch.position.clone();
        origin.y = 1.58;
        const targetP = new THREE.Vector3(playerState.pos.x, 1.58, playerState.pos.z);
        const dir = targetP.clone().sub(origin);
        const dist = dir.length();
        if (dist < 0.001) return;
        dir.normalize();

        // 障害物チェック
        raycaster.set(origin, dir);
        raycaster.far = dist;
        const hits = raycaster.intersectObjects(obstacleMeshes, true);
        if (hits.length) return;

        // 命中
        const closest = origin.clone().addScaledVector(dir, dist);
        const d = Math.hypot(closest.x - targetP.x, closest.z - targetP.z);
        if (d < 0.95) {
          playerTakeDamage(28, ch);
        }
      }

      // AI射撃の補助：敵の弾はプレイヤーも判定
      const originalShootFromCharacter = shootFromCharacter;
      shootFromCharacter = function(shooter, targetPos) {
        if (shooter.dead || gameOver) return;
        if (shooter.fireCooldown > 0) return;
        shooter.fireCooldown = shooter.team === 'blue' ? 0.22 : 0.28;

        const origin = shooter.position.clone();
        origin.y = 1.58;

        const dir = targetPos.clone().sub(origin);
        dir.y *= 0.35;

        const spread = shooter === player ? 0.012 : 0.03;
        dir.x += (Math.random() - 0.5) * spread;
        dir.y += (Math.random() - 0.5) * spread * 0.55;
        dir.z += (Math.random() - 0.5) * spread;

        // まず敵/障害物の弾線処理
        const maxDist = 60;
        raycaster.set(origin, dir.clone().normalize());
        raycaster.far = maxDist;
        const allObjects = obstacleHitObjects.concat(allHitboxes);
        const hits = raycaster.intersectObjects(allObjects, false);
        let hitEnemy = false;

        if (hits.length) {
          for (const hit of hits) {
            const obj = hit.object;
            if (obj.userData && obj.userData.isObstacle) {
              break;
            }
            const ch = obj.userData && obj.userData.character;
            if (!ch || ch.dead || ch === shooter) continue;
            if (ch.team === shooter.team) continue;
            ch.damage(shooter === player ? 34 : 28, shooter);
            hitEnemy = true;
            break;
          }
        }

        // 敵チームはプレイヤーも射撃対象にできる
        if (!hitEnemy && shooter.team === 'red') {
          patchShotsToPlayer(shooter, targetPos);
        }
      };

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.033);

        if (!gameOver) {
          updatePlayer(dt);

          // enemy / ally AI
          for (const ch of characters) {
            respawnIfNeeded(ch);
            if (!ch.dead) updateAI(ch, dt);
          }

          respawnPlayerIfNeeded();
        }

        renderer.render(scene, camera);
      }

      // 画面外クリック・タップでの hint 表示
      document.addEventListener('pointerdown', (e) => {
        if (gameOver) return;
        if (!isTouch && e.pointerType === 'mouse') {
          showHint(document.pointerLockElement !== renderer.domElement);
        }
      });

      // プレイヤーを狙う敵の射撃は updateAI の shootFromCharacter 内で判定済み
      // ここではプレイヤーのカメラ位置同期を毎フレーム行う
      function syncCamera() {
        camera.position.set(playerState.pos.x, 1.7, playerState.pos.z);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = pointer.yaw;
        camera.rotation.x = pointer.pitch;
      }

      // player update の後にカメラ反映
      const originalUpdatePlayer = updatePlayer;
      updatePlayer = function(dt) {
        if (playerState.dead || gameOver) {
          syncCamera();
          return;
        }

        const moveX = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0) + pointer.moveVec.x;
        const moveY = (keys.KeyS ? 1 : 0) - (keys.KeyW ? 1 : 0) + pointer.moveVec.y;

        const yaw = pointer.yaw;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));

        const desired = new THREE.Vector3();
        desired.addScaledVector(right, moveX);
        desired.addScaledVector(forward, moveY);
        if (desired.lengthSq() > 0) desired.normalize();

        const next = playerState.pos.clone().addScaledVector(desired, playerState.speed * dt);
        stopAtWalls(next, playerState.radius);
        playerState.pos.copy(next);

        if (playerState.gun) {
          const bob = Math.sin(performance.now() * 0.012) * 0.008 * Math.min(1, desired.length() * 2);
          playerState.gun.position.y = -0.28 + bob;
          playerState.gun.position.x = 0.42 + Math.sin(performance.now() * 0.008) * 0.01;
        }

        if (playerState.shootCooldown > 0) playerState.shootCooldown -= dt;

        syncCamera();
      };

      // player shots use same function
      window.addEventListener('pointerdown', (e) => {
        if (!isTouch && e.pointerType === 'mouse' && e.button === 0 && document.pointerLockElement === renderer.domElement) {
          shootPlayer();
        }
      });

      init();
    })();
  </script>
</body>
