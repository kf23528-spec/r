<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>FPS Team Deathmatch</title>
  <style>
    :root{
      --bg:#07111d;
      --panel: rgba(10, 15, 24, .72);
      --panel2: rgba(8, 12, 18, .88);
      --text:#eaf2ff;
      --muted:#9fb3cc;
      --blue:#4aa3ff;
      --red:#ff5c5c;
      --green:#44d18a;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      overscroll-behavior: none;
    }
    * {
      box-sizing: border-box;
      touch-action: none;
    }
    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #12263a 0%, #07111d 60%, #04070c 100%);
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: var(--text);
      touch-action: none;
    }
    .topbar {
      position: absolute;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(13,18,28,.82), rgba(8,12,18,.62));
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      width: min(920px, calc(100vw - 12px));
      pointer-events: none;
    }
    .leftStats, .rightStats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .teamScore {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      letter-spacing: .4px;
      white-space: nowrap;
      font-size: clamp(14px, 2.1vw, 18px);
    }
    .badge {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .badge.blue { background: var(--blue); }
    .badge.red { background: var(--red); }
    .statChip {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.06);
      font-size: clamp(12px, 1.7vw, 15px);
      color: #d8e4f4;
      white-space: nowrap;
      font-weight: 700;
    }

    #hpHud {
      position: absolute;
      left: calc(env(safe-area-inset-left, 0px) + 12px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      width: min(280px, calc(100vw - 24px));
      padding: 10px 12px 12px;
      border-radius: 16px;
      background: rgba(10, 14, 20, .62);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 30px rgba(0,0,0,.24);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
    #hpText {
      font-size: 18px;
      font-weight: 900;
      color: #8ff0a8;
      letter-spacing: .03em;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(68,209,138,.18);
    }
    #hpBarOuter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }
    #hpBarInner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #35d06d 0%, #66e28c 100%);
      box-shadow: 0 0 18px rgba(68,209,138,.22);
      transform-origin: left center;
      transform: scaleX(1);
    }

    #centerHint, #gameOver {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      touch-action: none;
    }
    #centerHint {
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(10,14,20,.58);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      max-width: min(92vw, 560px);
      color: #f1f7ff;
      font-weight: 700;
      line-height: 1.5;
      display: block;
    }
    #centerHint .sub {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-weight: 600;
      font-size: 13px;
    }

    #reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      opacity: .95;
      filter: drop-shadow(0 0 8px rgba(0,0,0,.25));
      pointer-events: none;
    }
    #reticle::before, #reticle::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.92);
      border-radius: 2px;
    }
    #reticle::before {
      left: 8px;
      top: 0;
      width: 2px;
      height: 18px;
    }
    #reticle::after {
      top: 8px;
      left: 0;
      width: 18px;
      height: 2px;
    }

    #touchLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      touch-action: none;
    }
    #joyBase {
      position: absolute;
      left: calc(env(safe-area-inset-left, 0px) + 18px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(6px);
      pointer-events: auto;
      display: none;
      touch-action: none;
    }
    #joyStick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;
      border-radius: 50%;
      background: rgba(122,208,255,.38);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
      transform: translate(0px, 0px);
      touch-action: none;
    }
    #fireBtn {
      position: absolute;
      right: calc(env(safe-area-inset-right, 0px) + 18px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      width: min(24vw, 122px);
      height: min(24vw, 122px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.26), rgba(255,92,92,.22) 30%, rgba(255,92,92,.12) 64%, rgba(255,255,255,.08) 100%);
      border: 1px solid rgba(255,255,255,.15);
      box-shadow: 0 12px 28px rgba(0,0,0,.28), inset 0 0 0 2px rgba(255,255,255,.05);
      display: none;
      pointer-events: auto;
      color: white;
      font-weight: 900;
      font-size: clamp(15px, 2.6vw, 19px);
      letter-spacing: .12em;
      text-transform: uppercase;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #fireBtn span {
      display: block;
      transform: translateY(-1px);
      pointer-events: none;
    }

    #gameOver {
      top: 44%;
      width: min(92vw, 560px);
      padding: 18px 16px 16px;
      border-radius: 18px;
      background: var(--panel2);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 18px 40px rgba(0,0,0,.38);
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      transform: translateX(-50%) scale(.98);
      color: white;
    }
    #gameOver.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }
    #gameOver h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: .04em;
    }
    #gameOver p {
      margin: 6px 0 14px;
      color: #d8e4f4;
      line-height: 1.6;
    }
    #restartBtn {
      pointer-events: auto;
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(180deg, #79d0ff, #4aa3ff);
      color: #03101d;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: .04em;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(74,163,255,.28);
      touch-action: none;
    }
    @media (pointer: coarse) {
      #joyBase, #fireBtn { display: flex; }
      .topbar { width: calc(100vw - 10px); }
      #hpHud { width: min(240px, calc(100vw - 24px)); }
    }
    @media (max-width: 520px) {
      .topbar {
        padding: 8px 10px;
        gap: 8px;
      }
      .leftStats, .rightStats {
        gap: 8px;
      }
      #hpText {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="topbar">
        <div class="leftStats">
          <div class="teamScore"><span class="badge blue"></span><span>BLUE <span id="blueScore">0</span></span></div>
          <div class="teamScore"><span class="badge red"></span><span>RED <span id="redScore">0</span></span></div>
        </div>
        <div class="rightStats">
          <div class="statChip">DEATHS: <span id="deaths">0</span></div>
          <div class="statChip">TARGET: 20 KILLS</div>
        </div>
      </div>

      <div id="hpHud">
        <div id="hpText">HP: 100</div>
        <div id="hpBarOuter"><div id="hpBarInner"></div></div>
      </div>

      <div id="centerHint">
        <div id="hintMain">クリック / タップで案内を閉じます</div>
        <span class="sub">PC: WASD移動・マウス視点・左クリック射撃 / スマホ: 左下スティック・右半分スワイプで視点・右下で射撃</span>
      </div>

      <div id="reticle"></div>

      <div id="gameOver">
        <h1 id="winnerText">BLUE TEAM WINS</h1>
        <p id="resultText">先に20キルへ到達したチームが勝利です。</p>
        <button id="restartBtn">RESTART</button>
      </div>
    </div>

    <div id="touchLayer">
      <div id="joyBase"><div id="joyStick"></div></div>
      <div id="fireBtn"><span>FIRE</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const blueScoreEl = document.getElementById('blueScore');
      const redScoreEl = document.getElementById('redScore');
      const deathsEl = document.getElementById('deaths');
      const hpTextEl = document.getElementById('hpText');
      const hpBarInnerEl = document.getElementById('hpBarInner');
      const hintEl = document.getElementById('centerHint');
      const gameOverEl = document.getElementById('gameOver');
      const winnerTextEl = document.getElementById('winnerText');
      const resultTextEl = document.getElementById('resultText');
      const restartBtn = document.getElementById('restartBtn');
      const joyBase = document.getElementById('joyBase');
      const joyStick = document.getElementById('joyStick');
      const fireBtn = document.getElementById('fireBtn');

      const isTouch = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
      const BLUE = 0x4aa3ff;
      const RED = 0xff5c5c;
      const ARENA = { w: 80, d: 80 };
      const PLAYER_MAX_HP = 100;
      const ENEMY_HIT_DAMAGE = 28;
      const PLAYER_HIT_DAMAGE = 34;
      const MODEL_TARGET_HEIGHT = 4.8;
      const GROUND_Y = 0;

      let scene, camera, renderer, orbit, clock;
      let gameOver = false;

      const keys = Object.create(null);
      const obstacleMeshes = [];
      const obstacleBoxes = [];
      const hitObjects = [];
      const characters = [];
      const patrolPoints = [];

      const ui = {
        blueScore: 0,
        redScore: 0,
        deaths: 0
      };

      const pointer = {
        locked: false,
        yaw: 0,
        pitch: 0,
        lookSensitivity: 0.0022,
        moveVec: new THREE.Vector2(),
        touchLookId: null,
        lastTouchX: 0,
        lastTouchY: 0,
        fireHeld: false,
        fireTimer: null
      };

      const player = {
        pos: new THREE.Vector3(0, 0, 0),
        hp: PLAYER_MAX_HP,
        dead: false,
        respawnAt: 0,
        invulnUntil: 0,
        shootCooldown: 0,
        speed: 6.2,
        radius: 0.65,
        gun: null,
        collider: null
      };

      const playerSpawn = new THREE.Vector3(teamSpawnX('blue', 0), 0, teamSpawnZ('blue', 0) + 4);

      function teamSpawnX(team, idx) {
        return team === 'blue'
          ? [-30, -34, -30, -34][idx % 4]
          : [30, 34, 30, 34][idx % 4];
      }

      function teamSpawnZ(team, idx) {
        return team === 'blue'
          ? [26, 10, -10, -28][idx % 4]
          : [26, 10, -10, -28][idx % 4];
      }

      const raycaster = new THREE.Raycaster();
      const tmpVec3 = new THREE.Vector3();
      const tmpVec3b = new THREE.Vector3();
      const tmpBox = new THREE.Box3();
      const tmpSize = new THREE.Vector3();
      const tmpCenter = new THREE.Vector3();

      function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x07111d);
        scene.fog = new THREE.Fog(0x07111d, 42, 120);

        camera = new THREE.PerspectiveCamera(74, window.innerWidth / window.innerHeight, 0.1, 300);
        camera.position.set(playerSpawn.x, 1.7, playerSpawn.z);

        renderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true,
          alpha: false,
          powerPreference: 'high-performance'
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        renderer.outputEncoding = THREE.sRGBEncoding;

        orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enabled = false;

        clock = new THREE.Clock();

        buildLights();
        buildArena();
        buildPatrolPoints();
        buildPlayerColliderAndGun();
        createBots();
        loadModels();
        bindInput();
        bindResize();
        updateHUD();
        updateHPUI();

        if (isTouch) {
          document.getElementById('hintMain').textContent = 'スマホ操作モードです。左下スティックで移動、右半分スワイプで視点、右下で射撃。';
        }

        animate();
      }

      function buildLights() {
        const hemi = new THREE.HemisphereLight(0xcfe6ff, 0x182130, 1.7);
        scene.add(hemi);

        const dir = new THREE.DirectionalLight(0xffffff, 1.7);
        dir.position.set(20, 34, 14);
        scene.add(dir);

        const fill = new THREE.DirectionalLight(0x9bc9ff, 0.55);
        fill.position.set(-30, 24, -20);
        scene.add(fill);

        const amb = new THREE.AmbientLight(0x8090aa, 0.52);
        scene.add(amb);
      }

      function addObstacle(x, y, z, w, h, d, color) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({
          color,
          roughness: 1,
          metalness: 0.02
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.userData.isObstacle = true;
        scene.add(mesh);
        obstacleMeshes.push(mesh);
        hitObjects.push(mesh);

        const box = {
          minX: x - w / 2,
          maxX: x + w / 2,
          minZ: z - d / 2,
          maxZ: z + d / 2
        };
        obstacleBoxes.push(box);
        return mesh;
      }

      function buildArena() {
        const groundGeo = new THREE.PlaneGeometry(ARENA.w, ARENA.d, 1, 1);
        const groundMat = new THREE.MeshStandardMaterial({
          color: 0x1c2b3d,
          roughness: 1,
          metalness: 0
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(ARENA.w, 40, 0x6f87a8, 0x304059);
        grid.position.y = 0.01;
        scene.add(grid);

        // 外周壁
        addObstacle(0, 2.5, -ARENA.d / 2 + 1.5, ARENA.w, 5, 3, 0x132030);
        addObstacle(0, 2.5,  ARENA.d / 2 - 1.5, ARENA.w, 5, 3, 0x132030);
        addObstacle(-ARENA.w / 2 + 1.5, 2.5, 0, 3, 5, ARENA.d, 0x132030);
        addObstacle( ARENA.w / 2 - 1.5, 2.5, 0, 3, 5, ARENA.d, 0x132030);

        // カバー
        addObstacle(-12, 1.35, 0, 4, 2.7, 12, 0x6f7f90);
        addObstacle(12, 1.35, 0, 4, 2.7, 12, 0x6f7f90);
        addObstacle(0, 1.0, -20, 18, 2, 4, 0x8c9aab);
        addObstacle(0, 1.0, 20, 18, 2, 4, 0x8c9aab);

        // 左側
        addObstacle(-24, 1.4, -16, 8, 2.8, 4, 0x72859a);
        addObstacle(-26, 1.4, 14, 4, 2.8, 14, 0x5f6d7e);
        addObstacle(-18, 1.0, 26, 10, 2, 4, 0x7d8ca0);

        // 右側
        addObstacle(24, 1.4, 16, 8, 2.8, 4, 0x72859a);
        addObstacle(26, 1.4, -14, 4, 2.8, 14, 0x5f6d7e);
        addObstacle(18, 1.0, -26, 10, 2, 4, 0x7d8ca0);

        // 小カバー
        addObstacle(-8, 0.75, -6, 6, 1.5, 6, 0x4f6274);
        addObstacle(8, 0.75, 6, 6, 1.5, 6, 0x4f6274);
        addObstacle(-3, 0.75, 8, 5, 1.5, 5, 0x4f6274);
        addObstacle(3, 0.75, -8, 5, 1.5, 5, 0x4f6274);

        // サイトの端
        addObstacle(-36, 1.9, 0, 5, 3.8, 5, 0x41546d);
        addObstacle(36, 1.9, 0, 5, 3.8, 5, 0x41546d);
        addObstacle(0, 2.2, 34, 8, 4.4, 4, 0x3b516a);
        addObstacle(0, 2.2, -34, 8, 4.4, 4, 0x3b516a);

        // 床のライン
        const laneMat = new THREE.MeshStandardMaterial({ color: 0x243448, roughness: 1 });
        const lane1 = new THREE.Mesh(new THREE.BoxGeometry(66, 0.02, 2), laneMat);
        lane1.position.set(0, 0.011, 0);
        scene.add(lane1);
        const lane2 = new THREE.Mesh(new THREE.BoxGeometry(2, 0.02, 66), laneMat);
        lane2.position.set(0, 0.011, 0);
        scene.add(lane2);
      }

      function buildPatrolPoints() {
        const pts = [
          [-28, -26], [-16, -18], [-8, -26], [0, -18], [8, -26], [18, -18], [28, -26],
          [-28, 26], [-16, 18], [-8, 26], [0, 18], [8, 26], [18, 18], [28, 26],
          [-30, 0], [-20, 0], [-10, 0], [10, 0], [20, 0], [30, 0],
          [-24, 10], [-10, 10], [10, -10], [24, -10]
        ];
        pts.forEach(p => patrolPoints.push(new THREE.Vector3(p[0], 0, p[1])));
      }

      function makeLabelSprite(text, colorHex) {
        const color = colorHex === BLUE ? '#4aa3ff' : '#ff5c5c';
        const canvas2 = document.createElement('canvas');
        canvas2.width = 512;
        canvas2.height = 128;
        const ctx = canvas2.getContext('2d');

        ctx.clearRect(0, 0, canvas2.width, canvas2.height);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
        roundRect(ctx, 20, 18, 472, 92, 24, true, false);

        ctx.fillStyle = color;
        roundRect(ctx, 28, 28, 70, 72, 18, true, false);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 40px system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 118, 66);

        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 22px system-ui, sans-serif';
        ctx.fillText(colorHex === BLUE ? 'ALLY' : 'ENEMY', 118, 94);

        const tex = new THREE.CanvasTexture(canvas2);
        tex.encoding = THREE.sRGBEncoding;
        tex.needsUpdate = true;

        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthTest: false,
          depthWrite: false
        });
        const spr = new THREE.Sprite(mat);
        spr.scale.set(4.9, 1.22, 1);
        return spr;
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
        ctx.beginPath();
        ctx.moveTo(x + r.tl, y);
        ctx.lineTo(x + w - r.tr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
        ctx.lineTo(x + w, y + h - r.br);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
        ctx.lineTo(x + r.bl, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
        ctx.lineTo(x, y + r.tl);
        ctx.quadraticCurveTo(x, y, x + r.tl, y);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

      function updateHUD() {
        blueScoreEl.textContent = ui.blueScore;
        redScoreEl.textContent = ui.redScore;
        deathsEl.textContent = ui.deaths;
      }

      function updateHPUI() {
        const hp = Math.max(0, Math.min(PLAYER_MAX_HP, Math.floor(player.hp)));
        hpTextEl.textContent = `HP: ${hp}`;

      function showGameOver(winTeam) {

      function hideHintForever() {
        if (hintEl && hintEl.style.display !== 'none') {
          hintEl.style.display = 'none';
        }
      }

      function bindInput() {
        // どこかを1回タップ/クリックしたら中央ダイアログを完全に消す
        const hideHintOnce = () => hideHintForever();
        document.addEventListener('pointerdown', hideHintOnce, { capture: true, passive: true });
        document.addEventListener('touchstart', hideHintOnce, { capture: true, passive: true });
        document.addEventListener('mousedown', hideHintOnce, { capture: true, passive: true });

        window.addEventListener('keydown', (e) => {
          keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
          keys[e.code] = false;
        });

        // デスクトップ: クリックでポインターロック
        renderer.domElement.addEventListener('click', () => {
          if (gameOver) return;
          if (!isTouch && document.pointerLockElement !== renderer.domElement) {
            renderer.domElement.requestPointerLock?.();
          }
        });

        document.addEventListener('pointerlockchange', () => {
          pointer.locked = (document.pointerLockElement === renderer.domElement);
        });

        document.addEventListener('mousemove', (e) => {
          if (!pointer.locked || gameOver) return;
          pointer.yaw -= e.movementX * pointer.lookSensitivity;
          pointer.pitch -= e.movementY * pointer.lookSensitivity;
          pointer.pitch = clamp(pointer.pitch, -1.45, 1.45);
        });

        window.addEventListener('contextmenu', (e) => e.preventDefault());

        // 左下ジョイスティック
        let joyPointerId = null;
        let joyCenter = { x: 0, y: 0 };

        function setJoyVec(x, y) {
          const dx = x - joyCenter.x;
          const dy = y - joyCenter.y;
          const max = 44;
          const len = Math.hypot(dx, dy);
          const nx = len > 0 ? dx / len : 0;
          const ny = len > 0 ? dy / len : 0;
          const clamped = Math.min(len, max);
          joyStick.style.transform = `translate(${nx * clamped}px, ${ny * clamped}px)`;
          pointer.moveVec.set((nx * clamped) / max, (ny * clamped) / max);
        }

        joyBase.addEventListener('pointerdown', (e) => {
          if (gameOver) return;
          e.preventDefault();
          hideHintForever();
          joyPointerId = e.pointerId;
          joyBase.setPointerCapture(e.pointerId);
          const rect = joyBase.getBoundingClientRect();
          joyCenter.x = rect.left + rect.width / 2;
          joyCenter.y = rect.top + rect.height / 2;
          setJoyVec(e.clientX, e.clientY);
        });

        joyBase.addEventListener('pointermove', (e) => {
          if (e.pointerId !== joyPointerId || gameOver) return;
          e.preventDefault();
          setJoyVec(e.clientX, e.clientY);
        });

        const stopJoy = (e) => {
          if (joyPointerId === null) return;
          if (e && e.pointerId !== joyPointerId) return;
          pointer.moveVec.set(0, 0);
          joyStick.style.transform = 'translate(0px, 0px)';
          joyPointerId = null;
        };
        joyBase.addEventListener('pointerup', stopJoy);
        joyBase.addEventListener('pointercancel', stopJoy);
        joyBase.addEventListener('lostpointercapture', stopJoy);

        // 右半分スワイプで視点
        let lookPointerId = null;
        renderer.domElement.addEventListener('pointerdown', (e) => {
          if (gameOver) return;
          if (e.pointerType === 'touch') {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < rect.width * 0.34) return;
            if (e.target === fireBtn || fireBtn.contains(e.target)) return;
            lookPointerId = e.pointerId;
            pointer.touchLookId = e.pointerId;
            pointer.lastTouchX = e.clientX;
            pointer.lastTouchY = e.clientY;
            renderer.domElement.setPointerCapture?.(e.pointerId);
            e.preventDefault();
          }
        });

        renderer.domElement.addEventListener('pointermove', (e) => {
          if (e.pointerType !== 'touch') return;
          if (lookPointerId !== e.pointerId || gameOver) return;
          e.preventDefault();
          const dx = e.clientX - pointer.lastTouchX;
          const dy = e.clientY - pointer.lastTouchY;
          pointer.lastTouchX = e.clientX;
          pointer.lastTouchY = e.clientY;
          pointer.yaw -= dx * 0.0055;
          pointer.pitch -= dy * 0.0055;
          pointer.pitch = clamp(pointer.pitch, -1.45, 1.45);
        });

        const endLook = (e) => {
          if (lookPointerId !== e.pointerId) return;
          lookPointerId = null;
          pointer.touchLookId = null;
        };
        renderer.domElement.addEventListener('pointerup', endLook);
        renderer.domElement.addEventListener('pointercancel', endLook);
        renderer.domElement.addEventListener('lostpointercapture', () => {
          lookPointerId = null;
          pointer.touchLookId = null;
        });

        // FIREボタン: pointerdown + touchstart で確実に発火、長押し連射対応
        const startFire = (e) => {
          if (gameOver) return;
          hideHintForever();
          e.preventDefault();
          e.stopPropagation();
          if (pointer.fireHeld) return;
          pointer.fireHeld = true;
          fireOnce();
          pointer.fireTimer = setInterval(() => {
            if (!gameOver && pointer.fireHeld) fireOnce();
          }, 130);
        };

        const stopFire = (e) => {
          if (e) {
            e.preventDefault?.();
            e.stopPropagation?.();
          }
          pointer.fireHeld = false;
          if (pointer.fireTimer) {
            clearInterval(pointer.fireTimer);
            pointer.fireTimer = null;
          }
        };

        fireBtn.addEventListener('pointerdown', startFire, { passive: false });
        fireBtn.addEventListener('pointerup', stopFire, { passive: false });
        fireBtn.addEventListener('pointercancel', stopFire, { passive: false });
        fireBtn.addEventListener('pointerleave', stopFire, { passive: false });

        fireBtn.addEventListener('touchstart', startFire, { passive: false });
        fireBtn.addEventListener('touchend', stopFire, { passive: false });
        fireBtn.addEventListener('touchcancel', stopFire, { passive: false });

        fireBtn.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          startFire(e);
        });
        fireBtn.addEventListener('mouseup', stopFire);
        fireBtn.addEventListener('mouseleave', stopFire);

        restartBtn.addEventListener('click', restartGame);
        restartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); restartGame(); }, { passive: false });

        // ブラウザ標準のズーム・スクロール対策
        document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
      }

      class Character {
        constructor(team, name, spawn) {
          this.team = team;
          this.name = name;
          this.spawn = spawn.clone();
          this.health = 100;
          this.dead = false;
          this.respawnAt = 0;
          this.fireCooldown = 0;
          this.wanderTarget = null;
          this.wanderTimer = 0;
          this.speed = 4.15;
          this.radius = 0.72;
          this.root = new THREE.Group();
          this.root.position.copy(spawn);
          scene.add(this.root);

          this.visualRoot = new THREE.Group();
          this.root.add(this.visualRoot);

          this.collider = new THREE.Mesh(
            new THREE.BoxGeometry(1.4, 2.4, 1.4),

          this.marker = new THREE.Mesh(

          );
          this.marker.rotation.x = Math.PI / 2;
          this.marker.position.set(0, 4.6, 0);
          this.root.add(this.marker);

          this.setFallbackAppearance();
        }

        get position() {
          return this.root.position;
        }

        setFallbackAppearance() {
          while (this.visualRoot.children.length) {
            this.visualRoot.remove(this.visualRoot.children[0]);
          }

          const baseColor = this.team === 'blue' ? 0x4aa3ff : 0xff5c5c;
          const bodyColor = this.team === 'blue' ? 0x2c70c7 : 0xc14242;
          const capColor = this.team === 'blue' ? 0xa7d5ff : 0xffb0b0;

          const torso = new THREE.Mesh(
            new THREE.BoxGeometry(0.95, 1.2, 0.55),
            new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.95 })
          );
          torso.position.set(0, 1.25, 0);
          this.visualRoot.add(torso);

          const head = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.6, 0.6),
            new THREE.MeshStandardMaterial({ color: capColor, roughness: 0.95 })
          );
          head.position.set(0, 2.05, 0);
          this.visualRoot.add(head);

          const armGeo = new THREE.BoxGeometry(0.2, 0.9, 0.2);
          const armMat = new THREE.MeshStandardMaterial({ color: baseColor, roughness: 0.96 });

          const armL = new THREE.Mesh(armGeo, armMat);
          armL.position.set(-0.6, 1.2, 0);
          armL.rotation.z = 0.15;
          this.visualRoot.add(armL);

          const armR = new THREE.Mesh(armGeo, armMat);
          armR.position.set(0.6, 1.2, 0);
          armR.rotation.z = -0.15;
          this.visualRoot.add(armR);

          const legGeo = new THREE.BoxGeometry(0.24, 1.0, 0.24);
          const legL = new THREE.Mesh(legGeo, armMat);
          legL.position.set(-0.24, 0.28, 0);
          this.visualRoot.add(legL);

          const legR = new THREE.Mesh(legGeo, armMat);
          legR.position.set(0.24, 0.28, 0);
          this.visualRoot.add(legR);
        }

        setModelTemplate(template) {
          while (this.visualRoot.children.length) {
            this.visualRoot.remove(this.visualRoot.children[0]);
          }

          const model = THREE.SkeletonUtils.clone(template);
          model.traverse((o) => {
            if (o.isMesh) {
              o.castShadow = false;
              o.receiveShadow = true;
              if (o.material) {
                o.material = o.material.clone();
                o.material.metalness = 0.0;
                o.material.roughness = 1.0;
              }
            }
          });

          // サイズを3倍～5倍程度に拡大し、足元を地面(y=0)に接地
          tmpBox.setFromObject(model);
          tmpBox.getSize(tmpSize);
          tmpBox.getCenter(tmpCenter);

          const rawHeight = Math.max(0.001, tmpSize.y);
          const scale = THREE.MathUtils.clamp(MODEL_TARGET_HEIGHT / rawHeight, 3.3, 5.0);
          model.scale.setScalar(scale);

          // 原点をモデル中心へ寄せ、底面が地面に接するようにオフセット
          model.position.set(
            -tmpCenter.x * scale,
            -tmpBox.min.y * scale,
            -tmpCenter.z * scale
          );
          model.rotation.y = Math.PI;

          this.visualRoot.add(model);

          if (this.team === 'blue') {
            model.traverse((o) => {
              if (o.isMesh && o.material && o.material.color) {
                o.material.color.offsetHSL(0.02, 0.08, 0.08);
              }
            });
          } else {
            model.traverse((o) => {
              if (o.isMesh && o.material && o.material.color) {
                o.material.color.offsetHSL(-0.02, 0.05, 0.02);
              }
            });
          }
        }

        respawn() {
          this.dead = false;
          this.health = 100;
          this.root.visible = true;
          this.root.position.copy(this.spawn);
          this.root.position.y = GROUND_Y;
          this.fireCooldown = 0;
          this.wanderTarget = null;
          this.wanderTimer = 0;
        }

        kill(killer) {
          if (this.dead) return;
          this.dead = true;
          this.root.visible = false;
          this.respawnAt = performance.now() + 2200;

          if (killer && killer.team !== this.team) {
            if (killer.team === 'blue') ui.blueScore++;
            else ui.redScore++;
            updateHUD();
            checkWin();
          }
        }

        damage(amount, killer) {
          if (this.dead) return;
          this.health -= amount;
          if (this.health <= 0) {
            this.health = 0;
            this.kill(killer);
          }
        }

        updateFacing(targetPos) {
          const dx = targetPos.x - this.position.x;
          const dz = targetPos.z - this.position.z;
          this.root.rotation.y = Math.atan2(dx, dz);
        }
      }

      function updatePlayerCollider() {

      function stopAtWalls(pos, radius) {
        pos.x = clamp(pos.x, -ARENA.w / 2 + radius + 1.2, ARENA.w / 2 - radius - 1.2);
        pos.z = clamp(pos.z, -ARENA.d / 2 + radius + 1.2, ARENA.d / 2 - radius - 1.2);

        for (const b of obstacleBoxes) {
          const nearestX = clamp(pos.x, b.minX, b.maxX);
          const nearestZ = clamp(pos.z, b.minZ, b.maxZ);
          const dx = pos.x - nearestX;
          const dz = pos.z - nearestZ;
          if ((dx * dx + dz * dz) < radius * radius) {
            if (Math.abs(dx) > Math.abs(dz)) {
              pos.x += dx >= 0 ? radius * 0.45 : -radius * 0.45;
            } else {
              pos.z += dz >= 0 ? radius * 0.45 : -radius * 0.45;
            }
          }
        }

        pos.x = clamp(pos.x, -ARENA.w / 2 + radius + 1.2, ARENA.w / 2 - radius - 1.2);
        pos.z = clamp(pos.z, -ARENA.d / 2 + radius + 1.2, ARENA.d / 2 - radius - 1.2);
      }

      function canSee(fromPos, toPos) {
        const from = new THREE.Vector3(fromPos.x, 1.55, fromPos.z);
        const to = new THREE.Vector3(toPos.x, 1.55, toPos.z);
        const dir = to.clone().sub(from);
        const dist = dir.length();
        if (dist < 0.001) return true;
        dir.normalize();

        raycaster.set(from, dir);
        raycaster.far = dist;
        const hits = raycaster.intersectObjects(obstacleMeshes, true);
        return hits.length === 0;
      }

      function getVisibleEnemyFor(ch) {
        let best = null;
        let bestDist = Infinity;

        for (const other of characters) {
          if (other.dead || other.team === ch.team) continue;
          const d = ch.position.distanceTo(other.position);
          if (d > 34) continue;
          if (!canSee(ch.position, other.position)) continue;
          if (d < bestDist) {
            best = other;
            bestDist = d;
          }
        }
        return best;
      }

      function pickPatrolPoint(ch) {
        const p = patrolPoints[(Math.random() * patrolPoints.length) | 0].clone();
        if (ch.team === 'blue') p.x = Math.min(p.x, 10 + Math.random() * 10);
        else p.x = Math.max(p.x, -10 - Math.random() * 10);
        return p;
      }

      function moveCharacter(ch, moveDir, speed, dt) {
        if (moveDir.lengthSq() < 0.0001) return;
        moveDir.normalize();

        const attempt = ch.position.clone();
        attempt.x += moveDir.x * speed * dt;
        attempt.z += moveDir.z * speed * dt;
        stopAtWalls(attempt, ch.radius);
        ch.position.copy(attempt);

        const yaw = Math.atan2(moveDir.x, moveDir.z);
        ch.root.rotation.y = yaw;
      }

      function getShotOrigin(shooter) {
        const origin = new THREE.Vector3();
        if (shooter === 'player') {
          origin.set(camera.position.x, camera.position.y, camera.position.z);
        } else {
          origin.set(shooter.position.x, 1.58, shooter.position.z);
        }
        return origin;
      }

      function traceShot(origin, direction, shooter, damage) {
        raycaster.set(origin, direction.clone().normalize());
        raycaster.far = 70;

        const hits = raycaster.intersectObjects(hitObjects, false);
        if (!hits.length) return;

        for (const hit of hits) {
          const obj = hit.object;

          if (obj.userData && obj.userData.isObstacle) {
            return;
          }

          if (obj.userData && obj.userData.isPlayerCollider) {
            if (shooter === player || player.dead || performance.now() < player.invulnUntil) return;
            if (shooter.team && shooter.team === 'blue') return;
            playerTakeDamage(damage, shooter);
            return;
          }

          const ch = obj.userData && obj.userData.character;
          if (!ch || ch.dead) continue;

          if (shooter !== player && ch === shooter) continue;
          if (shooter.team && ch.team === shooter.team) continue;

          ch.damage(damage, shooter);
          return;
        }
      }

      function fireOnce() {
        if (gameOver) return;
        if (player.dead) return;
        if (player.shootCooldown > 0) return;

        player.shootCooldown = 0.12;
        const origin = new THREE.Vector3(camera.position.x, camera.position.y, camera.position.z);
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        traceShot(origin, dir, player, PLAYER_HIT_DAMAGE);
      }

      function playerTakeDamage(amount, attacker) {
        if (player.dead) return;
        if (performance.now() < player.invulnUntil) return;

        player.hp -= amount;
        if (player.hp <= 0) {
          player.hp = 0;
          ui.deaths++;
          updateHUD();
          respawnPlayer(attacker);
        }
        updateHPUI();
      }

      function respawnPlayer(attacker) {
        if (attacker && attacker.team === 'red') {
          ui.redScore++;
          updateHUD();
          checkWin();
        }

        player.dead = false;
        player.hp = PLAYER_MAX_HP;
        player.pos.copy(playerSpawn);
        player.invulnUntil = performance.now() + 900;
        updateHPUI();
      }

      function respawnBot(ch) {
        const spawns = teamSpawnFor(ch.team);
        const idx = (Math.random() * spawns.length) | 0;
        ch.spawn.copy(spawns[idx]).add(new THREE.Vector3((Math.random() - 0.5) * 3.5, 0, (Math.random() - 0.5) * 3.5));
        ch.respawn();
      }

      function aiShootAt(ch, targetPos) {
        if (ch.dead || gameOver) return;
        if (ch.fireCooldown > 0) return;
        ch.fireCooldown = ch.team === 'blue' ? 0.22 : 0.28;

        const origin = new THREE.Vector3(ch.position.x, 1.58, ch.position.z);
        const dir = targetPos.clone().sub(origin);
        dir.y *= 0.35;

        const spread = ch === player ? 0.012 : 0.03;
        dir.x += (Math.random() - 0.5) * spread;
        dir.y += (Math.random() - 0.5) * spread * 0.55;
        dir.z += (Math.random() - 0.5) * spread;

        const damage = ch.team === 'blue' ? PLAYER_HIT_DAMAGE : ENEMY_HIT_DAMAGE;
        traceShot(origin, dir, ch, damage);
      }

      function updateAI(ch, dt) {
        if (ch.dead || gameOver) return;
        if (ch.fireCooldown > 0) ch.fireCooldown -= dt;

        const visibleEnemy = getVisibleEnemyFor(ch);
        let moveDir = new THREE.Vector3();

        if (visibleEnemy) {
          const toEnemy = visibleEnemy.position.clone().sub(ch.position);
          const dist = toEnemy.length();
          toEnemy.y = 0;

          if (dist > 0.001) {
            if (dist > 12) {
              moveDir.copy(toEnemy).normalize();
            } else if (dist < 7) {
              moveDir.copy(toEnemy).normalize().multiplyScalar(-1);
            } else {
              const forward = toEnemy.clone().normalize();
              const side = new THREE.Vector3(-forward.z, 0, forward.x);
              moveDir.copy(forward).multiplyScalar(0.55).add(side.multiplyScalar((Math.random() > 0.5 ? 1 : -1) * 0.55));
            }
          }

          ch.updateFacing(visibleEnemy.position);

          if (ch.fireCooldown <= 0 && dist < 35 && canSee(ch.position, visibleEnemy.position)) {
            aiShootAt(ch, visibleEnemy.position.clone());
          }
        } else {
          ch.wanderTimer -= dt;
          if (!ch.wanderTarget || ch.wanderTimer <= 0 || ch.position.distanceTo(ch.wanderTarget) < 1.4) {
            ch.wanderTarget = pickPatrolPoint(ch);
            ch.wanderTimer = 2.2 + Math.random() * 2.5;
          }
          moveDir = ch.wanderTarget.clone().sub(ch.position);
          moveDir.y = 0;
          if (moveDir.lengthSq() > 0.001) {
            ch.root.rotation.y = Math.atan2(moveDir.x, moveDir.z);
          }
        }

        const before = ch.position.clone();
        moveCharacter(ch, moveDir, ch.speed, dt);
        if (before.distanceToSquared(ch.position) < 0.00005) {
          const alt = new THREE.Vector3(moveDir.z, 0, -moveDir.x);
          moveCharacter(ch, alt, ch.speed * 0.8, dt);
          if (before.distanceToSquared(ch.position) < 0.00005) {
            ch.wanderTarget = null;
          }
        }
      }

      function respawnIfNeeded(ch) {
        if (!ch.dead) return;
        if (performance.now() >= ch.respawnAt) {
          respawnBot(ch);
        }
      }

      function updatePlayer(dt) {
        if (player.dead || gameOver) return;

        const moveX = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0) + pointer.moveVec.x;
        const moveY = (keys.KeyS ? 1 : 0) - (keys.KeyW ? 1 : 0) + pointer.moveVec.y;

        const yaw = pointer.yaw;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
        const right = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));

        const desired = new THREE.Vector3();
        desired.addScaledVector(right, moveX);
        desired.addScaledVector(forward, moveY);
        if (desired.lengthSq() > 0) desired.normalize();

        const next = player.pos.clone().addScaledVector(desired, player.speed * dt);
        stopAtWalls(next, player.radius);
        player.pos.copy(next);
        updatePlayerCollider();

        camera.position.set(player.pos.x, 1.7, player.pos.z);
        camera.rotation.order = 'YXZ';
        camera.rotation.y = pointer.yaw;
        camera.rotation.x = pointer.pitch;

        if (player.gun) {
          const bob = Math.sin(performance.now() * 0.012) * 0.008 * Math.min(1, desired.length() * 2);
          player.gun.position.y = -0.28 + bob;
          player.gun.position.x = 0.42 + Math.sin(performance.now() * 0.008) * 0.01;
        }

        if (player.shootCooldown > 0) player.shootCooldown -= dt;
      }

      function restartIfNeededFromScore() {
        if (gameOver) return;
        if (ui.blueScore >= 20 || ui.redScore >= 20) checkWin();
      }

      function stopFireLoop() {
        pointer.fireHeld = false;
        if (pointer.fireTimer) {
          clearInterval(pointer.fireTimer);
          pointer.fireTimer = null;
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.033);

        if (!gameOver) {
          updatePlayer(dt);
          for (const ch of characters) {
            respawnIfNeeded(ch);
            if (!ch.dead) updateAI(ch, dt);
          }
          restartIfNeededFromScore();
        }

        renderer.render(scene, camera);
      }

      // 外部クリック時にヒントを消してもいいように、初回だけ完全に非表示へ
      document.addEventListener('pointerdown', () => hideHintForever(), { capture: true, passive: true });
      document.addEventListener('touchstart', () => hideHintForever(), { capture: true, passive: true });
      document.addEventListener('mousedown', () => hideHintForever(), { capture: true, passive: true });

      window.addEventListener('blur', () => {
        keys.KeyW = keys.KeyA = keys.KeyS = keys.KeyD = false;
        pointer.moveVec.set(0, 0);
        stopFireLoop();
        joyStick.style.transform = 'translate(0px, 0px)';
      });

      // iOS/Safari系のズーム・スクロール癖を抑制
      document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
      document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
      document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
      document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

      init();
    })();
  </script>
</body>
</html>
